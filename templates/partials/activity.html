{% if activity.len() == 0 %}
<p class="empty">No activity recorded yet.</p>
{% else %}
<div class="activity-list">
  {% for item in activity %}
  <article class="activity-row">
    <div class="activity-main">{{ item.actor_kind }} {{ item.action }}{% if item.entity_id.is_some() %} {{ item.entity_id.clone().unwrap() }}{% endif %}</div>
    <div class="item-meta">{{ item.summary }}</div>
    <div class="item-meta">{{ item.occurred_at }}</div>
  </article>
  {% endfor %}
</div>
{% endif %}
