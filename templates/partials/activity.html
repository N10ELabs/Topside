{% if activity.len() == 0 %}
<p class="empty-state">No activity recorded yet.</p>
{% else %}
<div class="activity-list">
  {% for item in activity %}
  <article class="activity-row">
    <div class="activity-head">
      <span class="actor-chip {{ item.actor_class }}">{{ item.actor_label }}</span>
      <span class="item-meta">{{ item.occurred_label }}</span>
    </div>
    <div class="activity-main">{{ item.action_label }} · {{ item.entity_label }}</div>
    <div class="item-meta">{{ item.summary }}</div>
    <div class="item-meta">{{ item.git_label }}</div>
  </article>
  {% endfor %}
</div>
{% endif %}
