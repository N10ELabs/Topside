{% if tasks.len() == 0 %}
<p class="empty">{% if has_scope %}No tasks in this project yet.{% else %}No tasks indexed yet.{% endif %}</p>
{% else %}
<div class="stack">
  {% for task in tasks %}
  <article class="task-row">
    <div class="task-line">
      <form method="post" action="/tasks/{{ task.id }}{{ scope_query }}" hx-patch="/tasks/{{ task.id }}{{ scope_query }}" hx-target="#tasks-panel" hx-swap="innerHTML" class="check-form">
        <input type="hidden" name="expected_revision" value="{{ task.revision }}">
        <input type="hidden" name="status" value="{% if task.status.as_str() == "done" %}todo{% else %}done{% endif %}">
        <button class="check-btn {% if task.status.as_str() == "done" %}done{% endif %}" type="submit">{% if task.status.as_str() == "done" %}✓{% else %}·{% endif %}</button>
      </form>

      <div>
        <div class="task-title {% if task.status.as_str() == "done" %}done{% endif %}">{{ task.title }}</div>
        <div class="task-meta">
          <span>{{ task.priority.as_str() }}</span>
          <span>{{ task.status.as_str() }}</span>
          <span>{{ task.id }}</span>
        </div>
      </div>

      <form method="post" action="/archive/{{ task.id }}{{ scope_query }}" hx-post="/archive/{{ task.id }}{{ scope_query }}" hx-target="#tasks-panel" hx-swap="innerHTML" class="archive-form">
        <input type="hidden" name="expected_revision" value="{{ task.revision }}">
        <button class="mini-btn danger" type="submit">archive</button>
      </form>
    </div>
  </article>
  {% endfor %}
</div>
{% endif %}
