{% if tasks.len() == 0 %}
<p class="empty">{% if has_scope %}No tasks in this project yet.{% else %}No tasks indexed yet.{% endif %}</p>
{% else %}
<div class="stack">
  {% for task in tasks %}
  <article class="task-card">
    <div class="item-title">{{ task.title }}</div>
    <div class="task-row">
      <span>{{ task.status.as_str() }}</span>
      <span>{{ task.priority.as_str() }}</span>
      <span>{{ task.id }}</span>
    </div>

    <form method="post" action="/tasks/{{ task.id }}{{ scope_query }}" hx-patch="/tasks/{{ task.id }}{{ scope_query }}" hx-target="#tasks-panel" hx-swap="innerHTML" class="form-grid">
      <input type="hidden" name="expected_revision" value="{{ task.revision }}">
      <div class="control-grid">
        <select name="status">
          <option value="backlog" {% if task.status.as_str() == "backlog" %}selected{% endif %}>backlog</option>
          <option value="todo" {% if task.status.as_str() == "todo" %}selected{% endif %}>todo</option>
          <option value="in_progress" {% if task.status.as_str() == "in_progress" %}selected{% endif %}>in_progress</option>
          <option value="blocked" {% if task.status.as_str() == "blocked" %}selected{% endif %}>blocked</option>
          <option value="done" {% if task.status.as_str() == "done" %}selected{% endif %}>done</option>
        </select>
        <select name="priority">
          <option value="P0" {% if task.priority.as_str() == "P0" %}selected{% endif %}>P0</option>
          <option value="P1" {% if task.priority.as_str() == "P1" %}selected{% endif %}>P1</option>
          <option value="P2" {% if task.priority.as_str() == "P2" %}selected{% endif %}>P2</option>
          <option value="P3" {% if task.priority.as_str() == "P3" %}selected{% endif %}>P3</option>
        </select>
      </div>
      <input name="assignee" value="{{ task.assignee }}">
      <div class="actions">
        <button type="submit">save</button>
      </div>
    </form>

    <form method="post" action="/archive/{{ task.id }}{{ scope_query }}" hx-post="/archive/{{ task.id }}{{ scope_query }}" hx-target="#tasks-panel" hx-swap="innerHTML">
      <input type="hidden" name="expected_revision" value="{{ task.revision }}">
      <div class="actions">
        <button class="danger" type="submit">archive</button>
      </div>
    </form>
  </article>
  {% endfor %}
</div>
{% endif %}
