<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>n10e</title>
  <style>
    :root {
      --bg: #0b1218;
      --panel: #101b24;
      --panel-soft: #13212b;
      --line: rgba(147, 184, 207, 0.28);
      --line-strong: rgba(147, 184, 207, 0.42);
      --text: #e8f0f5;
      --muted: #8fa4b5;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.18);
      --warm: #f59e0b;
      --success: #34d399;
      --danger: #f87171;
      --shadow: 0 18px 48px rgba(2, 8, 14, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 24%),
        linear-gradient(180deg, #0a1117, #0b1218);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(14, 23, 31, 0.88);
      box-shadow: var(--shadow);
    }

    .brand {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: lowercase;
      letter-spacing: 0.08em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 720px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(8, 18, 26, 0.8);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .layout {
      min-height: 0;
      display: grid;
      gap: 12px;
      grid-template-columns: 260px minmax(0, 1fr) minmax(0, 1fr);
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(16, 27, 36, 0.92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-family: "IBM Plex Mono", monospace;
      font-size: 15px;
      text-transform: lowercase;
    }

    .pane-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pane-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .icon-btn,
    .text-btn,
    .mode-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(9, 18, 25, 0.9);
      color: var(--text);
      padding: 8px 10px;
    }

    .icon-btn {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .mode-btn.active,
    .project-card.active {
      border-color: rgba(56, 189, 248, 0.6);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.22);
      background: rgba(16, 33, 46, 0.98);
    }

    .inline-shell,
    .project-card,
    .task-row,
    .task-draft,
    .note-card,
    .note-editor,
    .done-row,
    .empty-state,
    .message {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(10, 18, 25, 0.78);
    }

    .inline-shell,
    .message,
    .empty-state {
      padding: 10px;
    }

    .inline-shell {
      display: grid;
      gap: 8px;
    }

    .inline-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .text-input,
    .task-input,
    .note-title-input,
    .markdown-input,
    .path-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(8, 15, 21, 0.92);
      color: var(--text);
      padding: 10px 11px;
    }

    .markdown-input {
      min-height: 240px;
      resize: vertical;
      line-height: 1.55;
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
    }

    .project-list,
    .task-list,
    .done-list,
    .notes-list {
      display: grid;
      gap: 8px;
    }

    .project-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      text-align: left;
    }

    .project-card-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .source-badge {
      min-width: 34px;
      height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      background: rgba(10, 18, 26, 0.9);
    }

    .section-title,
    .small-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: "IBM Plex Mono", monospace;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
      margin: 4px 0;
    }

    .task-row,
    .task-draft,
    .done-row {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
    }

    .task-row.dragging {
      opacity: 0.5;
    }

    .drag-handle {
      width: 20px;
      color: var(--muted);
      cursor: grab;
      user-select: none;
      text-align: center;
      font-family: "IBM Plex Mono", monospace;
    }

    .task-check,
    .done-check {
      width: 20px;
      height: 20px;
      margin: 0;
      accent-color: var(--accent);
    }

    .task-input {
      padding: 0;
      border: none;
      background: transparent;
      border-radius: 0;
    }

    .task-input:focus,
    .text-input:focus,
    .note-title-input:focus,
    .markdown-input:focus,
    .path-input:focus,
    .clean-editor:focus {
      outline: 1px solid rgba(56, 189, 248, 0.55);
      outline-offset: 2px;
    }

    .done-row {
      grid-template-columns: auto minmax(0, 1fr) auto;
    }

    .done-title {
      color: #a8bac8;
      text-decoration: line-through;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .message {
      color: #fed7aa;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .message.error {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.34);
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .note-card {
      overflow: hidden;
    }

    .note-toggle {
      width: 100%;
      border: none;
      border-bottom: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 12px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      text-align: left;
    }

    .note-card.open .note-toggle {
      border-bottom-color: var(--line);
    }

    .note-editor {
      margin: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
      background: rgba(15, 25, 33, 0.92);
    }

    .note-title-input {
      font-size: 15px;
      font-weight: 600;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .toolbar button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(10, 18, 25, 0.94);
      color: var(--text);
      padding: 6px 9px;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .clean-editor {
      min-height: 240px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(8, 15, 21, 0.92);
      padding: 12px;
      overflow: auto;
      line-height: 1.6;
    }

    .clean-editor h1,
    .clean-editor h2,
    .clean-editor h3,
    .clean-editor p {
      margin-top: 0;
    }

    .note-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    @media (max-width: 1120px) {
      .layout {
        grid-template-columns: 240px 1fr;
        grid-template-areas:
          "projects todo"
          "notes notes";
      }

      .pane-projects { grid-area: projects; }
      .pane-todo { grid-area: todo; }
      .pane-notes { grid-area: notes; }
    }

    @media (max-width: 820px) {
      .shell {
        padding: 10px;
      }

      .topbar,
      .layout {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-areas: none;
      }

      .pane-projects,
      .pane-todo,
      .pane-notes {
        grid-area: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>n10e</h1>
        <p>Shared project context and status. Keep the plan simple, keep the notes durable, and let agents pick up the thread without a long briefing.</p>
      </div>
      <div class="chips">
        <span class="chip">knowledge hub</span>
        <span class="chip">local-first</span>
      </div>
    </header>

    <main class="layout">
      <section class="pane pane-projects">
        <div class="pane-head">
          <span>projects</span>
          <div class="pane-head-actions">
            <button class="icon-btn" id="projects-add" type="button">+</button>
          </div>
        </div>
        <div class="pane-body">
          <div id="project-tray"></div>
          <div id="project-list" class="project-list"></div>
        </div>
      </section>

      <section class="pane pane-todo">
        <div class="pane-head">
          <span>to-do</span>
          <div class="pane-head-actions">
            <span class="muted" id="todo-status">ready</span>
          </div>
        </div>
        <div class="pane-body">
          <div id="task-message"></div>
          <div class="task-list" id="active-task-list"></div>
          <div class="divider"></div>
          <div class="small-label">done / changelog</div>
          <div class="done-list" id="done-task-list"></div>
        </div>
      </section>

      <section class="pane pane-notes">
        <div class="pane-head">
          <span>notes</span>
          <div class="pane-head-actions">
            <button class="mode-btn" type="button" data-note-mode="markdown">markdown</button>
            <button class="mode-btn" type="button" data-note-mode="clean">clean</button>
            <button class="icon-btn" id="notes-add" type="button">+</button>
          </div>
        </div>
        <div class="pane-body">
          <div id="note-message"></div>
          <div id="notes-list" class="notes-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script id="initial-state" type="application/json">{{ initial_state_json|safe }}</script>
  <script>
    const initialState = JSON.parse(document.getElementById("initial-state").textContent);
    const noteModeKey = "n10e-note-mode";
    const state = {
      projects: initialState.projects || [],
      selectedProjectId: initialState.selected_project_id || null,
      workspace: initialState.workspace || null,
      serverPort: initialState.server_port,
      noteMode: localStorage.getItem(noteModeKey) || "markdown",
      openNoteId: initialState.workspace?.suggested_open_note_id || null,
      projectTrayMode: null,
      projectInput: "",
      projectSourceInput: "",
      projectPickerFallback: false,
      projectMessage: "",
      taskMessage: "",
      noteMessage: "",
      taskDrafts: [],
      taskEdits: {},
      noteTitleEdits: {},
      noteBodyEdits: {},
      noteHtmlEdits: {},
      taskTimers: {},
      noteTimers: {},
      draggedTaskId: null,
      focusTaskId: null,
      focusDraftKey: null,
      focusNoteId: null,
    };

    const projectTray = document.getElementById("project-tray");
    const projectList = document.getElementById("project-list");
    const taskMessage = document.getElementById("task-message");
    const noteMessage = document.getElementById("note-message");
    const activeTaskList = document.getElementById("active-task-list");
    const doneTaskList = document.getElementById("done-task-list");
    const notesList = document.getElementById("notes-list");
    const todoStatus = document.getElementById("todo-status");

    document.getElementById("projects-add").addEventListener("click", () => {
      state.projectMessage = "";
      state.projectTrayMode = state.projectTrayMode ? null : "chooser";
      render();
    });

    document.getElementById("notes-add").addEventListener("click", async () => {
      if (!state.selectedProjectId) return;
      const response = await fetchJson("/api/notes", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          title: "Untitled note"
        })
      }, "note");
      if (!response) return;
      applyWorkspace(response.workspace, response.created_note_id);
      state.focusNoteId = response.created_note_id;
      render();
    });

    document.querySelectorAll("[data-note-mode]").forEach((button) => {
      button.addEventListener("click", async () => {
        const nextMode = button.dataset.noteMode;
        if (nextMode === state.noteMode) return;
        await saveOpenNote();
        state.noteMode = nextMode;
        localStorage.setItem(noteModeKey, nextMode);
        render();
      });
    });

    document.addEventListener("click", async (event) => {
      const chooserBtn = event.target.closest("[data-project-chooser]");
      if (chooserBtn) {
        state.projectTrayMode = chooserBtn.dataset.projectChooser;
        state.projectInput = "";
        state.projectSourceInput = "";
        state.projectPickerFallback = false;
        render();
        return;
      }

      if (event.target.closest("[data-project-tray-cancel]")) {
        state.projectTrayMode = null;
        state.projectInput = "";
        state.projectSourceInput = "";
        state.projectPickerFallback = false;
        render();
        return;
      }

      const projectButton = event.target.closest("[data-project-id]");
      if (projectButton) {
        const projectId = projectButton.dataset.projectId;
        await selectProject(projectId);
        return;
      }

      const noteToggle = event.target.closest("[data-note-id]");
      if (noteToggle && noteToggle.dataset.noteToggle === "true") {
        const noteId = noteToggle.dataset.noteId;
        if (state.openNoteId === noteId) {
          state.openNoteId = null;
        } else {
          await saveOpenNote();
          state.openNoteId = noteId;
        }
        render();
        return;
      }

      const toolbarButton = event.target.closest("[data-rich-command]");
      if (toolbarButton) {
        handleRichCommand(toolbarButton.dataset.richCommand);
      }
    });

    document.addEventListener("input", (event) => {
      const projectTitleInput = event.target.closest("[data-project-title-input]");
      if (projectTitleInput) {
        state.projectInput = projectTitleInput.value;
        return;
      }

      const projectSourceInput = event.target.closest("[data-project-source-input]");
      if (projectSourceInput) {
        state.projectSourceInput = projectSourceInput.value;
        return;
      }

      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "INPUT") {
        const taskId = taskInput.dataset.taskId;
        state.taskEdits[taskId] = taskInput.value;
        debounceTaskSave(taskId);
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "INPUT") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        if (draft) draft.title = draftInput.value;
        return;
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        state.noteTitleEdits[noteTitle.dataset.noteTitleId] = noteTitle.value;
        debounceNoteSave(noteTitle.dataset.noteTitleId);
        return;
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        state.noteBodyEdits[markdownBody.dataset.noteBodyId] = markdownBody.value;
        debounceNoteSave(markdownBody.dataset.noteBodyId);
        return;
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        state.noteHtmlEdits[cleanEditor.dataset.noteCleanId] = cleanEditor.innerHTML;
        debounceNoteSave(cleanEditor.dataset.noteCleanId);
      }
    });

    document.addEventListener("keydown", async (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "INPUT") {
        if (event.key === "Enter") {
          event.preventDefault();
          await saveTask(taskInput.dataset.taskId);
          insertDraftAfter(taskInput.dataset.taskId);
          render();
        }
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "INPUT") {
        const draftKey = draftInput.dataset.taskDraftKey;
        const draft = getDraft(draftKey);
        if (!draft) return;

        if (event.key === "Enter") {
          event.preventDefault();
          await commitDraftTask(draft);
        } else if (event.key === "Backspace" && !draft.title) {
          removeDraft(draftKey);
          render();
        } else if (event.key === "Escape") {
          removeDraft(draftKey);
          render();
        }
        return;
      }

      const projectInput = event.target.closest("[data-project-title-input], [data-project-source-input]");
      if (projectInput && event.key === "Enter") {
        event.preventDefault();
        if (state.projectTrayMode === "new") {
          await submitProjectCreate("new", state.projectInput, null);
        } else if (state.projectTrayMode === "github") {
          await submitProjectCreate("github", state.projectInput, state.projectSourceInput);
        } else if (state.projectTrayMode === "local" && state.projectPickerFallback) {
          await submitProjectCreate("local", state.projectInput, state.projectSourceInput);
        }
      }
    });

    document.addEventListener("blur", async (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "INPUT") {
        await saveTask(taskInput.dataset.taskId);
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "INPUT") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        if (!draft) return;
        if (draft.title.trim()) {
          await commitDraftTask(draft);
        } else {
          removeDraft(draft.key);
          render();
        }
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        await saveNote(noteTitle.dataset.noteTitleId);
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        await saveNote(markdownBody.dataset.noteBodyId);
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        await saveNote(cleanEditor.dataset.noteCleanId);
      }
    }, true);

    document.addEventListener("change", async (event) => {
      const taskCheck = event.target.closest("[data-task-check-id]");
      if (taskCheck) {
        await toggleTask(taskCheck.dataset.taskCheckId, taskCheck.checked ? "done" : "todo");
        return;
      }

      const doneCheck = event.target.closest("[data-done-check-id]");
      if (doneCheck) {
        await toggleTask(doneCheck.dataset.doneCheckId, doneCheck.checked ? "done" : "todo");
      }
    });

    document.addEventListener("dragstart", (event) => {
      const row = event.target.closest("[data-draggable-task-id]");
      if (!row) return;
      state.draggedTaskId = row.dataset.draggableTaskId;
      row.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", state.draggedTaskId);
    });

    document.addEventListener("dragend", (event) => {
      const row = event.target.closest("[data-draggable-task-id]");
      if (row) row.classList.remove("dragging");
    });

    document.addEventListener("dragover", (event) => {
      if (event.target.closest("[data-draggable-task-id]")) {
        event.preventDefault();
      }
    });

    document.addEventListener("drop", async (event) => {
      const target = event.target.closest("[data-draggable-task-id]");
      if (!target || !state.draggedTaskId || !state.workspace) return;
      event.preventDefault();
      const activeIds = state.workspace.active_tasks.map((task) => task.id);
      const fromIndex = activeIds.indexOf(state.draggedTaskId);
      const toIndex = activeIds.indexOf(target.dataset.draggableTaskId);
      if (fromIndex === -1 || toIndex === -1 || fromIndex === toIndex) return;
      activeIds.splice(toIndex, 0, activeIds.splice(fromIndex, 1)[0]);
      const response = await fetchJson("/api/tasks/reorder", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          ordered_active_task_ids: activeIds
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response);
      render();
    });

    async function selectProject(projectId) {
      if (state.selectedProjectId === projectId) return;
      await saveOpenNote();
      const workspace = await fetchJson(`/api/projects/${projectId}/workspace`, {}, "project");
      if (!workspace) return;
      state.selectedProjectId = projectId;
      applyWorkspace(workspace);
      state.taskDrafts = [];
      state.projectTrayMode = null;
      syncLocation();
      render();
    }

    async function submitProjectCreate(mode, title, sourceLocator) {
      const response = await fetchJson("/api/projects", {
        method: "POST",
        body: JSON.stringify({
          mode,
          title: title || null,
          source_locator: sourceLocator || null
        })
      }, "project");
      if (!response) return;
      state.projects = response.projects;
      state.selectedProjectId = response.selected_project_id;
      applyWorkspace(response.workspace, response.workspace?.suggested_open_note_id || null);
      state.projectTrayMode = null;
      state.projectInput = "";
      state.projectSourceInput = "";
      state.projectPickerFallback = false;
      syncLocation();
      render();
    }

    async function pickLocalDirectory() {
      const response = await fetchJson("/api/system/pick-directory", {
        method: "POST"
      }, "project", true);
      if (!response) {
        state.projectPickerFallback = true;
        render();
        return;
      }
      await submitProjectCreate("local", "", response.path);
    }

    async function commitDraftTask(draft) {
      const response = await fetchJson("/api/tasks", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          title: draft.title,
          after_task_id: draft.afterTaskId
        })
      }, "task");
      if (!response) return;
      removeDraft(draft.key);
      applyWorkspace(response.workspace);
      insertDraftAfter(response.created_task_id);
      render();
    }

    async function toggleTask(taskId, status) {
      const task = findTask(taskId);
      if (!task) return;
      const response = await fetchJson(`/api/tasks/${taskId}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: task.revision,
          status
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response.workspace);
      render();
    }

    async function saveTask(taskId) {
      if (!Object.prototype.hasOwnProperty.call(state.taskEdits, taskId)) return;
      const task = findTask(taskId);
      if (!task) return;
      const title = state.taskEdits[taskId];
      if (title === task.title) {
        delete state.taskEdits[taskId];
        return;
      }
      const response = await fetchJson(`/api/tasks/${taskId}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: task.revision,
          title
        })
      }, "task");
      if (!response) return;
      delete state.taskEdits[taskId];
      state.workspace = response.workspace;
      todoStatus.textContent = "saved";
    }

    async function saveOpenNote() {
      if (!state.openNoteId) return;
      await saveNote(state.openNoteId);
    }

    async function saveNote(noteId) {
      if (!state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return;

      const title = Object.prototype.hasOwnProperty.call(state.noteTitleEdits, noteId)
        ? state.noteTitleEdits[noteId]
        : note.title;
      const body = state.noteMode === "clean"
        ? cleanHtmlToMarkdown(state.noteHtmlEdits[noteId] ?? getCurrentCleanHtml(noteId) ?? note.rendered_html)
        : (Object.prototype.hasOwnProperty.call(state.noteBodyEdits, noteId)
          ? state.noteBodyEdits[noteId]
          : note.body);

      if (title === note.title && body === note.body) {
        delete state.noteTitleEdits[noteId];
        delete state.noteBodyEdits[noteId];
        delete state.noteHtmlEdits[noteId];
        return;
      }

      const response = await fetchJson(`/api/notes/${noteId}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: note.revision,
          title,
          body
        })
      }, "note");
      if (!response) return;
      delete state.noteTitleEdits[noteId];
      delete state.noteBodyEdits[noteId];
      delete state.noteHtmlEdits[noteId];
      state.workspace = response.workspace;
      noteMessage.innerHTML = "";
    }

    function debounceTaskSave(taskId) {
      clearTimeout(state.taskTimers[taskId]);
      todoStatus.textContent = "saving…";
      state.taskTimers[taskId] = setTimeout(() => {
        saveTask(taskId);
      }, 400);
    }

    function debounceNoteSave(noteId) {
      clearTimeout(state.noteTimers[noteId]);
      state.noteTimers[noteId] = setTimeout(() => {
        saveNote(noteId);
      }, 500);
    }

    function applyWorkspace(workspace, preferredOpenNoteId = null) {
      state.workspace = workspace;
      state.openNoteId = preferredOpenNoteId || state.openNoteId || workspace?.suggested_open_note_id || null;
      if (state.workspace && state.openNoteId) {
        const exists = state.workspace.notes.some((note) => note.id === state.openNoteId);
        if (!exists) {
          state.openNoteId = state.workspace.suggested_open_note_id || null;
        }
      }
      ensureDraftRow();
      syncLocation();
    }

    function ensureDraftRow() {
      if (!state.workspace) return;
      if (state.workspace.active_tasks.length === 0 && state.taskDrafts.length === 0) {
        insertDraftAfter(null);
      }
    }

    function insertDraftAfter(afterTaskId) {
      const key = `draft-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.afterTaskId !== afterTaskId || draft.title);
      state.taskDrafts.push({ key, afterTaskId, title: "" });
      state.focusDraftKey = key;
    }

    function removeDraft(key) {
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.key !== key);
      if (!state.taskDrafts.length && state.workspace?.active_tasks.length === 0) {
        insertDraftAfter(null);
      }
    }

    function getDraft(key) {
      return state.taskDrafts.find((draft) => draft.key === key);
    }

    function findTask(taskId) {
      if (!state.workspace) return null;
      return state.workspace.active_tasks.find((task) => task.id === taskId)
        || state.workspace.done_tasks.find((task) => task.id === taskId)
        || null;
    }

    function render() {
      renderProjectTray();
      renderProjects();
      renderTasks();
      renderNotes();
      updateModeButtons();
      applyFocus();
    }

    function renderProjectTray() {
      if (!state.projectTrayMode) {
        projectTray.innerHTML = state.projectMessage ? `<div class="message error">${escapeHtml(state.projectMessage)}</div>` : "";
        return;
      }

      if (state.projectTrayMode === "chooser") {
        projectTray.innerHTML = `
          <div class="inline-shell">
            <div class="inline-row">
              <button class="text-btn" type="button" data-project-chooser="new">new</button>
              <button class="text-btn" type="button" data-project-chooser="local">local</button>
              <button class="text-btn" type="button" data-project-chooser="github">github</button>
            </div>
          </div>
        `;
        return;
      }

      if (state.projectTrayMode === "new") {
        projectTray.innerHTML = `
          <div class="inline-shell">
            <input class="text-input" type="text" placeholder="project title" value="${escapeAttribute(state.projectInput)}" data-project-title-input>
            <div class="inline-row">
              <button class="text-btn" type="button" data-project-submit="new">create</button>
              <button class="text-btn" type="button" data-project-tray-cancel>cancel</button>
            </div>
          </div>
        `;
        projectTray.querySelector("[data-project-submit]").addEventListener("click", () => {
          submitProjectCreate("new", state.projectInput, null);
        });
        return;
      }

      if (state.projectTrayMode === "github") {
        projectTray.innerHTML = `
          <div class="inline-shell">
            <input class="text-input" type="text" placeholder="optional title" value="${escapeAttribute(state.projectInput)}" data-project-title-input>
            <input class="path-input" type="text" placeholder="https://github.com/org/repo" value="${escapeAttribute(state.projectSourceInput)}" data-project-source-input>
            <div class="inline-row">
              <button class="text-btn" type="button" data-project-submit="github">connect</button>
              <button class="text-btn" type="button" data-project-tray-cancel>cancel</button>
            </div>
          </div>
        `;
        projectTray.querySelector("[data-project-submit]").addEventListener("click", () => {
          submitProjectCreate("github", state.projectInput, state.projectSourceInput);
        });
        return;
      }

      if (state.projectTrayMode === "local") {
        projectTray.innerHTML = `
          <div class="inline-shell">
            <div class="inline-row">
              <button class="text-btn" type="button" data-pick-local>pick folder</button>
              <button class="text-btn" type="button" data-project-tray-cancel>cancel</button>
            </div>
            ${state.projectPickerFallback ? `
              <input class="text-input" type="text" placeholder="optional title" value="${escapeAttribute(state.projectInput)}" data-project-title-input>
              <input class="path-input" type="text" placeholder="/absolute/path/to/project" value="${escapeAttribute(state.projectSourceInput)}" data-project-source-input>
              <div class="inline-row">
                <button class="text-btn" type="button" data-project-submit="local">connect path</button>
              </div>
            ` : ""}
          </div>
        `;
        projectTray.querySelector("[data-pick-local]").addEventListener("click", () => {
          pickLocalDirectory();
        });
        const submit = projectTray.querySelector("[data-project-submit]");
        if (submit) {
          submit.addEventListener("click", () => {
            submitProjectCreate("local", state.projectInput, state.projectSourceInput);
          });
        }
      }
    }

    function renderProjects() {
      if (!state.projects.length) {
        projectList.innerHTML = `<div class="empty-state">No projects yet. Use the plus button to create a project, link a local folder, or connect a GitHub repo.</div>`;
        return;
      }

      projectList.innerHTML = state.projects.map((project) => `
        <button
          class="project-card ${project.id === state.selectedProjectId ? "active" : ""}"
          type="button"
          data-project-id="${project.id}"
        >
          <span class="project-card-title">${escapeHtml(project.title)}</span>
          <span class="source-badge">${sourceBadge(project.source_kind)}</span>
        </button>
      `).join("");
    }

    function renderTasks() {
      taskMessage.innerHTML = state.taskMessage ? `<div class="message error">${escapeHtml(state.taskMessage)}</div>` : "";
      if (!state.workspace) {
        activeTaskList.innerHTML = `<div class="empty-state">Select or create a project to start a to-do list.</div>`;
        doneTaskList.innerHTML = "";
        todoStatus.textContent = "idle";
        return;
      }

      ensureDraftRow();

      const activeRows = [];
      const draftsByAfter = new Map();
      state.taskDrafts.forEach((draft) => {
        const key = draft.afterTaskId ?? "__top__";
        if (!draftsByAfter.has(key)) draftsByAfter.set(key, []);
        draftsByAfter.get(key).push(draft);
      });

      if (draftsByAfter.has("__top__")) {
        draftsByAfter.get("__top__").forEach((draft) => activeRows.push(renderDraftRow(draft)));
      }

      state.workspace.active_tasks.forEach((task) => {
        activeRows.push(`
          <div
            class="task-row"
            draggable="true"
            data-draggable-task-id="${task.id}"
          >
            <span class="drag-handle">::</span>
            <input class="task-check" type="checkbox" data-task-check-id="${task.id}">
            <input class="task-input" type="text" value="${escapeAttribute(state.taskEdits[task.id] ?? task.title)}" placeholder="new task" data-task-id="${task.id}">
          </div>
        `);

        const drafts = draftsByAfter.get(task.id);
        if (drafts) {
          drafts.forEach((draft) => activeRows.push(renderDraftRow(draft)));
        }
      });

      activeTaskList.innerHTML = activeRows.join("");

      if (!state.workspace.done_tasks.length) {
        doneTaskList.innerHTML = `<div class="empty-state">Completed tasks will land here as a running changelog.</div>`;
      } else {
        doneTaskList.innerHTML = state.workspace.done_tasks.map((task) => `
          <label class="done-row">
            <input class="done-check" type="checkbox" checked data-done-check-id="${task.id}">
            <span class="done-title">${escapeHtml(task.title || "Untitled task")}</span>
            <span class="muted">${escapeHtml(task.completed_at_label || task.updated_at_label)}</span>
          </label>
        `).join("");
      }

      todoStatus.textContent = `${state.workspace.active_tasks.length} active`;
    }

    function renderDraftRow(draft) {
      return `
        <div class="task-draft">
          <span class="drag-handle">+</span>
          <span></span>
          <input
            class="task-input"
            type="text"
            value="${escapeAttribute(draft.title)}"
            placeholder="new task"
            data-task-draft-key="${draft.key}"
          >
        </div>
      `;
    }

    function renderNotes() {
      noteMessage.innerHTML = state.noteMessage ? `<div class="message error">${escapeHtml(state.noteMessage)}</div>` : "";
      if (!state.workspace) {
        notesList.innerHTML = `<div class="empty-state">Select or create a project to start collecting notes.</div>`;
        return;
      }

      if (!state.workspace.notes.length) {
        notesList.innerHTML = `<div class="empty-state">Use the plus button to create the first project note.</div>`;
        return;
      }

      notesList.innerHTML = state.workspace.notes.map((note) => {
        const isOpen = state.openNoteId === note.id;
        return `
          <section class="note-card ${isOpen ? "open" : ""}">
            <button class="note-toggle" type="button" data-note-id="${note.id}" data-note-toggle="true">
              <span>${escapeHtml(note.title)}</span>
              <span class="muted">${escapeHtml(note.updated_at_label)}</span>
            </button>
            ${isOpen ? renderOpenNote(note) : ""}
          </section>
        `;
      }).join("");

      hydrateCleanEditor();
    }

    function renderOpenNote(note) {
      const title = state.noteTitleEdits[note.id] ?? note.title;
      if (state.noteMode === "markdown") {
        const body = state.noteBodyEdits[note.id] ?? note.body;
        return `
          <div class="note-editor">
            <input class="note-title-input" type="text" value="${escapeAttribute(title)}" data-note-title-id="${note.id}">
            <textarea class="markdown-input" data-note-body-id="${note.id}" placeholder="markdown project context">${escapeHtml(body)}</textarea>
            <div class="note-meta">
              <span>${escapeHtml(note.id)}</span>
              <span>${escapeHtml(note.updated_at_label)}</span>
            </div>
          </div>
        `;
      }

      return `
        <div class="note-editor">
          <input class="note-title-input" type="text" value="${escapeAttribute(title)}" data-note-title-id="${note.id}">
          <div class="toolbar">
            <button type="button" data-rich-command="bold">bold</button>
            <button type="button" data-rich-command="italic">italic</button>
            <button type="button" data-rich-command="h2">h2</button>
            <button type="button" data-rich-command="bullet">list</button>
            <button type="button" data-rich-command="checklist">check</button>
            <button type="button" data-rich-command="link">link</button>
          </div>
          <div class="clean-editor" contenteditable="true" data-note-clean-id="${note.id}"></div>
          <div class="note-meta">
            <span>${escapeHtml(note.id)}</span>
            <span>${escapeHtml(note.updated_at_label)}</span>
          </div>
        </div>
      `;
    }

    function hydrateCleanEditor() {
      if (state.noteMode !== "clean" || !state.openNoteId || !state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === state.openNoteId);
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!note || !editor || editor.dataset.hydrated === "true") return;
      editor.innerHTML = normalizeCleanHtml(state.noteHtmlEdits[note.id] ?? note.rendered_html);
      editor.dataset.hydrated = "true";
    }

    function updateModeButtons() {
      document.querySelectorAll("[data-note-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.noteMode === state.noteMode);
      });
    }

    function applyFocus() {
      if (state.focusDraftKey) {
        const input = document.querySelector(`[data-task-draft-key="${state.focusDraftKey}"]`);
        if (input) {
          input.focus();
          state.focusDraftKey = null;
          return;
        }
      }

      if (state.focusNoteId) {
        const input = document.querySelector(`[data-note-title-id="${state.focusNoteId}"]`);
        if (input) {
          input.focus();
          input.select();
          state.focusNoteId = null;
        }
      }
    }

    function sourceBadge(kind) {
      if (kind === "local") return "L";
      if (kind === "github") return "GH";
      return "N";
    }

    function syncLocation() {
      const url = new URL(window.location.href);
      if (state.selectedProjectId) {
        url.searchParams.set("project_id", state.selectedProjectId);
      } else {
        url.searchParams.delete("project_id");
      }
      history.replaceState({}, "", url.toString());
    }

    function handleRichCommand(command) {
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!editor) return;
      editor.focus();
      if (command === "bold") {
        document.execCommand("bold");
      } else if (command === "italic") {
        document.execCommand("italic");
      } else if (command === "h2") {
        document.execCommand("formatBlock", false, "h2");
      } else if (command === "bullet") {
        document.execCommand("insertUnorderedList");
      } else if (command === "checklist") {
        document.execCommand("insertHTML", false, "<ul><li><input type='checkbox'> checklist item</li></ul>");
      } else if (command === "link") {
        const href = window.prompt("Link URL");
        if (href) document.execCommand("createLink", false, href);
      }
      state.noteHtmlEdits[state.openNoteId] = editor.innerHTML;
      debounceNoteSave(state.openNoteId);
    }

    function normalizeCleanHtml(html) {
      const container = document.createElement("div");
      container.innerHTML = html || "<p></p>";
      container.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.removeAttribute("disabled");
      });
      return container.innerHTML;
    }

    function getCurrentCleanHtml(noteId) {
      const editor = document.querySelector(`[data-note-clean-id="${noteId}"]`);
      return editor ? editor.innerHTML : null;
    }

    function cleanHtmlToMarkdown(html) {
      const container = document.createElement("div");
      container.innerHTML = html || "";
      const markdown = serializeBlockChildren(container).trim();
      return markdown ? `${markdown}\n` : "";
    }

    function serializeBlockChildren(node) {
      const parts = [];
      node.childNodes.forEach((child) => {
        const chunk = serializeNode(child).trimEnd();
        if (chunk) parts.push(chunk);
      });
      return parts.join("\n\n");
    }

    function serializeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent.replace(/\u00a0/g, " ");
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const tag = node.tagName.toLowerCase();
      if (tag === "br") return "\n";
      if (tag === "h1") return `# ${serializeInline(node).trim()}`;
      if (tag === "h2") return `## ${serializeInline(node).trim()}`;
      if (tag === "h3") return `### ${serializeInline(node).trim()}`;
      if (tag === "p" || tag === "div") return serializeInline(node).trim();
      if (tag === "ul") {
        return Array.from(node.children).map((child) => serializeListItem(child)).join("\n");
      }
      if (tag === "ol") {
        return Array.from(node.children).map((child, index) => `${index + 1}. ${serializeInline(child).trim()}`).join("\n");
      }
      return serializeInline(node).trim();
    }

    function serializeListItem(node) {
      if (!node || node.tagName.toLowerCase() !== "li") return "";
      const checkbox = node.querySelector(":scope > input[type='checkbox']");
      const checkboxPrefix = checkbox ? `- [${checkbox.checked ? "x" : " "}] ` : "- ";
      const clone = node.cloneNode(true);
      clone.querySelectorAll("input[type='checkbox']").forEach((input) => input.remove());
      return `${checkboxPrefix}${serializeInline(clone).trim()}`;
    }

    function serializeInline(node) {
      let text = "";
      node.childNodes.forEach((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          text += child.textContent.replace(/\u00a0/g, " ");
          return;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = child.tagName.toLowerCase();
        if (tag === "strong" || tag === "b") {
          text += `**${serializeInline(child)}**`;
        } else if (tag === "em" || tag === "i") {
          text += `*${serializeInline(child)}*`;
        } else if (tag === "a") {
          text += `[${serializeInline(child)}](${child.getAttribute("href") || ""})`;
        } else if (tag === "br") {
          text += "\n";
        } else if (tag === "input" && child.type === "checkbox") {
          text += "";
        } else {
          text += serializeInline(child);
        }
      });
      return text;
    }

    async function fetchJson(url, options = {}, channel = "task", allowFailure = false) {
      try {
        const response = await fetch(url, {
          headers: {
            "Content-Type": "application/json"
          },
          ...options
        });
        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          const message = payload?.error || `Request failed (${response.status})`;
          if (channel === "project") state.projectMessage = message;
          if (channel === "task") state.taskMessage = message;
          if (channel === "note") state.noteMessage = message;
          if (!allowFailure) render();
          return null;
        }
        if (channel === "project") state.projectMessage = "";
        if (channel === "task") state.taskMessage = "";
        if (channel === "note") state.noteMessage = "";
        return response.status === 204 ? null : response.json();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (channel === "project") state.projectMessage = message;
        if (channel === "task") state.taskMessage = message;
        if (channel === "note") state.noteMessage = message;
        if (!allowFailure) render();
        return null;
      }
    }

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value = "") {
      return escapeHtml(value);
    }

    render();
  </script>
</body>
</html>
