        const payload = response.status === 204
          ? null
          : await response.json().catch(() => null);
        return {
          ok: response.ok,
          status: response.status,
          payload,
          error: null
        };
      } catch (error) {
        return {
          ok: false,
          status: 0,
          payload: null,
          error: error instanceof Error ? error.message : String(error)
        };
      }
    }

    function getDraftNoteTitle(noteId, note) {
      if (note.sync_kind) return note.title;
      return Object.prototype.hasOwnProperty.call(state.noteTitleEdits, noteId)
        ? state.noteTitleEdits[noteId]
        : note.title;
    }

    function getDraftNoteBody(noteId, note) {
      return state.noteMode === "clean"
        ? cleanHtmlToMarkdown(state.noteHtmlEdits[noteId] ?? getCurrentCleanHtml(noteId) ?? note.rendered_html)
        : (Object.prototype.hasOwnProperty.call(state.noteBodyEdits, noteId)
          ? state.noteBodyEdits[noteId]
          : note.body);
    }

    function clearNoteDraftEdits(noteId) {
      delete state.noteTitleEdits[noteId];
      delete state.noteBodyEdits[noteId];
      delete state.noteHtmlEdits[noteId];
    }

    async function saveNote(noteId, conflictMode = "prompt") {
      if (!state.workspace) return false;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return false;

      const title = getDraftNoteTitle(noteId, note);
      const body = getDraftNoteBody(noteId, note);

      if (title === note.title && body === note.body) {
        clearNoteDraftEdits(noteId);
        if (state.noteRevisionConflict?.noteId === noteId) {
          state.noteRevisionConflict = null;
          state.noteMessage = "";
        }
        return true;
      }

      const baseTitle = note.title;
      const baseBody = note.body;
      let request = await patchNoteRequest(noteId, note.revision, title, body);

      if (!request.ok && request.status === 409 && state.selectedProjectId) {
        const latestWorkspace = await fetchJson(
          `/api/projects/${state.selectedProjectId}/workspace`,
          {},
          "note",
          true
        );

        if (latestWorkspace) {
          state.workspace = mergeWorkspacePreservingNoteOrder(state.workspace, latestWorkspace);
          const latestNote = state.workspace?.notes?.find((item) => item.id === noteId) || null;
          if (!latestNote) {
            state.noteRevisionConflict = null;
            state.noteMessage = "note changed in the background and is no longer available";
            render();
            return false;
          }
          const metadataOnlyConflict = latestNote.title === baseTitle
            && latestNote.body === baseBody;

          if (metadataOnlyConflict || conflictMode === "overwrite") {
            request = await patchNoteRequest(noteId, latestNote.revision, title, body);
          } else {
            state.noteRevisionConflict = { noteId };
            state.noteMessage = "";
            render();
            return false;
          }
        }
      }

      if (!request.ok) {
        state.noteMessage = request.error
          || request.payload?.error
          || `Request failed (${request.status || "network"})`;
        render();
        return false;
      }

      clearNoteDraftEdits(noteId);
      state.workspace = mergeWorkspacePreservingNoteOrder(state.workspace, request.payload.workspace);
      state.noteRevisionConflict = null;
      state.noteMessage = "";
      noteMessage.innerHTML = "";
      return true;
    }

    async function resolveNoteRevisionConflict(noteId, source) {
      if (!noteId) return;

      if (source === "latest") {
        clearNoteDraftEdits(noteId);
        if (state.noteRevisionConflict?.noteId === noteId) {
          state.noteRevisionConflict = null;
        }
        state.noteMessage = "";
        render();
        return;
      }

      if (source !== "local") return;
      await saveNote(noteId, "overwrite");
      render();
    }

    function debounceTaskSave(taskId) {
      clearTimeout(state.taskTimers[taskId]);
      todoStatus.textContent = "saving…";
      state.taskTimers[taskId] = setTimeout(() => {
        saveTask(taskId);
      }, 400);
    }

    function debounceNoteSave(noteId) {
      clearTimeout(state.noteTimers[noteId]);
      state.noteTimers[noteId] = setTimeout(() => {
        saveNote(noteId);
      }, 500);
    }

    function mergeWorkspacePreservingNoteOrder(currentWorkspace, nextWorkspace) {
      if (!nextWorkspace || !currentWorkspace) return nextWorkspace;

      const currentNotes = Array.isArray(currentWorkspace.notes) ? currentWorkspace.notes : [];
      const nextNotes = Array.isArray(nextWorkspace.notes) ? nextWorkspace.notes : [];
      if (!currentNotes.length || !nextNotes.length) {
        return nextWorkspace;
      }

      const nextNotesById = new Map(nextNotes.map((note) => [note.id, note]));
      const mergedNotes = [];

      currentNotes.forEach((note) => {
        const updated = nextNotesById.get(note.id);
        if (!updated) return;
        mergedNotes.push(updated);
        nextNotesById.delete(note.id);
      });

      nextNotes.forEach((note) => {
        if (!nextNotesById.has(note.id)) return;
        mergedNotes.push(note);
        nextNotesById.delete(note.id);
      });

      return {
        ...nextWorkspace,
        notes: mergedNotes
      };
    }

    function computeUiRefreshToken(payload) {
      if (!payload) return "";

      const projects = Array.isArray(payload.projects)
        ? payload.projects.map((project) => [
          project.id,
          project.revision,
          project.task_sync_status || "",
          project.last_synced_at_label || ""
        ].join(":")).join("|")
        : "";

      const workspace = payload.workspace || null;
      const active = Array.isArray(workspace?.active_tasks)
        ? workspace.active_tasks.map((task) => `${task.id}:${task.revision}`).join("|")
        : "";
      const done = Array.isArray(workspace?.done_tasks)
        ? workspace.done_tasks.map((task) => `${task.id}:${task.revision}`).join("|")
        : "";
      const notes = Array.isArray(workspace?.notes)
        ? workspace.notes.map((note) => `${note.id}:${note.revision}`).join("|")
        : "";

      return [
        projects,
        payload.selected_project_id || "",
        workspace?.project?.revision || "",
        active,
        done,
        notes,
        workspace?.suggested_open_note_id || ""
      ].join("::");
    }

    function isEditorInteractionActive() {
      const active = document.activeElement;
      if (!(active instanceof HTMLElement)) return false;
      return Boolean(active.closest([
        "[data-task-id]",
        "[data-task-draft-key]",
        "[data-note-title-id]",
        "[data-note-body-id]",
        "[data-note-clean-id]",
        "[data-project-input]",
        "[data-project-source]",
        "[data-project-settings-source]"
      ].join(",")));
    }

    function applyRemoteUiStateIfIdle(payload) {
      if (!payload) return;

      const nextPayload = {
        ...payload,
        workspace: payload.workspace && state.workspace
          ? mergeWorkspacePreservingNoteOrder(state.workspace, payload.workspace)
          : payload.workspace
      };
      const currentToken = computeUiRefreshToken({
        projects: state.projects,
        selected_project_id: state.selectedProjectId,
        workspace: state.workspace
      });
      const nextToken = computeUiRefreshToken(nextPayload);
      if (currentToken === nextToken) {
        state.pendingRemoteUiState = null;
        return;
      }

      if (isEditorInteractionActive()) {
        state.pendingRemoteUiState = nextPayload;
        return;
      }

      state.pendingRemoteUiState = null;
      applyUiState(nextPayload);
      render({ preserveShellScroll: true });
    }

    function flushPendingRemoteUiState() {
      if (!state.pendingRemoteUiState) return;
      if (isEditorInteractionActive()) return;
      const pending = state.pendingRemoteUiState;
      state.pendingRemoteUiState = null;
      applyUiState(pending);
      render({ preserveShellScroll: true });
    }

    function scheduleUiRefresh(delay = uiRefreshIntervalMs) {
      clearTimeout(state.uiRefreshTimer);
      state.uiRefreshTimer = window.setTimeout(() => {
        refreshUiStateInBackground();
      }, delay);
    }

    async function refreshUiStateInBackground() {
      state.uiRefreshTimer = null;
      flushPendingRemoteUiState();

      if (state.uiRefreshInFlight) {
        scheduleUiRefresh();
        return;
      }

      if (document.visibilityState === "hidden") {
        scheduleUiRefresh();
        return;
      }

      if (
        !state.selectedProjectId
        || (
          !state.workspace?.project?.task_sync_enabled
          && !workspaceHasBackgroundNoteSync(state.workspace)
        )
      ) {
        scheduleUiRefresh();
        return;
      }

      const projectId = state.selectedProjectId;
      state.uiRefreshInFlight = true;

      try {
        const query = new URLSearchParams({ project_id: projectId });
        const response = await fetch(`/api/ui-state?${query.toString()}`, {
          cache: "no-store"
        });
        if (!response.ok) return;

        const payload = await response.json();
        if (state.selectedProjectId !== projectId) return;
        applyRemoteUiStateIfIdle(payload);
      } catch (_error) {
        // Ignore background refresh failures; the next poll will retry.
      } finally {
        state.uiRefreshInFlight = false;
        scheduleUiRefresh();
      }
    }

    function captureNodeScrollState(node) {
      if (!(node instanceof HTMLElement)) return null;
      const maxScrollTop = Math.max(0, node.scrollHeight - node.clientHeight);
      return {
        node,
        top: node.scrollTop,
        ratio: maxScrollTop > 0 ? node.scrollTop / maxScrollTop : 0,
      };
    }

    function captureShellScrollState() {
      return [
        captureNodeScrollState(projectsPaneBody),
        captureNodeScrollState(activeTaskList),
        captureNodeScrollState(changelogBody),
        captureNodeScrollState(doneTaskList),
        captureNodeScrollState(notesPaneBody),
      ].filter(Boolean);
    }

    function restoreShellScrollState(scrollState) {
      if (!Array.isArray(scrollState) || !scrollState.length) return;

      scrollState.forEach((entry) => {
        if (!entry?.node?.isConnected) return;
        const maxScrollTop = Math.max(0, entry.node.scrollHeight - entry.node.clientHeight);
        const desiredTop = maxScrollTop > 0
          ? Math.min(entry.top, Math.round(entry.ratio * maxScrollTop))
          : 0;
        entry.node.scrollTop = desiredTop;
      });

      window.requestAnimationFrame(() => {
        scrollState.forEach((entry) => {
          if (!entry?.node?.isConnected) return;
          const maxScrollTop = Math.max(0, entry.node.scrollHeight - entry.node.clientHeight);
          const desiredTop = maxScrollTop > 0
            ? Math.min(entry.top, Math.round(entry.ratio * maxScrollTop))
            : 0;
          entry.node.scrollTop = desiredTop;
        });
      });
    }

    function workspaceHasBackgroundNoteSync(workspace) {
      const notes = Array.isArray(workspace?.notes) ? workspace.notes : [];
      return notes.some((note) => note.sync_kind && (
        note.sync_status === "live" || note.sync_status === "conflict"
      ));
    }

    function applyWorkspace(workspace, preferredOpenNoteId = null) {
      state.workspace = workspace;
      if (!workspace) {
        setSelectedTaskId(null);
        state.openNoteId = null;
        state.taskDrafts = [];
        state.noteRevisionConflict = null;
        state.pendingRemoteUiState = null;
        syncLocation();
        scheduleUiRefresh();
        return;
      }
      if (!workspace.active_tasks.some((task) => task.id === state.selectedTaskId)) {
        setSelectedTaskId(null);
      }
      state.openNoteId = preferredOpenNoteId || state.openNoteId || workspace?.suggested_open_note_id || null;
      if (state.workspace && state.openNoteId) {
        const exists = state.workspace.notes.some((note) => note.id === state.openNoteId);
        if (!exists) {
          state.openNoteId = state.workspace.suggested_open_note_id || null;
        }
      }
      if (
        state.noteRevisionConflict
        && !workspace.notes.some((note) => note.id === state.noteRevisionConflict.noteId)
      ) {
        state.noteRevisionConflict = null;
      }
      ensureDraftRow();
      syncLocation();
      scheduleUiRefresh();
    }

    function applyUiState(payload) {
      const previousProjectId = state.selectedProjectId;
      state.projects = payload.projects || [];
      state.selectedProjectId = payload.selected_project_id || null;
      if (state.selectedProjectId !== previousProjectId) {
        state.noteRevisionConflict = null;
        state.noteLinkableFiles = [];
        state.noteLinkableFilesLoaded = false;
        state.noteFilePickerLoading = false;
        state.noteFilePickerOpen = false;
      }
      applyWorkspace(payload.workspace || null, payload.workspace?.suggested_open_note_id || null);
    }

    function ensureDraftRow() {
      if (!state.workspace) return;
      if (state.workspace.active_tasks.length === 0 && state.taskDrafts.length === 0) {
        insertDraftAfter(null);
      }
    }

    function insertDraftAfter(afterTaskId) {
      const key = `draft-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.afterTaskId !== afterTaskId || draft.title);
      state.taskDrafts.push({ key, afterTaskId, title: "" });
      state.focusDraftKey = key;
    }

    function removeDraft(key) {
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.key !== key);
      if (!state.taskDrafts.length && state.workspace?.active_tasks.length === 0) {
        insertDraftAfter(null);
      }
    }

    function loadCollapsedTaskSections() {
      try {
        const rawValue = localStorage.getItem(taskSectionCollapseKey);
        if (!rawValue) return {};
        const parsedValue = JSON.parse(rawValue);
        return parsedValue && typeof parsedValue === "object" ? parsedValue : {};
      } catch (_error) {
        return {};
      }
    }

    function loadCollapsedDoneTaskSections() {
      try {
        const rawValue = localStorage.getItem(doneTaskSectionCollapseKey);
        if (!rawValue) return {};
        const parsedValue = JSON.parse(rawValue);
        return parsedValue && typeof parsedValue === "object" ? parsedValue : {};
      } catch (_error) {
        return {};
      }
    }

    function saveCollapsedTaskSections() {
      try {
        localStorage.setItem(taskSectionCollapseKey, JSON.stringify(state.collapsedTaskSections));
      } catch (_error) {
        // Ignore storage failures and keep the in-memory state active.
      }
    }

    function saveCollapsedDoneTaskSections() {
      try {
        localStorage.setItem(doneTaskSectionCollapseKey, JSON.stringify(state.collapsedDoneTaskSections));
      } catch (_error) {
        // Ignore storage failures and keep the in-memory state active.
      }
    }

    function getProjectCollapsedTaskSections(projectId = state.selectedProjectId) {
      if (!projectId) return {};
      const sections = state.collapsedTaskSections?.[projectId];
      return sections && typeof sections === "object" ? sections : {};
    }

    function getProjectCollapsedDoneTaskSections(projectId = state.selectedProjectId) {
      if (!projectId) return {};
      const sections = state.collapsedDoneTaskSections?.[projectId];
      return sections && typeof sections === "object" ? sections : {};
    }

    function isTaskSectionCollapsed(taskId, projectId = state.selectedProjectId) {
      if (!taskId || !projectId) return false;
      return getProjectCollapsedTaskSections(projectId)[taskId] === true;
    }

    function isDoneTaskSectionCollapsed(taskId, projectId = state.selectedProjectId) {
      if (!taskId || !projectId) return false;
      return getProjectCollapsedDoneTaskSections(projectId)[taskId] === true;
    }

    function setTaskSectionCollapsed(taskId, collapsed) {
      if (!taskId || !state.selectedProjectId) return;

      const projectId = state.selectedProjectId;
      const nextProjectSections = { ...getProjectCollapsedTaskSections(projectId) };
      if (collapsed) {
        nextProjectSections[taskId] = true;
      } else {
        delete nextProjectSections[taskId];
      }

      const nextSections = { ...state.collapsedTaskSections };
      if (Object.keys(nextProjectSections).length) {
        nextSections[projectId] = nextProjectSections;
      } else {
        delete nextSections[projectId];
      }

      state.collapsedTaskSections = nextSections;
      saveCollapsedTaskSections();
    }

    function setDoneTaskSectionCollapsed(taskId, collapsed) {
      if (!taskId || !state.selectedProjectId) return;

      const projectId = state.selectedProjectId;
      const nextProjectSections = { ...getProjectCollapsedDoneTaskSections(projectId) };
      if (collapsed) {
        nextProjectSections[taskId] = true;
      } else {
        delete nextProjectSections[taskId];
      }

      const nextSections = { ...state.collapsedDoneTaskSections };
      if (Object.keys(nextProjectSections).length) {
        nextSections[projectId] = nextProjectSections;
      } else {
        delete nextSections[projectId];
      }

      state.collapsedDoneTaskSections = nextSections;
      saveCollapsedDoneTaskSections();
    }

    function toggleTaskSection(taskId) {
      if (!taskId) return;
      setTaskSectionCollapsed(taskId, !isTaskSectionCollapsed(taskId));
      render();
    }

    function toggleDoneTaskSection(taskId) {
      if (!taskId) return;
      setDoneTaskSectionCollapsed(taskId, !isDoneTaskSectionCollapsed(taskId));
      render();
    }

    function getDraft(key) {
      return state.taskDrafts.find((draft) => draft.key === key);
    }

    function findTask(taskId) {
      if (!state.workspace) return null;
      return state.workspace.active_tasks.find((task) => task.id === taskId)
        || state.workspace.done_tasks.find((task) => task.id === taskId)
        || null;
    }

    function isHeaderShortcut(event) {
      return (event.metaKey || event.ctrlKey)
        && event.shiftKey
        && String(event.key).toLowerCase() === "h";
    }

    function toHeadingTitle(title = "") {
      const rawTitle = String(title);
      if (isMarkdownTaskHeading(rawTitle)) return rawTitle;
      const trimmed = rawTitle.trim();
      return trimmed ? `## ${trimmed}` : "## ";
    }

    function toggleHeadingTitle(title = "") {
      const rawTitle = String(title);
      return isMarkdownTaskHeading(rawTitle)
        ? getVisibleTaskTitle(rawTitle)
        : toHeadingTitle(rawTitle);
    }

    function toggleTaskHeading(taskId) {
      if (!taskId) return;
      const task = findTask(taskId);
      const rawTitle = state.taskEdits[taskId] ?? task?.title ?? "";
      const nextTitle = toggleHeadingTitle(rawTitle);
      if (nextTitle === rawTitle) return;

      state.taskEdits[taskId] = nextTitle;
      state.focusTaskId = taskId;
      debounceTaskSave(taskId);
      render();
    }

    function setSelectedTaskId(taskId) {
      const nextTaskId = taskId || null;
      if (state.selectedTaskId === nextTaskId) return;
      state.selectedTaskId = nextTaskId;
      renderTodoTaskActionButtons();
    }

    function getSelectedActiveTask() {
      if (!state.workspace || !state.selectedTaskId) return null;
      return state.workspace.active_tasks.find((task) => task.id === state.selectedTaskId) || null;
    }

    function getSelectedActiveTaskId() {
      return getSelectedActiveTask()?.id || null;
    }

    function toggleDraftHeading(draftKey) {
      const draft = getDraft(draftKey);
      if (!draft) return;

      const nextTitle = toggleHeadingTitle(draft.title);
      if (nextTitle === draft.title) return;

      draft.title = nextTitle;
      state.focusDraftKey = draft.key;
      render();
    }

    function clearTaskDropIndicator() {
      document.querySelectorAll(".task-row.drop-before, .task-row.drop-after").forEach((row) => {
        row.classList.remove("drop-before", "drop-after");
      });
    }

    function setTaskDropIndicator(taskId, position) {
      if (!taskId || !position) {
        clearTaskDropIndicator();
        return;
      }

      document.querySelectorAll(".task-row").forEach((row) => {
        const isTarget = row.dataset.draggableTaskId === taskId;
        row.classList.toggle("drop-before", isTarget && position === "before");
        row.classList.toggle("drop-after", isTarget && position === "after");
      });
    }

    function resolveTaskDropLocation(clientY) {
      const rows = Array.from(activeTaskList.querySelectorAll("[data-draggable-task-id]"));
      if (!rows.length) return null;

      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        const midpoint = rect.top + (rect.height / 2);
        if (clientY < midpoint) {
          return {
            taskId: row.dataset.draggableTaskId,
            position: "before"
          };
        }
      }

      const lastRow = rows[rows.length - 1];
      return {
        taskId: lastRow.dataset.draggableTaskId,
        position: "after"
      };
    }

    function getTaskHeadingLabel(title = "") {
      const match = /^\s*##(?=\s|$)\s*(.*)$/.exec(String(title));
      if (!match) return null;
      return match[1];
    }

    function isMarkdownTaskHeading(title = "") {
      return getTaskHeadingLabel(title) !== null;
    }

    function getVisibleTaskTitle(title = "") {
      const headingLabel = getTaskHeadingLabel(title);
      return headingLabel !== null ? headingLabel : String(title);
    }

    function normalizeTaskEditorValue(value = "") {
      return String(value).replace(/\r\n?|\n/g, " ");
    }

    function readCssPixels(style, propertyName) {
      const value = Number.parseFloat(style.getPropertyValue(propertyName));
      return Number.isFinite(value) ? value : 0;
    }

    function measureTextElementHeight(element, textValue = "") {
      if (!(element instanceof HTMLElement) || !(taskInputMeasure instanceof HTMLElement)) return null;

      const elementRect = element.getBoundingClientRect();
      const width = Math.ceil(elementRect.width);
      if (width <= 0) return null;

      const styles = window.getComputedStyle(element);
      taskInputMeasure.style.width = `${width}px`;
      taskInputMeasure.style.fontFamily = styles.fontFamily;
      taskInputMeasure.style.fontSize = styles.fontSize;
      taskInputMeasure.style.fontWeight = styles.fontWeight;
      taskInputMeasure.style.fontStyle = styles.fontStyle;
      taskInputMeasure.style.fontStretch = styles.fontStretch;
      taskInputMeasure.style.fontVariant = styles.fontVariant;
      taskInputMeasure.style.fontKerning = styles.fontKerning;
      taskInputMeasure.style.letterSpacing = styles.letterSpacing;
      taskInputMeasure.style.lineHeight = styles.lineHeight;
      taskInputMeasure.style.textTransform = styles.textTransform;
      taskInputMeasure.style.textIndent = styles.textIndent;
      taskInputMeasure.style.wordSpacing = styles.wordSpacing;
      taskInputMeasure.style.whiteSpace = styles.whiteSpace;
      taskInputMeasure.style.overflowWrap = styles.overflowWrap;
      taskInputMeasure.style.wordBreak = styles.wordBreak;
      taskInputMeasure.textContent = `${textValue}\u200b`;

      const measuredHeight = Math.ceil(taskInputMeasure.getBoundingClientRect().height);
      taskInputMeasure.textContent = "";
      return measuredHeight > 0 ? measuredHeight : null;
    }

    function measureTaskInputHeight(input) {
      if (!(input instanceof HTMLTextAreaElement)) return null;
      return measureTextElementHeight(input, input.value);
    }

    function syncTaskRowHeight(row) {
      if (!(row instanceof HTMLElement)) return;

      const textElement = row.querySelector(".task-input, .done-title, .done-section-title");
      if (!(textElement instanceof HTMLElement)) return;

      const textHeight = textElement instanceof HTMLTextAreaElement
        ? measureTaskInputHeight(textElement)
        : measureTextElementHeight(textElement, textElement.textContent || "");
      if (!textHeight) return;

      const rowStyles = window.getComputedStyle(row);
      const floor = readCssPixels(rowStyles, "--task-row-floor");
      const verticalChrome = readCssPixels(rowStyles, "--task-row-vertical-chrome");
      const nextRowMinHeight = `${Math.max(floor, textHeight + verticalChrome)}px`;

      if (textElement instanceof HTMLTextAreaElement) {
        const nextInputHeight = `${textHeight}px`;
        if (textElement.style.height !== nextInputHeight) {
          textElement.style.height = nextInputHeight;
        }
      } else {
        const nextTextMinHeight = `${textHeight}px`;
        if (textElement.style.minHeight !== nextTextMinHeight) {
          textElement.style.minHeight = nextTextMinHeight;
        }
      }
      if (row.style.minHeight !== nextRowMinHeight) {
        row.style.minHeight = nextRowMinHeight;
      }
    }

    function syncTaskRowFromInput(input) {
      if (!(input instanceof HTMLTextAreaElement)) return;
      syncTaskRowHeight(input.closest(".task-row, .task-draft"));
    }

    function syncAllTaskRowHeights() {
      document.querySelectorAll(".task-row, .task-draft, .done-row, .done-section-heading").forEach((row) => {
        syncTaskRowHeight(row);
      });
    }

    function scheduleTaskRowSync() {
      if (taskRowSyncFrame !== null) {
        window.cancelAnimationFrame(taskRowSyncFrame);
      }
      taskRowSyncFrame = window.requestAnimationFrame(() => {
        taskRowSyncFrame = null;
        syncAllTaskRowHeights();
      });
    }

    function expandHeadingInput(input, rawTitle = "") {
      const headingLabel = getTaskHeadingLabel(rawTitle);
      if (!input || headingLabel === null || input.value !== headingLabel) return;

      const rawValue = String(rawTitle);
      input.value = rawValue;
      syncTaskRowFromInput(input);
      window.requestAnimationFrame(() => {
        try {
          input.setSelectionRange(rawValue.length, rawValue.length);
        } catch (_error) {
          // Ignore selection errors for non-text input states.
        }
      });
    }

    function collapseHeadingInput(input, rawTitle = "") {
      const headingLabel = getTaskHeadingLabel(rawTitle);
      if (!input || headingLabel === null) return;
      input.value = headingLabel;
      syncTaskRowFromInput(input);
    }

    function buildActiveTaskSectionState(workspace, draftsByAfter) {
      const sections = new Map();
      const hiddenTaskIds = new Set();
      if (!workspace) return { sections, hiddenTaskIds };
      const sectionRanges = [];
      let currentSectionTaskId = null;

      workspace.active_tasks.forEach((task) => {
        const title = state.taskEdits[task.id] ?? task.title;
        const headingLabel = getTaskHeadingLabel(title);

        if (headingLabel !== null) {
          currentSectionTaskId = headingLabel ? task.id : null;
          if (currentSectionTaskId) {
            sections.set(task.id, {
              collapsed: isTaskSectionCollapsed(task.id),
              itemCount: draftsByAfter.get(task.id)?.length || 0,
              completedItemCount: 0
            });
            sectionRanges.push({
              id: task.id,
              startSortOrder: task.sort_order
            });
          }
          return;
        }

        if (!currentSectionTaskId) return;

        const section = sections.get(currentSectionTaskId);
        if (!section) return;

        section.itemCount += 1;
        section.itemCount += draftsByAfter.get(task.id)?.length || 0;
        if (section.collapsed) {
          hiddenTaskIds.add(task.id);
        }
      });

      if (!sectionRanges.length) {
        return { sections, hiddenTaskIds };
      }

      workspace.done_tasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        for (let index = 0; index < sectionRanges.length; index += 1) {
          const sectionRange = sectionRanges[index];
          const nextSectionRange = sectionRanges[index + 1] || null;
          if (task.sort_order <= sectionRange.startSortOrder) continue;
          if (nextSectionRange && task.sort_order >= nextSectionRange.startSortOrder) continue;

          const section = sections.get(sectionRange.id);
          if (section) {
            section.completedItemCount += 1;
          }
          return;
        }
      });

      return { sections, hiddenTaskIds };
    }

    function buildTaskSectionMap(workspace) {
      const sectionMap = new Map();
      if (!workspace) return sectionMap;

      const orderedTasks = [...workspace.active_tasks, ...workspace.done_tasks]
        .sort((left, right) => left.sort_order - right.sort_order || left.id.localeCompare(right.id));

      let currentSection = null;
      orderedTasks.forEach((task) => {
        const headingLabel = getTaskHeadingLabel(task.title);
        if (headingLabel !== null) {
          currentSection = headingLabel || null;
          sectionMap.set(task.id, currentSection);
          return;
        }

        sectionMap.set(task.id, currentSection);
      });

      return sectionMap;
    }

    function buildTaskSectionCopyText(sectionTaskId) {
      if (!state.workspace || !sectionTaskId) return "";

      const lines = [];
      let inTargetSection = false;

      for (const task of state.workspace.active_tasks) {
        const rawTitle = state.taskEdits[task.id] ?? task.title;
        const headingLabel = getTaskHeadingLabel(rawTitle);

        if (headingLabel !== null) {
          if (task.id === sectionTaskId) {
            lines.push(`## ${headingLabel}`);
            inTargetSection = true;
            continue;
          }

          if (inTargetSection) {
            break;
          }

          continue;
        }

        if (!inTargetSection) continue;
        lines.push(`- [ ] ${getVisibleTaskTitle(rawTitle || "Untitled task")}`);
      }

      return lines.join("\n").trim();
    }

    function buildDoneTaskSectionState(workspace) {
      const sections = new Map();
      const taskToSection = new Map();
      if (!workspace) return { sections, taskToSection };

      const doneTaskIds = new Set(workspace.done_tasks.map((task) => task.id));
      const orderedTasks = [...workspace.active_tasks, ...workspace.done_tasks]
        .sort((left, right) => left.sort_order - right.sort_order || left.id.localeCompare(right.id));

      let currentSectionTaskId = null;
      let currentSectionLabel = null;
      orderedTasks.forEach((task) => {
        const headingLabel = getTaskHeadingLabel(task.title);
        if (headingLabel !== null) {
          currentSectionTaskId = headingLabel ? task.id : null;
          currentSectionLabel = headingLabel || null;
          if (currentSectionTaskId) {
            sections.set(task.id, {
              label: currentSectionLabel,
              collapsed: isDoneTaskSectionCollapsed(task.id),
              itemCount: 0
            });
          }
          return;
        }

        if (!currentSectionTaskId || !doneTaskIds.has(task.id)) return;

        const section = sections.get(currentSectionTaskId);
        if (!section) return;

        section.itemCount += 1;
        taskToSection.set(task.id, {
          id: currentSectionTaskId,
          label: currentSectionLabel
        });
      });

      sections.forEach((section, taskId) => {
        if (section.itemCount === 0) {
          sections.delete(taskId);
        }
      });

      return { sections, taskToSection };
    }

    function renderDoneTaskList(doneTasks, doneSectionState) {
      const rows = [];
      let lastSectionTaskId = null;

      doneTasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        const sectionMeta = doneSectionState.taskToSection.get(task.id) || null;
        const sectionTaskId = sectionMeta?.id || null;
        const section = sectionTaskId ? doneSectionState.sections.get(sectionTaskId) || null : null;

        if (sectionTaskId !== lastSectionTaskId) {
          if (sectionTaskId && section) {
            rows.push(renderDoneSectionHeading(sectionTaskId, section));
          }
          lastSectionTaskId = sectionTaskId;
        }

        if (section?.collapsed) return;
        rows.push(renderDoneTaskRow(task));
      });

      return rows.join("");
    }

    function renderDoneSectionHeading(sectionTaskId, section) {
      if (!sectionTaskId || !section?.label) return "";

      return `
        <div class="done-section-heading">
          <button
            class="task-section-toggle"
            type="button"
            draggable="false"
            data-done-section-toggle-id="${sectionTaskId}"
            aria-expanded="${section.collapsed ? "false" : "true"}"
            aria-label="${section.collapsed ? "Expand section" : "Collapse section"}"
            title="${section.collapsed ? "Expand section" : "Collapse section"}"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 6 6 6-6 6"></path>
            </svg>
          </button>
          <div class="done-section-title">${escapeHtml(section.label)}</div>
        </div>
      `;
    }

    function renderActiveTaskRow(task, sectionState = null) {
      const title = state.taskEdits[task.id] ?? task.title;
      const isHeading = isMarkdownTaskHeading(title);
      const visibleTitle = getVisibleTaskTitle(title);
      const canCollapse = isHeading && sectionState?.itemCount > 0;
      const canCompleteSection = isHeading
        && sectionState?.itemCount === 0
        && sectionState?.completedItemCount > 0;
      const isCollapsed = canCollapse && sectionState.collapsed;
      const completeControl = canCompleteSection
        ? `
          <button
            class="task-heading-complete-btn"
            type="button"
            draggable="false"
            data-task-group-complete-id="${task.id}"
            aria-label="Complete section"
            title="Complete section"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 12.5 10 16.5 18 8.5"></path>
            </svg>
          </button>
        `
        : "";
      const copyControl = isHeading
        ? `
          <button class="task-copy-btn" type="button" draggable="false" data-task-section-copy-id="${task.id}" aria-label="Copy section" title="Copy section">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
              <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
            </svg>
          </button>
        `
        : "";
      const leadingControl = isHeading
        ? (canCollapse
          ? `
            <button
              class="task-section-toggle"
              type="button"
              draggable="false"
              data-task-section-toggle-id="${task.id}"
              aria-expanded="${isCollapsed ? "false" : "true"}"
              aria-label="${isCollapsed ? "Expand section" : "Collapse section"}"
              title="${isCollapsed ? "Expand section" : "Collapse section"}"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m9 6 6 6-6 6"></path>
              </svg>
            </button>
          `
          : "")
        : `<input class="task-check" type="checkbox" data-task-check-id="${task.id}">`;

      return `
        <div
          class="task-row${isHeading ? " is-heading" : ""}${isCollapsed ? " is-collapsed" : ""}"
          draggable="true"
          data-draggable-task-id="${task.id}"
        >
          ${leadingControl}
          <textarea
            class="task-input${isHeading ? " task-heading-input" : ""}"
            rows="1"
            spellcheck="false"
            draggable="false"
            placeholder="new task or ## section"
            data-task-id="${task.id}"
          >${escapeHtml(visibleTitle)}</textarea>
          ${completeControl}
          ${copyControl}
          <button class="task-delete-btn" type="button" draggable="false" data-task-delete-id="${task.id}" aria-label="Delete task" title="Delete task">×</button>
        </div>
      `;
    }

    function renderDoneTaskRow(task) {
      return `
        <div class="done-row" data-done-row-id="${task.id}">
          <input class="done-check" type="checkbox" checked data-done-check-id="${task.id}">
          <div class="done-body">
            <div class="done-title">${escapeHtml(getVisibleTaskTitle(task.title || "Untitled task"))}</div>
          </div>
        </div>
      `;
    }

    function formatLocalTimestamp(isoValue, fallbackLabel = "") {
      if (!isoValue) return fallbackLabel;
      const parsed = new Date(isoValue);
      if (Number.isNaN(parsed.getTime())) return fallbackLabel;
      if (doneTimestampFormatter) {
        try {
          return doneTimestampFormatter.format(parsed);
        } catch (_error) {
          // Fall through to the browser default formatter.
        }
      }
      return parsed.toLocaleString();
    }

    function formatLocalShortTime(isoValue, fallbackLabel = "") {
      if (!isoValue) return fallbackLabel;
      const parsed = new Date(isoValue);
      if (Number.isNaN(parsed.getTime())) return fallbackLabel;
      if (shortTimeFormatter) {
        try {
          return shortTimeFormatter.format(parsed);
        } catch (_error) {
          // Fall through to the browser default formatter.
        }
      }
      return parsed.toLocaleTimeString();
    }

    function formatNoteLastSynced(note) {
      const inboundIso = note?.sync_last_inbound_at_iso || "";
      const outboundIso = note?.sync_last_outbound_at_iso || "";
      const inboundMs = inboundIso ? new Date(inboundIso).getTime() : Number.NaN;
      const outboundMs = outboundIso ? new Date(outboundIso).getTime() : Number.NaN;

      if (!Number.isNaN(inboundMs) && (Number.isNaN(outboundMs) || inboundMs >= outboundMs)) {
        return `last synced ${formatLocalShortTime(inboundIso, note.sync_last_inbound_at_label || "")}`;
      }

      if (!Number.isNaN(outboundMs)) {
        return `last synced ${formatLocalShortTime(outboundIso, note.sync_last_outbound_at_label || "")}`;
      }

      return "";
    }

    function resetTodoStatusLabel() {
      if (!state.projects.length) {
        todoStatus.textContent = "";
      } else if (!state.workspace) {
        todoStatus.textContent = "idle";
      } else if (state.workspace.project?.task_sync_status === "conflict") {
        todoStatus.textContent = "sync conflict";
      } else if (state.workspace.project?.task_sync_status === "paused" && state.workspace.project?.task_sync_enabled) {
        todoStatus.textContent = "sync paused";
      } else {
        todoStatus.textContent = `${state.workspace.active_tasks.length} active`;
      }
    }

    function resetTransientStatusLabel(node) {
      if (node) node.textContent = "";
    }

    function flashStatusLabel(node, timerKey, label, duration = 1800, onReset = null) {
      if (!node) return;
      if (state[timerKey]) {
        window.clearTimeout(state[timerKey]);
      }
      node.textContent = label;
      state[timerKey] = window.setTimeout(() => {
        state[timerKey] = null;
        if (onReset) {
          onReset();
          return;
        }
        resetTransientStatusLabel(node);
      }, duration);
    }

    function flashTodoStatus(label, duration = 1800) {
      flashStatusLabel(todoStatus, "todoStatusTimer", label, duration, resetTodoStatusLabel);
    }

    function flashChangelogStatus(label, duration = 1800) {
      flashStatusLabel(changelogStatus, "changelogStatusTimer", label, duration);
    }

    function flashNoteStatus(label, duration = 1800) {
      flashStatusLabel(noteStatus, "noteStatusTimer", label, duration);
    }

    function buildChangelogExportText() {
      if (!state.workspace || !state.workspace.done_tasks.length) return "";

      const sectionMap = buildTaskSectionMap(state.workspace);
      const exportStamp = formatLocalTimestamp(new Date().toISOString(), new Date().toLocaleString());
      let hasVisibleTasks = false;
      const lines = [
        `# ${state.workspace.project.title} changelog`,
        `Exported ${exportStamp}`,
        ""
      ];

      let lastSection = null;
      state.workspace.done_tasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        const sectionLabel = sectionMap.get(task.id) || null;
        if (sectionLabel !== lastSection) {
          if (lines[lines.length - 1] !== "") {
            lines.push("");
          }
          if (sectionLabel) {
            lines.push(`## ${sectionLabel}`);
          }
          lastSection = sectionLabel;
        }

        hasVisibleTasks = true;
        lines.push(`- [x] ${getVisibleTaskTitle(task.title || "Untitled task")}`);
      });

      if (!hasVisibleTasks) return "";
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    async function copyTextWithFallback(copyLabel, exportText, successLabel, fallbackLabel, flashStatus = flashTodoStatus) {
      if (!exportText) return false;

      let copied = false;
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(exportText);
          copied = true;
        } catch (_error) {
          copied = false;
        }
      }

      if (!copied) {
        const manualCopy = window.prompt(copyLabel, exportText);
        if (manualCopy === null) return false;
      }

      flashStatus(copied ? successLabel : fallbackLabel);
      return true;
    }

    async function copyTaskSection(taskId) {
      const sectionText = buildTaskSectionCopyText(taskId);
      if (!sectionText) return;

      await copyTextWithFallback("Copy section", sectionText, "section copied", "section ready");
    }

    function buildSelectedTaskCopyText(taskId) {
      const task = findTask(taskId);
      if (!task) return "";

      const rawTitle = state.taskEdits[task.id] ?? task.title ?? "";
      if (isMarkdownTaskHeading(rawTitle)) {
        const sectionText = buildTaskSectionCopyText(task.id);
        return sectionText || `## ${getVisibleTaskTitle(rawTitle || "Untitled section")}`;
      }

      const visibleTitle = getVisibleTaskTitle(rawTitle || "Untitled task");
      return `- [ ] ${visibleTitle}`;
    }

    function buildActiveTodoCopyText() {
      if (!state.workspace?.active_tasks?.length) return "";

      const lines = [];
      state.workspace.active_tasks.forEach((task) => {
        const rawTitle = state.taskEdits[task.id] ?? task.title ?? "";
        if (isMarkdownTaskHeading(rawTitle)) {
          lines.push(`## ${getVisibleTaskTitle(rawTitle || "Untitled section")}`);
          return;
        }

        lines.push(`- [ ] ${getVisibleTaskTitle(rawTitle || "Untitled task")}`);
      });

      return lines.join("\n").trim();
    }

    async function copySelectedTask() {
      const copyText = buildActiveTodoCopyText();
      if (!copyText) return;

      await copyTextWithFallback(
        "Copy to-do.md",
        copyText,
        "to-do copied",
        "to-do ready"
      );
    }

    function buildNoteCopyText(noteId) {
      if (!state.workspace) return "";
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return "";

      const title = Object.prototype.hasOwnProperty.call(state.noteTitleEdits, noteId)
        ? state.noteTitleEdits[noteId]
        : note.title;
      const body = state.noteMode === "clean"
        ? cleanHtmlToMarkdown(state.noteHtmlEdits[noteId] ?? getCurrentCleanHtml(noteId) ?? note.rendered_html)
        : (Object.prototype.hasOwnProperty.call(state.noteBodyEdits, noteId)
          ? state.noteBodyEdits[noteId]
          : note.body);

      const trimmedTitle = String(title || "").trim();
      const trimmedBody = String(body || "").trim();
      if (trimmedTitle && trimmedBody) return `# ${trimmedTitle}\n\n${trimmedBody}`;
      if (trimmedTitle) return `# ${trimmedTitle}`;
      return trimmedBody;
    }

    async function copyNote(noteId) {
      const copyText = buildNoteCopyText(noteId);
      if (!copyText) return;

      await copyTextWithFallback("Copy note", copyText, "note copied", "note ready", flashNoteStatus);
    }

    async function exportChangelog() {
      const exportText = buildChangelogExportText();
      if (!exportText) return;

      await copyTextWithFallback("Copy changelog", exportText, "changelog copied", "changelog ready", flashChangelogStatus);
    }

    async function archiveChangelog() {
      if (!state.workspace || !state.workspace.done_tasks.length) return;

      const itemCount = state.workspace.done_tasks.length;
      const itemLabel = itemCount === 1 ? "1 completed task" : `${itemCount} completed tasks`;
      if (!window.confirm(`Archive ${itemLabel} from the changelog?`)) return;

      const response = await fetchJson("/api/tasks/archive", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.workspace.project.id,
          tasks: state.workspace.done_tasks.map((task) => ({
            id: task.id,
            expected_revision: task.revision
          }))
        })
      }, "task");
      if (!response) return;

      applyWorkspace(response.workspace);
      flashTodoStatus("changelog archived");
      render();
    }

    function render(options = {}) {
      const scrollState = options.preserveShellScroll ? captureShellScrollState() : null;
      layout.classList.toggle("empty-app", state.projects.length === 0);
      layout.classList.toggle("project-starter", state.projectTrayMode === "chooser" && !state.archiveMenuOpen);
      layout.classList.toggle("archive-view", state.archiveMenuOpen);
      renderProjectTray();
      renderProjects();
      renderArchiveMenu();
      renderArchivePane();
      renderTasks();
      renderChangelogPane();
      renderNotes();
      renderNoteFilePicker();
      renderProjectSettings();
      renderProjectArchiveConfirm();
      renderNoteArchiveConfirm();
      refreshScrollRevealBindings();
      updateStarterButtons();
      updateModeButtons();
      renderTodoTaskActionButtons();
      scheduleTaskRowSync();
      applyFocus();
      restoreShellScrollState(scrollState);
    }

    function renderTodoTaskActionButtons() {
      const showProjectStarter = state.projectTrayMode === "chooser";
      const selectedTask = showProjectStarter ? null : getSelectedActiveTask();
      const hasActiveTasks = !showProjectStarter && Boolean(state.workspace?.active_tasks?.length);
      const headerLabel = selectedTask

    function showScrollbarWhileScrolling(node) {
      if (!node) return;
      const overlay = updateScrollIndicator(node);
      if (!overlay) {
        return;
      }

      overlay.classList.add("scroll-active");
      const existingTimer = scrollRevealTimers.get(node);
      if (existingTimer) {
        window.clearTimeout(existingTimer);
      }

      const timer = window.setTimeout(() => {
        overlay.classList.remove("scroll-active");
        scrollRevealTimers.delete(node);
      }, 420);

      scrollRevealTimers.set(node, timer);
    }

    function ensureScrollIndicator(node) {
      if (!node || !node.parentElement) return null;

      let overlay = scrollIndicators.get(node);
      const parent = node.parentElement;
      if (overlay && overlay.isConnected) {
        if (overlay.parentElement !== parent) {
          parent.appendChild(overlay);
        }
        return overlay;
      }

      overlay = document.createElement("div");
      overlay.className = "scroll-indicator-overlay";

      const thumb = document.createElement("div");
      thumb.className = "scroll-indicator-thumb";
      overlay.appendChild(thumb);

      if (window.getComputedStyle(parent).position === "static") {
        parent.style.position = "relative";
      }

      parent.appendChild(overlay);
      scrollIndicators.set(node, overlay);
      return overlay;
    }

    function updateScrollIndicator(node) {
      if (!node) return null;

      const viewport = node.clientHeight;
      const content = node.scrollHeight;
      const scrollRange = content - viewport;
      const canScroll = scrollRange > 1;
      const existingOverlay = scrollIndicators.get(node);

      if (!canScroll || viewport <= 0) {
        if (existingOverlay) {
          existingOverlay.classList.remove("is-scrollable", "scroll-active");
        }
        return null;
      }

      const overlay = ensureScrollIndicator(node);
      if (!overlay) return null;

      const thumb = overlay.firstElementChild;
      const parentRect = overlay.parentElement.getBoundingClientRect();
      const nodeRect = node.getBoundingClientRect();
      const trackHeight = Math.max(0, Math.round(viewport - 4));
      if (trackHeight <= 0) {
        overlay.classList.remove("is-scrollable", "scroll-active");
        return null;
      }
      const overlayTop = Math.max(0, Math.round(nodeRect.top - parentRect.top + 2));
      const thumbSize = Math.max(28, Math.min(trackHeight, Math.round((viewport / content) * trackHeight)));
      const maxOffset = Math.max(0, trackHeight - thumbSize);
      const thumbOffset = maxOffset > 0
        ? Math.round((node.scrollTop / scrollRange) * maxOffset)
        : 0;

      overlay.classList.add("is-scrollable");
      overlay.style.top = `${overlayTop}px`;
      overlay.style.height = `${trackHeight}px`;
      thumb.style.height = `${thumbSize}px`;
      thumb.style.transform = `translateY(${thumbOffset}px)`;
      return overlay;
    }

    function getResponsiveLayoutWidth() {
      const innerWidth = window.innerWidth || 0;
      const outerWidth = typeof window.outerWidth === "number" ? window.outerWidth : 0;

      // `outerWidth` stays stable when desktop browser zoom changes while `innerWidth` shrinks.
      return Math.max(innerWidth, outerWidth);
    }

    function applyResponsiveLayoutMode() {
      if (isDesktopShell) {
        if (document.documentElement.dataset.layoutMode !== "three") {
          document.documentElement.dataset.layoutMode = "three";
        }
        return;
      }

      const width = getResponsiveLayoutWidth();
      let nextMode = "three";
      if (width <= layoutModeBreakpoints.oneColumn) {
        nextMode = "one";
      } else if (width <= layoutModeBreakpoints.twoColumn) {
        nextMode = "two";
      }

      if (document.documentElement.dataset.layoutMode === nextMode) return;
      document.documentElement.dataset.layoutMode = nextMode;
    }

    function bindScrollReveal(node) {
      if (!node || node.dataset.scrollRevealBound === "true") return;
      node.dataset.scrollRevealBound = "true";
      node.addEventListener("scroll", () => {
        showScrollbarWhileScrolling(node);
      }, { passive: true });
    }

    function refreshScrollRevealBindings() {
      document.querySelectorAll(".pane-body, .task-list, .done-list, .overlay-card, .clean-editor, .markdown-input").forEach((node) => {

      if (!project.task_sync_enabled) {
        return "Keep one n10e-managed docs/to-do.md in the linked folder and sync tasks both ways automatically.";
      }

      if (project.task_sync_status === "conflict") {
        return project.task_sync_conflict_summary || "n10e paused automatic task sync because both sides changed before reconciliation.";
      }

      const details = [];
      if (project.task_sync_file) {
        details.push(project.task_sync_file);
      }
      if (project.task_sync_last_inbound_at_label) {
        details.push(`inbound ${project.task_sync_last_inbound_at_label}`);
      }
      if (project.task_sync_last_outbound_at_label) {
        details.push(`outbound ${project.task_sync_last_outbound_at_label}`);
      }
      if (project.task_sync_conflict_at_label && project.task_sync_status === "paused") {
        details.push(`paused ${project.task_sync_conflict_at_label}`);
      }

      return details.join(" | ") || "Managed task sync is active for this project.";

        return parts[parts.length - 1] || fallbackTitle;

      return fallbackTitle;

      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const sourceKind = forcedKind || state.projectSettingsSourceMode;
      const sourceLocator = (forcedLocator || state.projectSettingsSourceInput || "").trim();

      if (!sourceKind || !sourceLocator) {
        state.projectSettingsMessage = "source link is incomplete";
        renderProjectSettings();
        return;
      }

      const response = await fetchJson(`/api/projects/${project.id}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId,
          title,
          source_kind: sourceKind,
          source_locator: sourceLocator
        })
      }, "project");
      if (!response) return;

      applyUiState(response);
      state.projectSettingsSourceMode = null;
      state.projectSettingsSourceInput = "";
      state.projectSettingsMessage = "";
      state.projectSettingsPickerFallback = false;
      render();
    }

    async function openProjectSource() {
      const project = getProjectById(state.projectSettingsId);
      if (!project || !project.source_locator) return;

      if (project.source_kind === "local") {
        await fetchJson("/api/system/open-path", {
          method: "POST",
          body: JSON.stringify({ path: project.source_locator })
        }, "project");
      }
    }

    function openProjectArchiveConfirm() {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;
      state.projectArchiveConfirmId = project.id;
      renderProjectArchiveConfirm();
    }

    function closeProjectArchiveConfirm() {
      if (!state.projectArchiveConfirmId) return;
      state.projectArchiveConfirmId = null;
      renderProjectArchiveConfirm();
    }

    async function confirmProjectArchive() {
      if (!state.projectArchiveConfirmId) return;
      closeProjectArchiveConfirm();
      await archiveProjectFromSettings();
    }

    async function archiveProjectFromSettings() {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const response = await fetchJson(`/api/projects/${project.id}/archive`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId === project.id ? null : state.selectedProjectId
        })
      }, "project");
      if (!response) return;

      applyUiState(response);
      closeProjectSettings();
      render();
    }

    async function openManagedTaskSyncFile() {
      const project = getProjectById(state.projectSettingsId);
      if (!project || !project.source_locator || !project.task_sync_file) return;

      const root = String(project.source_locator).replace(/[\\/]+$/, "");
      const relative = String(project.task_sync_file).replace(/^[/\\]+/, "");
      const joinedPath = `${root}/${relative}`;

      await fetchJson("/api/system/open-path", {
        method: "POST",
        body: JSON.stringify({ path: joinedPath })
      }, "project");
    }

    async function performManagedTaskSyncAction(action) {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const endpoint = action === "enable-task-sync"
        ? "enable"
        : action === "pause-task-sync"
          ? "pause"
          : action === "resume-task-sync"
            ? "resume"
            : action === "resolve-task-sync-file"
              ? "resolve-file"
              : action === "resolve-task-sync-local"
                ? "resolve-local"
                : null;

      if (!endpoint) return;

      const response = await fetchJson(`/api/projects/${project.id}/task-sync/${endpoint}`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!response) return;

      applyUiState(response);
      state.projectSettingsMessage = "";
      render();
    }

    function renderTasks() {
      taskMessage.innerHTML = state.taskMessage ? `<div class="message error">${escapeHtml(state.taskMessage)}</div>` : "";
      if (!state.projects.length) {
        activeTaskList.innerHTML = renderEmptyAppState();
        resetTodoStatusLabel();
        return;
      }

      if (state.projectTrayMode === "chooser") {
        activeTaskList.innerHTML = renderEmptyAppState();
        todoStatus.textContent = "";
        return;
      }

      if (!state.workspace) {
        activeTaskList.innerHTML = `<div class="empty-state">Select or create a project to start a to-do list.</div>`;
        resetTodoStatusLabel();
        return;
      }

      ensureDraftRow();

      const activeRows = [];
      const draftsByAfter = new Map();
      state.taskDrafts.forEach((draft) => {
        const key = draft.afterTaskId ?? "__top__";
        if (!draftsByAfter.has(key)) draftsByAfter.set(key, []);
        draftsByAfter.get(key).push(draft);
      });

      if (draftsByAfter.has("__top__")) {
        draftsByAfter.get("__top__").forEach((draft) => activeRows.push(renderDraftRow(draft)));
      }

      const taskSectionState = buildActiveTaskSectionState(state.workspace, draftsByAfter);
      state.workspace.active_tasks.forEach((task) => {
        if (taskSectionState.hiddenTaskIds.has(task.id)) return;

        const sectionState = taskSectionState.sections.get(task.id) || null;
        activeRows.push(renderActiveTaskRow(task, sectionState));

        const drafts = draftsByAfter.get(task.id);
        if (drafts) {
          if (sectionState?.collapsed) return;
          drafts.forEach((draft) => activeRows.push(renderDraftRow(draft)));
        }
      });

      activeTaskList.innerHTML = activeRows.join("");
      resetTodoStatusLabel();
    }

    function renderChangelogPane() {
      const hidePane = state.projects.length === 0;
      changelogPane.classList.toggle("hidden", hidePane);
      changelogPane.classList.toggle("collapsed", state.changelogCollapsed);
      changelogToggleButton.setAttribute("aria-expanded", state.changelogCollapsed ? "false" : "true");
      changelogToggleButton.setAttribute("aria-label", state.changelogCollapsed ? "Expand changelog" : "Collapse changelog");
      changelogToggleButton.title = state.changelogCollapsed ? "Expand changelog" : "Collapse changelog";

      if (hidePane) {
        doneTaskList.innerHTML = "";
        resetTransientStatusLabel(changelogStatus);
        changelogArchiveButton.disabled = true;
        changelogExportButton.disabled = true;
        return;
      }

      if (!state.workspace) {
        doneTaskList.innerHTML = `<div class="empty-state">Select or create a project to review completed work.</div>`;
        resetTransientStatusLabel(changelogStatus);
        changelogArchiveButton.disabled = true;
        changelogExportButton.disabled = true;
        return;
      }

      const visibleDoneTaskCount = state.workspace.done_tasks.filter((task) => !isMarkdownTaskHeading(task.title)).length;
      if (visibleDoneTaskCount === 0) {
        doneTaskList.innerHTML = `<div class="empty-state">Completed tasks will land here as a running changelog.</div>`;
      } else {
        const doneTaskSectionState = buildDoneTaskSectionState(state.workspace);
        doneTaskList.innerHTML = renderDoneTaskList(state.workspace.done_tasks, doneTaskSectionState);
      }

      changelogArchiveButton.disabled = state.workspace.done_tasks.length === 0;
      changelogExportButton.disabled = visibleDoneTaskCount === 0;
    }

    function renderEmptyAppState() {
      return `
        <div class="starter-shell">
          <section class="starter-card">
            <div class="starter-label">Get Started</div>
            <div class="starter-actions">
              <button class="starter-btn ${state.emptyAppAction === "local" ? "active" : ""}" type="button" data-empty-action="local">
                <svg class="starter-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 7h6l2 2h10v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <path d="M3 7a2 2 0 0 1 2-2h4l2 2"></path>
                </svg>
                <span>Select Project</span>
              </button>
              <button class="starter-btn ${state.emptyAppAction === "new" ? "active" : ""}" type="button" data-empty-action="new">
                <svg class="starter-btn-icon" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <path d="M5 12h14"></path>
                </svg>
                <span>Create New Project</span>
              </button>
            </div>
          </section>
        </div>
      `;
    }

    function updateStarterButtons() {
      document.querySelectorAll("[data-empty-action]").forEach((button) => {
        button.classList.toggle("active", button.dataset.emptyAction === state.emptyAppAction);
      });
    }

    function renderDraftRow(draft) {
      const isHeading = isMarkdownTaskHeading(draft.title);
      const visibleTitle = getVisibleTaskTitle(draft.title);
      const leadingControl = isHeading
        ? ""
        : '<span class="task-heading-marker empty" aria-hidden="true"></span>';

      return `
        <div class="task-draft${isHeading ? " is-heading" : ""}">
          ${leadingControl}
          <textarea
            class="task-input${isHeading ? " task-heading-input" : ""}"
            rows="1"
            spellcheck="false"
            draggable="false"
            placeholder="new task or ## section"
            data-task-draft-key="${draft.key}"
          >${escapeHtml(visibleTitle)}</textarea>
        </div>
      `;
    }

    function renderNotes() {
      noteMessage.innerHTML = state.noteMessage ? `<div class="message error">${escapeHtml(state.noteMessage)}</div>` : "";
      if (!state.projects.length) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = "";
        return;
      }

      if (!state.workspace) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = `<div class="empty-state">Select or create a project to start collecting notes.</div>`;
        return;
      }

      if (!state.workspace.notes.length) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = `<div class="empty-state">Use the plus button to create the first project note.</div>`;
        return;
      }

      notesList.innerHTML = state.workspace.notes.map((note) => {
        const isOpen = state.openNoteId === note.id;
        const title = state.noteTitleEdits[note.id] ?? note.title;
        const isSynced = Boolean(note.sync_kind);
        const syncPill = isSynced
          ? `<span class="note-sync-pill ${note.sync_status === "conflict" ? "conflict" : ""}">${escapeHtml(note.sync_status === "conflict" ? "conflict" : "linked")}</span>`
          : "";
        return `
          <section class="note-card ${isOpen ? "open" : ""}">
            ${isOpen ? `
              <div class="note-head-open">
                <button class="note-collapse" type="button" data-note-id="${note.id}" data-note-toggle="true" aria-expanded="true" aria-label="Collapse note" title="Collapse note">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 10 5 5 5-5"></path>
                  </svg>
                </button>
                ${isSynced ? `
                  <div class="note-sync-meta">
                    <div style="min-width:0; flex:1;">
                      <div class="note-title-readonly">${escapeHtml(title)}</div>
                      <div class="note-path-inline">${escapeHtml(note.sync_path || "")}</div>
                    </div>
                    ${syncPill}
                  </div>
                ` : `
                  <input class="note-title-input note-title-inline" type="text" value="${escapeAttribute(title)}" placeholder="Untitled note" data-note-title-id="${note.id}">
                `}
                <div class="note-head-actions">
                  <button class="icon-btn subtle" type="button" data-note-action="copy" data-note-action-id="${note.id}" aria-label="Copy note" title="Copy note">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                      <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                    </svg>
                  </button>
                  <button class="task-delete-btn" type="button" data-note-action="archive" data-note-action-id="${note.id}" aria-label="Archive note" title="Archive note">×</button>
                </div>
              </div>
            ` : `
              <button class="note-toggle" type="button" data-note-id="${note.id}" data-note-toggle="true" aria-expanded="false">
                <span class="note-toggle-main">
                  <span class="note-toggle-caret" aria-hidden="true">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m7 10 5 5 5-5"></path>
                    </svg>
                  </span>
                  <span class="note-toggle-title">${escapeHtml(title)}</span>
                  ${syncPill}
                </span>
                <span class="muted">${escapeHtml(formatLocalTimestamp(note.updated_at_iso, note.updated_at_label))}</span>
              </button>
            `}
            ${isOpen ? renderOpenNote(note) : ""}
          </section>
        `;
      }).join("");

      hydrateCleanEditor();
    }

    function renderNoteFilePicker() {
      const canLink = Boolean(
        state.selectedProjectId
        && state.workspace?.project?.source_kind === "local"
      );

      if (!canLink) {
        state.noteFilePickerOpen = false;
      }

      notesLinkButton.disabled = !canLink;
      notesLinkButton.title = canLink
        ? "Link markdown file"
        : "Link a local project folder to import docs";
      noteLinkPickerWrap.classList.toggle("open", canLink && state.noteFilePickerOpen);

      if (!canLink || !state.noteFilePickerOpen) {
        noteLinkPicker.innerHTML = "";
        return;
      }

      if (state.noteFilePickerLoading) {
        noteLinkPicker.innerHTML = `<div class="note-picker-empty">Loading markdown files…</div>`;
        return;
      }

      if (!state.noteLinkableFiles.length) {
        noteLinkPicker.innerHTML = `<div class="note-picker-empty">No markdown files found under docs/.</div>`;
        return;
      }

      noteLinkPicker.innerHTML = state.noteLinkableFiles.map((file) => `
        <button class="note-picker-item" type="button" data-note-link-select="${escapeAttribute(file.relative_path)}">
          <strong>${escapeHtml(file.display_name)}</strong>
          <span class="muted">${escapeHtml(file.relative_path)}</span>
        </button>
      `).join("");
    }

    function renderOpenNote(note) {
      const revisionConflictBanner = state.noteRevisionConflict?.noteId === note.id ? `
        <div class="note-sync-banner">
          <div>Note changed in the background. Choose which version to keep.</div>
          <div class="note-sync-actions">
            <button class="text-btn" type="button" data-note-revision-action="latest" data-note-revision-id="${note.id}">Use Latest</button>
            <button class="text-btn" type="button" data-note-revision-action="local" data-note-revision-id="${note.id}">Use n10e</button>
          </div>
        </div>
      ` : "";
      const syncDetails = note.sync_kind ? formatNoteLastSynced(note) : "";
      const syncBanner = note.sync_status === "conflict" ? `
        <div class="note-sync-banner">
          <div>${escapeHtml(note.sync_conflict_summary || "Linked note sync is paused until you pick a source of truth.")}</div>
          <div class="note-sync-actions">
            <button class="text-btn" type="button" data-note-action="resolve-file" data-note-action-id="${note.id}">Use File</button>
            <button class="text-btn" type="button" data-note-action="resolve-local" data-note-action-id="${note.id}">Use n10e</button>
          </div>
        </div>
      ` : "";
      const syncMeta = syncDetails ? `<div class="muted">${escapeHtml(syncDetails)}</div>` : "";

      if (state.noteMode === "markdown") {
        const body = state.noteBodyEdits[note.id] ?? note.body;
        return `
          <div class="note-editor">
            ${revisionConflictBanner}
            ${syncBanner}
            ${syncMeta}
            <textarea class="markdown-input note-body-input" data-note-body-id="${note.id}" placeholder="Capture context, decisions, links, or a handoff note...">${escapeHtml(body)}</textarea>
          </div>
        `;
      }

      return `
        <div class="note-editor">
          ${revisionConflictBanner}
          ${syncBanner}
          ${syncMeta}
          <div class="toolbar note-toolbar">
            <button type="button" data-rich-command="bold">bold</button>
            <button type="button" data-rich-command="italic">italic</button>
            <button type="button" data-rich-command="h2">h2</button>
            <button type="button" data-rich-command="bullet">list</button>
            <button type="button" data-rich-command="checklist">check</button>
            <button type="button" data-rich-command="link">link</button>
          </div>
          <div class="clean-editor" contenteditable="true" data-note-clean-id="${note.id}" data-placeholder="Capture context, decisions, links, or a handoff note..."></div>
        </div>
      `;
    }

    function hydrateCleanEditor() {
      if (state.noteMode !== "clean" || !state.openNoteId || !state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === state.openNoteId);
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!note || !editor || editor.dataset.hydrated === "true") return;
      editor.innerHTML = normalizeCleanHtml(state.noteHtmlEdits[note.id] ?? note.rendered_html);
      editor.dataset.hydrated = "true";
    }

    function updateModeButtons() {
      document.querySelectorAll("[data-note-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.noteMode === state.noteMode);
      });
    }

    function applyFocus() {
      if (state.focusTaskId) {
        const taskId = state.focusTaskId;
        const input = document.querySelector(`[data-task-id="${taskId}"]`);
        if (input) {
          const task = findTask(taskId);
          input.focus();
          expandHeadingInput(input, state.taskEdits[taskId] ?? task?.title ?? input.value);
          syncTaskRowFromInput(input);
          state.focusTaskId = null;
          return;
        }
      }

      if (state.focusDraftKey) {
        const draftKey = state.focusDraftKey;
        const input = document.querySelector(`[data-task-draft-key="${draftKey}"]`);
        if (input) {
          const draft = getDraft(draftKey);
          input.focus();
          expandHeadingInput(input, draft?.title ?? input.value);
          syncTaskRowFromInput(input);
          state.focusDraftKey = null;
          return;
        }
      }

      if (state.focusNoteId) {
        const input = document.querySelector(`[data-note-title-id="${state.focusNoteId}"]`);
        if (input) {
          input.focus();
          input.select();
          state.focusNoteId = null;
        }
      }
    }

    function syncLocation() {
      const url = new URL(window.location.href);
      if (state.selectedProjectId) {
        url.searchParams.set("project_id", state.selectedProjectId);
      } else {
        url.searchParams.delete("project_id");
      }
      history.replaceState({}, "", url.toString());
    }

    function handleRichCommand(command) {
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!editor) return;
      editor.focus();
      if (command === "bold") {
        document.execCommand("bold");
      } else if (command === "italic") {
        document.execCommand("italic");
      } else if (command === "h2") {
        document.execCommand("formatBlock", false, "h2");
      } else if (command === "bullet") {
        document.execCommand("insertUnorderedList");
      } else if (command === "checklist") {
        document.execCommand("insertHTML", false, "<ul><li><input type='checkbox'> checklist item</li></ul>");
      } else if (command === "link") {
        const href = window.prompt("Link URL");
        if (href) document.execCommand("createLink", false, href);
      }
      state.noteHtmlEdits[state.openNoteId] = editor.innerHTML;
      debounceNoteSave(state.openNoteId);
    }

    function normalizeCleanHtml(html) {
      const container = document.createElement("div");
      container.innerHTML = html || "";
      container.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.removeAttribute("disabled");
      });
      return container.innerHTML;
    }

    function getCurrentCleanHtml(noteId) {
      const editor = document.querySelector(`[data-note-clean-id="${noteId}"]`);
      return editor ? editor.innerHTML : null;
    }

    function cleanHtmlToMarkdown(html) {
      const container = document.createElement("div");
      container.innerHTML = html || "";
      const markdown = serializeBlockChildren(container).trim();
      return markdown ? `${markdown}\n` : "";
    }

    function isDirectoryPickerCanceled(message = "") {
      const value = String(message).toLowerCase();
      return value.includes("user canceled")
        || value.includes("user cancelled")
        || value.includes("(-128)");
    }

    function serializeBlockChildren(node) {
      const parts = [];
      node.childNodes.forEach((child) => {
        const chunk = serializeNode(child).trimEnd();
        if (chunk) parts.push(chunk);
      });
      return parts.join("\n\n");
    }

    function serializeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent.replace(/\u00a0/g, " ");
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const tag = node.tagName.toLowerCase();
      if (tag === "br") return "\n";
      if (tag === "h1") return `# ${serializeInline(node).trim()}`;
      if (tag === "h2") return `## ${serializeInline(node).trim()}`;
      if (tag === "h3") return `### ${serializeInline(node).trim()}`;
      if (tag === "p" || tag === "div") return serializeInline(node).trim();
      if (tag === "ul") {
        return Array.from(node.children).map((child) => serializeListItem(child)).join("\n");
      }
      if (tag === "ol") {
        return Array.from(node.children).map((child, index) => `${index + 1}. ${serializeInline(child).trim()}`).join("\n");
      }
      return serializeInline(node).trim();
    }

    function serializeListItem(node) {
      if (!node || node.tagName.toLowerCase() !== "li") return "";
      const checkbox = node.querySelector(":scope > input[type='checkbox']");
      const checkboxPrefix = checkbox ? `- [${checkbox.checked ? "x" : " "}] ` : "- ";
      const clone = node.cloneNode(true);
      clone.querySelectorAll("input[type='checkbox']").forEach((input) => input.remove());
      return `${checkboxPrefix}${serializeInline(clone).trim()}`;
    }

    function serializeInline(node) {
      let text = "";
      node.childNodes.forEach((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          text += child.textContent.replace(/\u00a0/g, " ");
          return;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = child.tagName.toLowerCase();
        if (tag === "strong" || tag === "b") {
          text += `**${serializeInline(child)}**`;
        } else if (tag === "em" || tag === "i") {
          text += `*${serializeInline(child)}*`;
        } else if (tag === "a") {
          text += `[${serializeInline(child)}](${child.getAttribute("href") || ""})`;
        } else if (tag === "br") {
          text += "\n";
        } else if (tag === "input" && child.type === "checkbox") {
          text += "";
        } else {
          text += serializeInline(child);
        }
      });
      return text;
    }

    async function fetchJson(url, options = {}, channel = "task", allowFailure = false) {
      try {
        const response = await fetch(url, {
          headers: {
            "Content-Type": "application/json"
          },
          ...options
        });
        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          const message = payload?.error || `Request failed (${response.status})`;
          if (channel === "project") {
            state.projectMessage = message;
            if (state.projectSettingsId) state.projectSettingsMessage = message;
          }
          if (channel === "task") state.taskMessage = message;
          if (channel === "note") state.noteMessage = message;
          if (!allowFailure) render();
          return null;
        }
        if (channel === "project") {
          state.projectMessage = "";
          state.projectSettingsMessage = "";
        }
        if (channel === "task") state.taskMessage = "";
        if (channel === "note") state.noteMessage = "";
        return response.status === 204 ? null : response.json();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (channel === "project") {
          state.projectMessage = message;
          if (state.projectSettingsId) state.projectSettingsMessage = message;
        }
        if (channel === "task") state.taskMessage = message;
        if (channel === "note") state.noteMessage = message;
        if (!allowFailure) render();
        return null;
      }
    }

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value = "") {
      return escapeHtml(value);
    }

    applyResponsiveLayoutMode();
    scheduleUiRefresh(50);
    render();
  </script>
</body>
</html>
