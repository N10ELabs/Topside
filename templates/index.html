    function getNormalizedNotesSearchQuery(query) {
      return String(query || "").trim().toLowerCase();
    }

    function hasActiveNotesSearchQuery(queryOverride = null) {
      return Boolean(getNormalizedNotesSearchQuery(queryOverride ?? state.notesSearchQuery));
    }

    function getEffectiveNoteRenderMode(queryOverride = null) {
      return hasActiveNotesSearchQuery(queryOverride) ? "clean" : state.noteMode;
    }

    function getNotesSearchTerms(query) {
      const normalizedQuery = getNormalizedNotesSearchQuery(query);
      if (!normalizedQuery) return [];
      const seen = new Set();
      const terms = [];
      normalizedQuery.split(/\s+/).forEach((term) => {
        if (!term || seen.has(term) || terms.length >= 8) return;
        seen.add(term);
        terms.push(term);
      });
      terms.sort((a, b) => b.length - a.length);
      return terms;
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightNoteSearchText(value, terms) {
      const source = String(value || "");
      if (!terms.length) return escapeHtml(source);
      const escapedTerms = terms.map(escapeRegExp).filter(Boolean);
      if (!escapedTerms.length) return escapeHtml(source);
      const matcher = new RegExp(`(${escapedTerms.join("|")})`, "ig");
      return source.split(matcher).map((segment, index) => (
        index % 2 === 1
          ? `<mark class="note-search-hit">${escapeHtml(segment)}</mark>`
          : escapeHtml(segment)
      )).join("");
    }

    function extractTextFromNoteHtml(html) {
      const container = document.createElement("div");
      container.innerHTML = stripSearchDecorationsFromHtml(html || "");
      return String(container.textContent || "").replace(/\u00a0/g, " ");
    }

    function getSearchableNoteBodyText(note) {
      if (!note) return "";
      const noteId = note.id || null;
      const renderMode = getEffectiveNoteRenderMode();
      if (renderMode === "markdown") {
        if (noteId && Object.prototype.hasOwnProperty.call(state.noteBodyEdits, noteId)) {
          return String(state.noteBodyEdits[noteId] || "");
        }
        return String(note.body || "");
      }

      if (noteId && Object.prototype.hasOwnProperty.call(state.noteHtmlEdits, noteId)) {
        const draftText = extractTextFromNoteHtml(state.noteHtmlEdits[noteId]);
        if (draftText) return draftText;
      }

      let liveHtml = null;
      if (noteId) {
        const editor = document.querySelector(`[data-note-clean-id="${noteId}"]`);
        if (editor instanceof HTMLElement && editor.dataset.hydrated === "true") {
          return String(editor.textContent || "");
        }
        if (!(editor instanceof HTMLElement)) {
          liveHtml = getCurrentCleanHtml(noteId);
        }
      }

      const htmlSource = noteId
        ? (state.noteHtmlEdits[noteId] || liveHtml || note.rendered_html)
        : note.rendered_html;
      const renderedText = extractTextFromNoteHtml(htmlSource);
      return renderedText || String(note.body || "");
    }

    function getActiveBodySearchMatchForNote(noteId, queryOverride = null) {
      const query = String(queryOverride ?? state.notesSearchQuery ?? "").trim();
      if (!noteId || !query) return null;
      const searchData = getGlobalNoteSearchData(query);
      if (!searchData.globalMatches.length) return null;

      let navIndex = Number.isFinite(state.noteSearchNavIndex) ? state.noteSearchNavIndex : -1;
      if (navIndex < 0 || navIndex >= searchData.globalMatches.length) {
        navIndex = findFirstGlobalMatchIndexForNote(searchData.globalMatches, noteId);
      }
      if (navIndex < 0 || navIndex >= searchData.globalMatches.length) {
        return null;
      }

      const activeMatch = searchData.globalMatches[navIndex];
      if (!activeMatch || activeMatch.noteId !== noteId || activeMatch.field !== "body") {
        return null;
      }

      return {
        terms: searchData.terms,
        matchIndex: Number.isFinite(activeMatch.fieldIndex) ? activeMatch.fieldIndex : 0
      };
    }

    function findNoteSearchMatch(text, terms) {
      const source = String(text || "");
      const normalized = source.toLowerCase();
      for (const term of terms) {
        const index = normalized.indexOf(term);
        if (index !== -1) {
          return { index, term };
        }
      }
      return null;
    }

    function buildNoteSearchSnippet(text, match, terms) {
      if (!match) return "";
      const source = String(text || "");
      if (!source) return "";
      const start = Math.max(0, match.index - 30);
      const end = Math.min(source.length, match.index + Math.max(1, match.term.length) + 52);
      const compact = source.slice(start, end).replace(/\s+/g, " ").trim();
      if (!compact) return "";
      const prefix = start > 0 ? "..." : "";
      const suffix = end < source.length ? "..." : "";
      return `${prefix}${highlightNoteSearchText(compact, terms)}${suffix}`;
    }

    function getNoteSearchMeta(note, terms) {
      if (!terms.length) return null;
      const pathMatch = findNoteSearchMatch(note.sync_path, terms);
      if (pathMatch) {
        const snippet = buildNoteSearchSnippet(note.sync_path, pathMatch, terms);
        if (snippet) {
          return { label: "Path", snippetHtml: snippet };
        }
      }
      const bodyText = getSearchableNoteBodyText(note);
      const bodyMatch = findNoteSearchMatch(bodyText, terms);
      if (bodyMatch) {
        const snippet = buildNoteSearchSnippet(bodyText, bodyMatch, terms);
        if (snippet) {
          return { label: "Body", snippetHtml: snippet };
        }
      }
      return null;
    }

    function buildNoteSearchMatcher(terms) {
      const escapedTerms = terms.map(escapeRegExp).filter(Boolean);
      if (!escapedTerms.length) return null;
      return new RegExp(escapedTerms.join("|"), "ig");
    }

    function collectTextSearchMatches(text, terms) {
      const source = String(text || "");
      if (!source || !terms.length) return [];
      const matcher = buildNoteSearchMatcher(terms);
      if (!matcher) return [];
      const matches = [];
      let match;
      while ((match = matcher.exec(source)) !== null) {
        const token = String(match[0] || "");
        if (!token.length) {
          matcher.lastIndex += 1;
          continue;
        }
        matches.push({
          start: match.index,
          end: match.index + token.length
        });
        if (matcher.lastIndex === match.index) {
          matcher.lastIndex += 1;
        }
      }
      return matches;
    }

    function collectMarkdownNoteSearchTargets(noteId, terms) {
      const input = document.querySelector(`[data-note-body-id="${noteId}"]`);
      if (!(input instanceof HTMLTextAreaElement)) return null;
      return {
        noteId,
        kind: "markdown",
        input,
        matches: collectTextSearchMatches(input.value, terms)
      };
    }

    function scrollMarkdownMatchIntoView(input, matchIndex) {
      const before = input.value.slice(0, Math.max(0, matchIndex));
      const lineIndex = before.split("\n").length - 1;
      const style = window.getComputedStyle(input);
      const lineHeight = Number.parseFloat(style.lineHeight) || 20;
      const targetTop = Math.max(0, (lineIndex * lineHeight) - (input.clientHeight / 2));
      input.scrollTop = targetTop;
      input.scrollIntoView({ block: "nearest", inline: "nearest" });
    }

    function collectCleanEditorSearchMatches(editor, terms) {
      if (!(editor instanceof HTMLElement) || !terms.length) return [];
      const matcherTemplate = buildNoteSearchMatcher(terms);
      if (!matcherTemplate) return [];
      const matcherSource = matcherTemplate.source;
      const matches = [];
      const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT);
      let absoluteOffset = 0;
      let node = walker.nextNode();
      while (node) {
        const value = node.nodeValue || "";
        if (value) {
          const matcher = new RegExp(matcherSource, "ig");
          let match;
          while ((match = matcher.exec(value)) !== null) {
            const token = String(match[0] || "");
            if (!token.length) {
              matcher.lastIndex += 1;
              continue;
            }
            matches.push({
              node,
              start: match.index,
              end: match.index + token.length,
              startNode: node,
              startOffset: match.index,
              endNode: node,
              endOffset: match.index + token.length,
              absoluteStart: absoluteOffset + match.index,
              absoluteEnd: absoluteOffset + match.index + token.length
            });
            if (matcher.lastIndex === match.index) {
              matcher.lastIndex += 1;
            }
          }
        }
        absoluteOffset += value.length;
        node = walker.nextNode();
      }
      return matches;
    }

    function collectCleanNoteSearchTargets(noteId, terms) {
      const editor = document.querySelector(`[data-note-clean-id="${noteId}"]`);
      if (!(editor instanceof HTMLElement)) return null;
      return {
        noteId,
        kind: "clean",
        editor,
        terms: [...terms],
        matches: collectCleanEditorSearchMatches(editor, terms)
      };
    }

    function collectTitleSearchTargets(noteId, terms) {
      const input = document.querySelector(`[data-note-title-id="${noteId}"]`);
      if (!(input instanceof HTMLInputElement)) return null;
      return {
        noteId,
        kind: "title",
        input,
        matches: collectTextSearchMatches(input.value, terms)
      };
    }

    function getOpenNoteSearchTargets(terms, noteId = state.openNoteId) {
      if (!noteId || !terms.length) return null;
      if (getEffectiveNoteRenderMode() === "markdown") {
        return collectMarkdownNoteSearchTargets(noteId, terms)
          || collectCleanNoteSearchTargets(noteId, terms)
          || collectTitleSearchTargets(noteId, terms);
      }
      return collectCleanNoteSearchTargets(noteId, terms)
        || collectMarkdownNoteSearchTargets(noteId, terms)
        || collectTitleSearchTargets(noteId, terms);
    }

    function getOpenNoteSearchTargetsForField(noteId, terms, field = "body") {
      if (field === "title") {
        return collectTitleSearchTargets(noteId, terms)
          || getOpenNoteSearchTargets(terms, noteId);
      }
      return getOpenNoteSearchTargets(terms, noteId);
    }

    function buildGlobalNoteSearchMatches(filteredNotes, terms) {
      const globalMatches = [];
      filteredNotes.forEach((note) => {
        const bodyMatches = collectTextSearchMatches(getSearchableNoteBodyText(note), terms);
        bodyMatches.forEach((match, fieldIndex) => {
          globalMatches.push({
            noteId: note.id,
            field: "body",
            fieldIndex,
            start: match.start,
            end: match.end
          });
        });

        const titleMatches = collectTextSearchMatches(note.title, terms);
        titleMatches.forEach((match, fieldIndex) => {
          globalMatches.push({
            noteId: note.id,
            field: "title",
            fieldIndex,
            start: match.start,
            end: match.end
          });
        });
      });
      return globalMatches;
    }

    function buildGlobalNoteSearchNavigationKey(query, filteredNotes) {
      const normalizedQuery = getNormalizedNotesSearchQuery(query);
      const signature = filteredNotes.map((note) => `${note.id}:${note.revision}`).join("|");
      return `${normalizedQuery}|${signature}`;
    }

    function getGlobalNoteSearchData(queryOverride = null) {
      const query = String(queryOverride ?? state.notesSearchQuery ?? "").trim();
      const normalizedQuery = getNormalizedNotesSearchQuery(query);
      const terms = getNotesSearchTerms(normalizedQuery);
      const notes = Array.isArray(state.workspace?.notes) ? state.workspace.notes : [];
      const filteredNotes = filterNotesForSearch(notes, normalizedQuery);
      const globalMatches = terms.length
        ? buildGlobalNoteSearchMatches(filteredNotes, terms)
        : [];
      const navKey = buildGlobalNoteSearchNavigationKey(query, filteredNotes);
      return {
        query,
        normalizedQuery,
        terms,
        filteredNotes,
        globalMatches,
        navKey
      };
    }

    function findFirstGlobalMatchIndexForNote(globalMatches, noteId) {
      if (!noteId) return -1;
      for (let index = 0; index < globalMatches.length; index += 1) {
        if (globalMatches[index]?.noteId === noteId) return index;
      }
      return -1;
    }

    function findLastGlobalMatchIndexForNote(globalMatches, noteId) {
      if (!noteId) return -1;
      for (let index = globalMatches.length - 1; index >= 0; index -= 1) {
        if (globalMatches[index]?.noteId === noteId) return index;
      }
      return -1;
    }

    function applyOpenNoteSearchMatch(targets, index, options = {}) {
      if (!targets || !Array.isArray(targets.matches)) return false;
      const match = targets.matches[index];
      if (!match) return false;
      const shouldFocusTarget = options.stealFocus !== false;
      const preserveSearchFocus = !shouldFocusTarget
        && notesSearchInput instanceof HTMLInputElement
        && document.activeElement === notesSearchInput;
      const preservedSelectionStart = preserveSearchFocus ? notesSearchInput.selectionStart : null;
      const preservedSelectionEnd = preserveSearchFocus ? notesSearchInput.selectionEnd : null;

      function restoreSearchFocus() {
        if (!preserveSearchFocus) return;
        if (!(notesSearchInput instanceof HTMLInputElement)) return;
        notesSearchInput.focus({ preventScroll: true });
        try {
          if (
            Number.isInteger(preservedSelectionStart)
            && Number.isInteger(preservedSelectionEnd)
          ) {
            notesSearchInput.setSelectionRange(preservedSelectionStart, preservedSelectionEnd);
          }
        } catch (_error) {
          // Ignore selection restoration failures for non-text input states.
        }
      }

      const noteCard = document.querySelector(`[data-note-card-id="${targets.noteId}"]`);
      if (noteCard instanceof HTMLElement) {
        noteCard.scrollIntoView({ block: "nearest", inline: "nearest" });
      }

      if (targets.kind !== "clean") {
        clearCleanSearchDecorations();
      }
      if (targets.kind !== "markdown") {
        clearMarkdownSearchOverlays(targets.noteId);
      }

      if (targets.kind === "markdown" && targets.input instanceof HTMLTextAreaElement) {
        clearMarkdownSearchOverlays(targets.noteId);
        if (!shouldFocusTarget) {
          scrollMarkdownMatchIntoView(targets.input, match.start);
          window.requestAnimationFrame(() => {
            scrollMarkdownMatchIntoView(targets.input, match.start);
          });
          restoreSearchFocus();
          return true;
        }
        targets.input.focus({ preventScroll: true });
        targets.input.setSelectionRange(match.start, match.end);
        scrollMarkdownMatchIntoView(targets.input, match.start);
        window.requestAnimationFrame(() => {
          scrollMarkdownMatchIntoView(targets.input, match.start);
        });
        restoreSearchFocus();
        return true;
      }

      if (targets.kind === "clean" && targets.editor instanceof HTMLElement) {
        const marker = decorateCleanSearchMatch(targets.editor, targets.terms || [], index);
        if (!(marker instanceof HTMLElement)) return false;
        const anchor = marker.parentElement || marker;
        anchor.scrollIntoView({ block: "center", inline: "nearest" });
        restoreSearchFocus();
        return true;
      }

      if (targets.kind === "title" && targets.input instanceof HTMLInputElement) {
        if (shouldFocusTarget || preserveSearchFocus) {
          targets.input.focus({ preventScroll: true });
        }
        targets.input.setSelectionRange(match.start, match.end);
        targets.input.scrollIntoView({ block: "nearest", inline: "nearest" });
        restoreSearchFocus();
        return true;
      }

      return false;
    }

    async function focusGlobalNoteSearchMatchAt(index, queryOverride = null, options = {}) {
      const searchData = getGlobalNoteSearchData(queryOverride);
      if (!searchData.query) {
        updateNotesSearchFindingsUi(0);
        return false;
      }

      const totalFindings = searchData.globalMatches.length;
      if (!totalFindings) {
        state.noteSearchNavKey = searchData.navKey;
        state.noteSearchNavIndex = -1;
        updateNotesSearchFindingsUi(searchData.filteredNotes.length);
        return false;
      }

      const normalizedIndex = Number.isFinite(index) ? Math.trunc(index) : 0;
      const wrappedIndex = ((normalizedIndex % totalFindings) + totalFindings) % totalFindings;
      const targetMatch = searchData.globalMatches[wrappedIndex];
      if (!targetMatch) return false;

      if (state.openNoteId && state.openNoteId !== targetMatch.noteId) {
        await saveOpenNote();
      }

      state.openNoteId = targetMatch.noteId;
      state.noteSearchNavKey = searchData.navKey;
      state.noteSearchNavIndex = wrappedIndex;
      state.pendingNoteSearchJump = {
        noteId: targetMatch.noteId,
        query: searchData.query,
        navKey: searchData.navKey,
        navIndex: wrappedIndex,
        matchField: targetMatch.field,
        matchFieldIndex: targetMatch.fieldIndex,
        retriesRemaining: 1,
        preserveSearchFocus: options.preserveSearchFocus === true
      };
      render();
      return true;
    }

    async function stepOpenNoteSearchMatch(direction = 1, queryOverride = null) {
      const searchData = getGlobalNoteSearchData(queryOverride);
      if (!searchData.query) {
        updateNotesSearchFindingsUi(0);
        return false;
      }

      const totalFindings = searchData.globalMatches.length;
      if (!totalFindings) {
        state.noteSearchNavKey = searchData.navKey;
        state.noteSearchNavIndex = -1;
        updateNotesSearchFindingsUi(searchData.filteredNotes.length);
        return false;
      }

      let nextIndex;
      if (
        state.noteSearchNavKey === searchData.navKey
        && state.noteSearchNavIndex >= 0
        && state.noteSearchNavIndex < totalFindings
      ) {
        const step = direction < 0 ? -1 : 1;
        nextIndex = (state.noteSearchNavIndex + step + totalFindings) % totalFindings;
      } else {
        const openNoteIndex = direction < 0
          ? findLastGlobalMatchIndexForNote(searchData.globalMatches, state.openNoteId)
          : findFirstGlobalMatchIndexForNote(searchData.globalMatches, state.openNoteId);
        if (openNoteIndex !== -1) {
          nextIndex = openNoteIndex;
        } else {
          nextIndex = direction < 0 ? totalFindings - 1 : 0;
        }
      }

      return focusGlobalNoteSearchMatchAt(nextIndex, searchData.query);
    }

    function updateNotesSearchFindingsUi(filteredResultCount = null) {
      if (!notesSearchNav || !notesSearchCount || !notesSearchPrevButton || !notesSearchNextButton) return;

      const searchData = getGlobalNoteSearchData();
      if (!searchData.query) {
        resetNoteSearchNavigationState();
        notesSearchNav.hidden = true;
        notesSearchCount.textContent = "";
        notesSearchPrevButton.disabled = true;
        notesSearchNextButton.disabled = true;
        return;
      }

      const totalFindings = searchData.globalMatches.length;
      if (totalFindings > 0) {
        if (
          state.noteSearchNavKey !== searchData.navKey
          || state.noteSearchNavIndex < 0
          || state.noteSearchNavIndex >= totalFindings
        ) {
          const openNoteIndex = findFirstGlobalMatchIndexForNote(searchData.globalMatches, state.openNoteId);
          state.noteSearchNavIndex = openNoteIndex !== -1 ? openNoteIndex : 0;
        }
        state.noteSearchNavKey = searchData.navKey;
        notesSearchCount.textContent = `${state.noteSearchNavIndex + 1}/${totalFindings}`;
        notesSearchPrevButton.disabled = totalFindings <= 1;
        notesSearchNextButton.disabled = totalFindings <= 1;
        clearMarkdownSearchOverlays(state.openNoteId);
      } else {
        clearCleanSearchDecorations();
        clearMarkdownSearchOverlays();
        const resultCount = filteredResultCount === null
          ? searchData.filteredNotes.length
          : filteredResultCount;
        const safeResultCount = Math.max(0, Number(resultCount) || 0);
        state.noteSearchNavKey = searchData.navKey;
        state.noteSearchNavIndex = -1;
        notesSearchCount.textContent = safeResultCount === 1 ? "1 result" : `${safeResultCount} results`;
        notesSearchPrevButton.disabled = true;
        notesSearchNextButton.disabled = true;
      }

      notesSearchNav.hidden = false;
    }

    function jumpToOpenNoteSearchMatch() {
      const pending = state.pendingNoteSearchJump;
      if (!pending || !pending.noteId || pending.noteId !== state.openNoteId) {
        state.pendingNoteSearchJump = null;
        return false;
      }

      const searchData = getGlobalNoteSearchData(pending.query);
      if (!searchData.globalMatches.length) {
        state.pendingNoteSearchJump = null;
        updateNotesSearchFindingsUi(searchData.filteredNotes.length);
        return false;
      }

      let navIndex = Number.isFinite(pending.navIndex) ? pending.navIndex : -1;
      if (navIndex < 0 || navIndex >= searchData.globalMatches.length) {
        navIndex = findFirstGlobalMatchIndexForNote(searchData.globalMatches, pending.noteId);
      }
      if (navIndex < 0 || navIndex >= searchData.globalMatches.length) {
        navIndex = 0;
      }

      const match = searchData.globalMatches[navIndex];
      const targetField = pending.matchField || match?.field || "body";
      const targetFieldIndex = Number.isFinite(pending.matchFieldIndex)
        ? pending.matchFieldIndex
        : (match?.fieldIndex ?? 0);
      const targets = getOpenNoteSearchTargetsForField(pending.noteId, searchData.terms, targetField);
      state.noteSearchNavKey = searchData.navKey;
      state.noteSearchNavIndex = navIndex;

      if (!targets?.matches?.length) {
        const retriesRemaining = Number.isFinite(pending.retriesRemaining)
          ? pending.retriesRemaining
          : 0;
        if (retriesRemaining > 0) {
          state.pendingNoteSearchJump = {
            ...pending,
            navKey: searchData.navKey,
            navIndex,
            retriesRemaining: retriesRemaining - 1
          };
          window.requestAnimationFrame(() => {
            if (!state.pendingNoteSearchJump) return;
            if (state.pendingNoteSearchJump.noteId !== pending.noteId) return;
            render();
          });
          updateNotesSearchFindingsUi(searchData.filteredNotes.length);
          return true;
        }
        state.pendingNoteSearchJump = null;
        updateNotesSearchFindingsUi(searchData.filteredNotes.length);
        return false;
      }

      state.pendingNoteSearchJump = null;
      const nextMatchIndex = Math.min(
        Math.max(0, targetFieldIndex),
        targets.matches.length - 1
      );
      const applied = applyOpenNoteSearchMatch(targets, nextMatchIndex, {
        stealFocus: pending.preserveSearchFocus !== true
      });
      updateNotesSearchFindingsUi(searchData.filteredNotes.length);
      return applied;
    }

    function scoreNoteForSearch(note, terms, fullQuery) {
      const title = String(note.title || "").toLowerCase();
      const path = String(note.sync_path || "").toLowerCase();
      const body = getSearchableNoteBodyText(note).toLowerCase();

      const allTermsMatched = terms.every((term) => (
        title.includes(term) || path.includes(term) || body.includes(term)
      ));
      if (!allTermsMatched) {
        return null;
      }

      let score = 0;
      if (fullQuery && title.includes(fullQuery)) score += 80;
      if (fullQuery && path.includes(fullQuery)) score += 45;
      if (fullQuery && body.includes(fullQuery)) score += 28;

      terms.forEach((term) => {
        if (title.startsWith(term)) score += 16;
        if (title.includes(term)) score += 10;
        if (path.includes(term)) score += 6;
        if (body.includes(term)) score += 3;
      });

      return score;
    }

    function filterNotesForSearch(notes, query) {
      const normalizedQuery = getNormalizedNotesSearchQuery(query);
      if (!normalizedQuery) {
        return notes;
      }

      const terms = getNotesSearchTerms(normalizedQuery);
      if (!terms.length) {
        return notes;
      }

      return notes
        .map((note, index) => {
          const score = scoreNoteForSearch(note, terms, normalizedQuery);
          if (score === null) return null;
          return { note, score, index };
        })
        .filter(Boolean)
        .sort((a, b) => (b.score - a.score) || (a.index - b.index))
        .map((entry) => entry.note);
    }

    function syncNotesSearchInput() {
      if (!notesSearchInput) return;
      const hasWorkspace = Boolean(state.workspace);
      notesSearchInput.disabled = !hasWorkspace;
      if (notesSearchInput.value !== state.notesSearchQuery) {
        notesSearchInput.value = state.notesSearchQuery;
      }
      if (notesSearchClearButton instanceof HTMLButtonElement) {
        const rawQuery = String(state.notesSearchQuery || notesSearchInput.value || "");
        const showClear = hasWorkspace && rawQuery.length > 0;
        notesSearchClearButton.hidden = !showClear;
        notesSearchClearButton.disabled = !showClear;
      }
    }

    function renderNotes() {
      syncNotesSearchInput();
      updateModeButtons();
      noteMessage.innerHTML = state.noteMessage ? `<div class="message error">${escapeHtml(state.noteMessage)}</div>` : "";
      if (!state.projects.length) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = "";
        updateNotesSearchFindingsUi(0);
        return;
      }

      if (!state.workspace) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = `<div class="empty-state">Select or create a project to start collecting notes.</div>`;
        updateNotesSearchFindingsUi(0);
        return;
      }

      const workspaceNotes = Array.isArray(state.workspace.notes) ? state.workspace.notes : [];
      if (!workspaceNotes.length) {
        resetTransientStatusLabel(noteStatus);
        notesList.innerHTML = `<div class="empty-state">Use the plus button to create the first project note.</div>`;
        updateNotesSearchFindingsUi(0);
        return;
      }

      const activeQuery = getNormalizedNotesSearchQuery(state.notesSearchQuery);
      const searchTerms = getNotesSearchTerms(activeQuery);
      const filteredNotes = filterNotesForSearch(workspaceNotes, activeQuery);
      if (activeQuery && !filteredNotes.length) {
        notesList.innerHTML = `<div class="empty-state">No docs matched "${escapeHtml(state.notesSearchQuery.trim())}".</div>`;
        updateNotesSearchFindingsUi(0);
        return;
      }

      notesList.innerHTML = filteredNotes.map((note) => {
        const isOpen = state.openNoteId === note.id;
        const title = state.noteTitleEdits[note.id] ?? note.title;
        const isSynced = Boolean(note.sync_kind);
        const highlightedTitle = highlightNoteSearchText(title, searchTerms);
        const highlightedSyncPath = highlightNoteSearchText(note.sync_path || "", searchTerms);
        const searchMeta = getNoteSearchMeta(note, searchTerms);
        const updatedLabel = formatLocalTimestamp(note.updated_at_iso, note.updated_at_label);
        const syncPill = isSynced
          ? `<span class="note-sync-pill ${note.sync_status === "conflict" ? "conflict" : ""}">${escapeHtml(note.sync_status === "conflict" ? "Conflict" : "Linked")}</span>`
          : "";
        return `
          <section class="note-card ${isOpen ? "open" : ""}" data-note-card-id="${note.id}">
            ${isOpen ? `
              <div class="note-head-open">
                <div class="note-open-heading">
                  <button class="note-collapse" type="button" data-note-id="${note.id}" data-note-toggle="true" aria-expanded="true" aria-label="Collapse note" title="Collapse note">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path d="m7 10 5 5 5-5"></path>
                    </svg>
                  </button>
                  <div class="note-open-title-block">
                    ${isSynced ? `
                      <div class="note-title-readonly">${highlightedTitle}</div>
                    ` : `
                      <input class="note-title-input note-title-inline" type="text" value="${escapeAttribute(title)}" placeholder="Untitled note" data-note-title-id="${note.id}">
                    `}
                    <div class="note-open-meta">
                      ${isSynced ? `<span class="note-path-inline">${highlightedSyncPath}</span>` : ""}
                      ${syncPill}
                      <span class="note-open-updated">${escapeHtml(updatedLabel)}</span>
                    </div>
                  </div>
                </div>
                <div class="note-head-actions">
                  <button class="icon-btn subtle" type="button" data-note-action="copy" data-note-action-id="${note.id}" aria-label="Copy note" title="Copy note">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                      <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                    </svg>
                  </button>
                  <button class="task-delete-btn" type="button" data-note-action="archive" data-note-action-id="${note.id}" aria-label="Archive note" title="Archive note">×</button>
                </div>
              </div>
            ` : `
              <button class="note-toggle" type="button" data-note-id="${note.id}" data-note-toggle="true" aria-expanded="false">
                <span class="note-toggle-main">
                  <span class="note-toggle-topline">
                    <span class="note-toggle-caret" aria-hidden="true">
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="m7 10 5 5 5-5"></path>
                      </svg>
                    </span>
                    <span class="note-toggle-title">${highlightedTitle}</span>
                    ${syncPill}
                  </span>
                  ${searchMeta ? `<span class="note-search-snippet"><span class="note-search-snippet-label">${escapeHtml(searchMeta.label)}:</span> ${searchMeta.snippetHtml}</span>` : ""}
                </span>
                <span class="muted">${escapeHtml(updatedLabel)}</span>
              </button>
            `}
            ${isOpen ? renderOpenNote(note) : ""}
          </section>
        `;
      }).join("");

      hydrateCleanEditor();
      updateNotesSearchFindingsUi(filteredNotes.length);
    }

    function renderNoteFilePicker() {
      const canLink = Boolean(
        state.selectedProjectId
        && state.workspace?.project?.source_kind === "local"
      );

      if (!canLink) {
        state.noteFilePickerOpen = false;
      }

      notesLinkButton.disabled = !canLink;
      notesLinkButton.title = canLink
        ? "Link markdown file"
        : "Link a local project folder to import docs";
      noteLinkPickerWrap.classList.toggle("open", canLink && state.noteFilePickerOpen);

      if (!canLink || !state.noteFilePickerOpen) {
        noteLinkPicker.innerHTML = "";
        return;
      }

      if (state.noteFilePickerLoading) {
        noteLinkPicker.innerHTML = `<div class="note-picker-empty">Loading markdown files…</div>`;
        return;
      }

      if (!state.noteLinkableFiles.length) {
        noteLinkPicker.innerHTML = `<div class="note-picker-empty">No markdown files found under docs/.</div>`;
        return;
      }

      noteLinkPicker.innerHTML = state.noteLinkableFiles.map((file) => `
        <button class="note-picker-item" type="button" data-note-link-select="${escapeAttribute(file.relative_path)}">
          <strong>${escapeHtml(file.display_name)}</strong>
          <span class="muted">${escapeHtml(file.relative_path)}</span>
        </button>
      `).join("");
    }

    function renderOpenNote(note) {
      const renderMode = getEffectiveNoteRenderMode();
      const searchDocViewActive = hasActiveNotesSearchQuery();
      const cleanEditorEditable = renderMode === "clean" && !searchDocViewActive;
      const revisionConflictBanner = state.noteRevisionConflict?.noteId === note.id ? `
        <div class="note-sync-banner">
          <div>Note changed in the background. Choose which version to keep.</div>
          <div class="note-sync-actions">
            <button class="text-btn" type="button" data-note-revision-action="latest" data-note-revision-id="${note.id}">Use Latest</button>
            <button class="text-btn" type="button" data-note-revision-action="local" data-note-revision-id="${note.id}">Use Topside</button>
          </div>
        </div>
      ` : "";
      const syncDetails = note.sync_kind ? formatNoteLastSynced(note) : "";
      const syncBanner = note.sync_status === "conflict" ? `
        <div class="note-sync-banner">
          <div>${escapeHtml(note.sync_conflict_summary || "Linked note sync is paused until you pick a source of truth.")}</div>
          <div class="note-sync-actions">
            <button class="text-btn" type="button" data-note-action="resolve-file" data-note-action-id="${note.id}">Use File</button>
            <button class="text-btn" type="button" data-note-action="resolve-local" data-note-action-id="${note.id}">Use Topside</button>
          </div>
        </div>
      ` : "";
      const syncMeta = syncDetails ? `<div class="note-editor-meta">${escapeHtml(syncDetails)}</div>` : "";
      const savedBodyHeight = getSavedNoteBodyHeight(note.id);
      const bodyHeightStyle = savedBodyHeight ? ` style="height:${savedBodyHeight}px;"` : "";

      if (renderMode === "markdown") {
        const body = state.noteBodyEdits[note.id] ?? note.body;
        return `
          <div class="note-editor">
            ${revisionConflictBanner}
            ${syncBanner}
            ${syncMeta}
            <div class="note-body-wrap">
              <div class="markdown-search-overlay" data-note-search-overlay-id="${note.id}" hidden aria-hidden="true">
                <pre class="markdown-search-overlay-content"></pre>
              </div>
              <textarea class="markdown-input note-body-input" data-note-body-id="${note.id}" placeholder="Capture context, decisions, links, or a handoff note..."${bodyHeightStyle}>${escapeHtml(body)}</textarea>
            </div>
          </div>
        `;
      }

      return `
        <div class="note-editor">
          ${revisionConflictBanner}
          ${syncBanner}
          ${syncMeta}
          ${cleanEditorEditable ? `<div class="toolbar note-toolbar">
            <button type="button" data-rich-command="bold">Bold</button>
            <button type="button" data-rich-command="italic">Italic</button>
            <button type="button" data-rich-command="h2">H2</button>
            <button type="button" data-rich-command="bullet">List</button>
            <button type="button" data-rich-command="checklist">Check</button>
            <button type="button" data-rich-command="link">Link</button>
          </div>` : ""}
          <div class="clean-editor" contenteditable="${cleanEditorEditable ? "true" : "false"}" data-note-clean-id="${note.id}" data-placeholder="Capture context, decisions, links, or a handoff note..." aria-readonly="${cleanEditorEditable ? "false" : "true"}"></div>
        </div>
      `;
    }

    function hydrateCleanEditor() {
      if (getEffectiveNoteRenderMode() !== "clean" || !state.openNoteId || !state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === state.openNoteId);
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!note || !editor || editor.dataset.hydrated === "true") return;
      const baseHtmlSource = state.noteMode === "clean"
        ? (state.noteHtmlEdits[note.id] ?? note.rendered_html)
        : note.rendered_html;
      const baseHtml = normalizeCleanHtml(baseHtmlSource);
      const activeBodyMatch = getActiveBodySearchMatchForNote(note.id);
      editor.innerHTML = activeBodyMatch
        ? buildDecoratedCleanSearchHtml(baseHtml, activeBodyMatch.terms, activeBodyMatch.matchIndex)
        : baseHtml;
      editor.dataset.hydrated = "true";
    }

    function updateModeButtons() {
      const activeMode = getEffectiveNoteRenderMode();
      document.querySelectorAll("[data-note-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.noteMode === activeMode);
      });
    }

    function applyFocus() {
      if (state.focusTaskId) {
        const taskId = state.focusTaskId;
        const input = document.querySelector(`[data-task-id="${taskId}"]`);
        if (input) {
          const task = findTask(taskId);
          input.focus();
          expandHeadingInput(input, state.taskEdits[taskId] ?? task?.title ?? input.value);
          syncTaskRowFromInput(input);
          state.focusTaskId = null;
          return;
        }
      }

      if (state.focusDraftKey) {
        const draftKey = state.focusDraftKey;
        const input = document.querySelector(`[data-task-draft-key="${draftKey}"]`);
        if (input) {
          const draft = getDraft(draftKey);
          input.focus();
          expandHeadingInput(input, draft?.title ?? input.value);
          syncTaskRowFromInput(input);
          state.focusDraftKey = null;
          return;
        }
      }

      if (jumpToOpenNoteSearchMatch()) {
        return;
      }

      if (state.focusNoteId) {
        const input = document.querySelector(`[data-note-title-id="${state.focusNoteId}"]`);
        if (input) {
          input.focus();
          input.select();
          state.focusNoteId = null;
        }
      }
    }

    function syncLocation() {
      const url = new URL(window.location.href);
      if (state.selectedProjectId) {
        url.searchParams.set("project_id", state.selectedProjectId);
      } else {
        url.searchParams.delete("project_id");
      }
      history.replaceState({}, "", url.toString());
      scheduleSessionPersist();
    }

    function handleRichCommand(command) {
      const editor = document.querySelector(`[data-note-clean-id="${state.openNoteId}"]`);
      if (!editor) return;
      editor.focus();
      if (command === "bold") {
        document.execCommand("bold");
      } else if (command === "italic") {
        document.execCommand("italic");
      } else if (command === "h2") {
        document.execCommand("formatBlock", false, "h2");
      } else if (command === "bullet") {
        document.execCommand("insertUnorderedList");
      } else if (command === "checklist") {
        document.execCommand("insertHTML", false, "<ul><li><input type='checkbox'> checklist item</li></ul>");
      } else if (command === "link") {
        const href = window.prompt("Link URL");
        if (href) document.execCommand("createLink", false, href);
      }
      state.noteHtmlEdits[state.openNoteId] = editor.innerHTML;
      debounceNoteSave(state.openNoteId);
    }

    function normalizeCleanHtml(html) {
      const container = document.createElement("div");
      container.innerHTML = html || "";
      stripSearchDecorationsFromContainer(container);
      container.querySelectorAll("input[type='checkbox']").forEach((input) => {
        input.removeAttribute("disabled");
      });
      return container.innerHTML;
    }

    function getCurrentCleanHtml(noteId) {
      const editor = document.querySelector(`[data-note-clean-id="${noteId}"]`);
      return editor ? stripSearchDecorationsFromHtml(editor.innerHTML) : null;
    }

    function cleanHtmlToMarkdown(html) {
      const container = document.createElement("div");
      container.innerHTML = stripSearchDecorationsFromHtml(html || "");
      const markdown = serializeBlockChildren(container).trim();
      return markdown ? `${markdown}\n` : "";
    }

    function isDirectoryPickerCanceled(message = "") {
      const value = String(message).toLowerCase();
      return value.includes("user canceled")
        || value.includes("user cancelled")
        || value.includes("(-128)");
    }

    function serializeBlockChildren(node) {
      const parts = [];
      node.childNodes.forEach((child) => {
        const chunk = serializeNode(child).trimEnd();
        if (chunk) parts.push(chunk);
      });
      return parts.join("\n\n");
    }

    function serializeNode(node) {
      if (node.nodeType === Node.TEXT_NODE) {
        return node.textContent.replace(/\u00a0/g, " ");
      }
      if (node.nodeType !== Node.ELEMENT_NODE) {
        return "";
      }

      const tag = node.tagName.toLowerCase();
      if (tag === "br") return "\n";
      if (tag === "h1") return `# ${serializeInline(node).trim()}`;
      if (tag === "h2") return `## ${serializeInline(node).trim()}`;
      if (tag === "h3") return `### ${serializeInline(node).trim()}`;
      if (tag === "p" || tag === "div") return serializeInline(node).trim();
      if (tag === "ul") {
        return Array.from(node.children).map((child) => serializeListItem(child)).join("\n");
      }
      if (tag === "ol") {
        return Array.from(node.children).map((child, index) => `${index + 1}. ${serializeInline(child).trim()}`).join("\n");
      }
      return serializeInline(node).trim();
    }

    function serializeListItem(node) {
      if (!node || node.tagName.toLowerCase() !== "li") return "";
      const checkbox = node.querySelector(":scope > input[type='checkbox']");
      const checkboxPrefix = checkbox ? `- [${checkbox.checked ? "x" : " "}] ` : "- ";
      const clone = node.cloneNode(true);
      clone.querySelectorAll("input[type='checkbox']").forEach((input) => input.remove());
      return `${checkboxPrefix}${serializeInline(clone).trim()}`;
    }

    function serializeInline(node) {
      let text = "";
      node.childNodes.forEach((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          text += child.textContent.replace(/\u00a0/g, " ");
          return;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = child.tagName.toLowerCase();
        if (tag === "strong" || tag === "b") {
          text += `**${serializeInline(child)}**`;
        } else if (tag === "em" || tag === "i") {
          text += `*${serializeInline(child)}*`;
        } else if (tag === "a") {
          text += `[${serializeInline(child)}](${child.getAttribute("href") || ""})`;
        } else if (tag === "br") {
          text += "\n";
        } else if (tag === "input" && child.type === "checkbox") {
          text += "";
        } else {
          text += serializeInline(child);
        }
      });
      return text;
    }

    async function fetchJson(url, options = {}, channel = "task", allowFailure = false) {
      try {
        const headers = {
          "Content-Type": "application/json",
          ...(isDesktopShell ? { "x-topside-desktop": "true" } : {}),
          ...(options.headers || {})
        };
        const response = await fetch(url, {
          headers,
          ...options
        });
        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          const message = payload?.error || `Request failed (${response.status})`;
          if (channel === "project") {
            state.projectMessage = message;
            if (state.projectSettingsId) state.projectSettingsMessage = message;
          }
          if (channel === "task") state.taskMessage = message;
          if (channel === "note") state.noteMessage = message;
          if (channel === "codex") {
            state.codexHeadNotice = "";
            state.codexMessage = message;
          }
          if (channel === "port") state.portViewerMessage = message;
          if (!allowFailure) render();
          return null;
        }
        if (channel === "project") {
          state.projectMessage = "";
          state.projectSettingsMessage = "";
        }
        if (channel === "task") state.taskMessage = "";
        if (channel === "note") state.noteMessage = "";
        if (channel === "codex") {
          state.codexHeadNotice = "";
          state.codexMessage = "";
        }
        if (channel === "port") state.portViewerMessage = "";
        return response.status === 204 ? null : response.json();
      } catch (error) {
        const message = error instanceof Error ? error.message : String(error);
        if (channel === "project") {
          state.projectMessage = message;
          if (state.projectSettingsId) state.projectSettingsMessage = message;
        }
        if (channel === "task") state.taskMessage = message;
        if (channel === "note") state.noteMessage = message;
        if (channel === "codex") {
          state.codexHeadNotice = "";
          state.codexMessage = message;
        }
        if (channel === "port") state.portViewerMessage = message;
        if (!allowFailure) render();
        return null;
      }
    }

    function escapeHtml(value = "") {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value = "") {
      return escapeHtml(value);
    }

    async function bootstrapApp() {
      await restoreSessionOnLaunch();
      bindSessionScrollPersistence();
      applyResponsiveLayoutMode();
      scheduleUiRefresh(50);
      render();
      persistSessionStateNow();
    }

    bootstrapApp();
  </script>
</body>
</html>
