<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Topside</title>
  <link rel="stylesheet" href="/assets/xterm.css">
  <style>
    :root {
      --app-height: 100vh;
      --bg: #0b1218;
      --panel: #101b24;
      --panel-soft: #13212b;
      --line: rgba(147, 184, 207, 0.2);
      --line-strong: rgba(147, 184, 207, 0.34);
      --text: #e8f0f5;
      --muted: #8fa4b5;
      --accent: #38bdf8;
      --checkbox-border: rgba(147, 184, 207, 0.26);
      --checkbox-surface: rgba(16, 27, 36, 0.8);
      --checkbox-checked: #292f36;
      --checkbox-checked-border: rgba(92, 104, 116, 0.82);
      --accent-soft: rgba(56, 189, 248, 0.18);
      --scrollbar-size: 8px;
      --scrollbar-clearance: calc(var(--scrollbar-size) + 8px);
      --scrollbar-track: rgba(56, 189, 248, 0.12);
      --scrollbar-thumb: rgba(56, 189, 248, 0.68);
      --scrollbar-thumb-hover: rgba(125, 211, 252, 0.84);
      --warm: #f59e0b;
      --success: #34d399;
      --danger: #f87171;
      --task-priority-none: #7f8ea0;
      --task-priority-p3: #3b82f6;
      --task-priority-p2: #f59e0b;
      --task-priority-p1: #ef4444;
      --shadow: 0 24px 56px rgba(2, 8, 14, 0.34);
      --glass-shell: rgba(8, 16, 23, 0.2);
      --glass-panel: rgba(14, 23, 31, 0.78);
      --glass-blur: 14px;
      --glass-shell-blur: 24px;
      --glass-shell-radius: 20px;
      --sidebar-pane-width: 192px;
      --sidebar-pane-width-collapsed: 72px;
      --pane-head-height: 58px;
      --pane-head-pad-y: 11px;
      --pane-control-size: 34px;
      --pane-control-size-compact: 30px;
      --disclosure-slot: 18px;
      --task-row-min-height: 42px;
      --changelog-list-height: min(38vh, 340px);
      --changelog-pane-height: min(calc(38vh + var(--pane-head-height) + 25px), 427px);
      --todo-animation-duration: 150ms;
      --todo-animation-step: 40ms;
      --todo-animation-distance: 12px;
      --todo-animation-distance-half: 6px;
      --todo-animation-distance-out: -12px;
    }

    @supports (height: 100dvh) {
      :root {
        --app-height: 100dvh;
      }
    }

    * {
      box-sizing: border-box;
      scrollbar-width: none;
      scrollbar-color: transparent transparent;
    }

    *::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: transparent;
      border: 0 solid transparent;
      border-radius: 999px;
      box-shadow: none;
    }

    .scroll-indicator-overlay {
      position: absolute;
      top: 0;
      right: 2px;
      height: 0;
      width: var(--scrollbar-size);
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      border-radius: 999px;
      background: var(--scrollbar-track);
      transform: translateX(3px);
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 3;
    }

    .scroll-indicator-overlay.is-scrollable {
      visibility: visible;
    }

    .scroll-indicator-overlay.scroll-active {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-indicator-thumb {
      width: 100%;
      height: 0;
      border: 1px solid var(--scrollbar-track);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--scrollbar-thumb-hover), var(--scrollbar-thumb));
      box-shadow: inset 0 0 0 1px rgba(232, 240, 245, 0.06);
      transform: translateY(0);
      transition: transform 60ms linear, height 60ms linear;
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }

    html {
      height: 100%;
      color-scheme: dark;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100%;
      position: relative;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 24%),
        linear-gradient(180deg, #0a1117, #0b1218);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    html[data-topside-desktop="true"] body {
      background: transparent;
      border-radius: var(--glass-shell-radius);
      overflow: hidden;
    }

    html[data-topside-desktop="true"] .shell::before {
      content: none;
    }

    html[data-topside-desktop="true"] .shell {
      padding: 8px;
      position: relative;
      z-index: 1;
      border-radius: inherit;
      overflow: hidden;
      isolation: isolate;
      background-clip: padding-box;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      clip-path: inset(0 round var(--glass-shell-radius));
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-topside-desktop="true"] .layout {
      position: relative;
      z-index: 1;
      gap: 8px;
    }

    html[data-topside-desktop="true"] .pane {
      box-shadow: 0 12px 28px rgba(2, 8, 14, 0.28);
    }

    html[data-topside-desktop="true"] .pane-projects {
      align-self: stretch;
      grid-template-rows: auto 1fr;
      border: none;
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-topside-desktop="true"] .pane-projects .pane-head,
    html[data-topside-desktop="true"] .pane-projects .pane-body,
    html[data-topside-desktop="true"] #project-tray,
    html[data-topside-desktop="true"] #project-list {
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-topside-desktop="true"] .pane-projects .pane-body {
      padding-top: 6px;
      min-height: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      height: var(--app-height);
      padding: 12px;
      display: flex;
      overflow: hidden;
    }

    .layout {
      flex: 1;
      min-height: 0;
      height: 100%;
      display: grid;
      gap: 10px;
      grid-template-columns: var(--sidebar-pane-width) minmax(0, 1fr) minmax(0, 1fr);
      transition: grid-template-columns 180ms ease;
    }

    html:not([data-layout-mode="one"]) .layout.sidebar-collapsed {
      grid-template-columns: var(--sidebar-pane-width-collapsed) minmax(0, 1fr) minmax(0, 1fr);
    }

    .todo-stack {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .layout.empty-app .todo-stack {
      grid-column: 2 / -1;
    }

    .layout.empty-app .pane-todo .pane-head {
      display: none;
    }

    .layout.empty-app .pane-changelog {
      display: none;
    }

    .layout.empty-app .pane-notes {
      display: none;
    }

    .layout.empty-app .pane-codex {
      display: none;
    }

    .layout.project-starter .todo-stack {
      grid-column: 2 / -1;
    }

    .layout.project-starter .pane-todo {
      grid-template-rows: 1fr;
    }

    .layout.project-starter .pane-todo .pane-head {
      display: none;
    }

    .layout.project-starter .pane-todo .pane-body {
      display: flex;
      flex-direction: column;
    }

    .layout.project-starter #task-message {
      display: none;
    }

    .layout.project-starter #active-task-list {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }

    .layout.project-starter .starter-shell {
      width: 100%;
      height: 100%;
    }

    .layout.project-starter .pane-changelog {
      display: none;
    }

    .layout.project-starter .pane-notes {
      display: none;
    }

    .layout.project-starter .pane-codex {
      display: none;
    }

    .pane.pane-archive {
      display: none;
      min-height: 0;
    }

    .pane.pane-codex {
      display: none;
      min-height: 0;
    }

    .layout.archive-view .todo-stack,
    .layout.archive-view .pane-notes,
    .layout.archive-view .pane-codex {
      display: none;
    }

    .layout.archive-view .pane.pane-archive {
      display: grid;
      grid-column: 2 / -1;
      grid-row: 1 / -1;
    }

    .layout.codex-view .todo-stack,
    .layout.codex-view .pane-notes {
      display: none;
    }

    .layout.codex-view .pane.pane-codex {
      display: grid;
      grid-column: 2 / -1;
      grid-row: 1 / -1;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid rgba(147, 184, 207, 0.24);
      border-radius: 20px;
      background: var(--glass-panel);
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(130%);
      backdrop-filter: blur(var(--glass-blur)) saturate(130%);
      overflow: hidden;
    }

    .pane-projects {
      align-self: start;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      grid-template-rows: auto auto;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      overflow: visible;
    }

    .pane-todo {
      flex: 1 1 auto;
    }

    .pane-changelog {
      flex: 0 0 auto;
      height: var(--changelog-pane-height);
      transition: height 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .pane-changelog.collapsed {
      height: var(--pane-head-height);
    }

    .pane-changelog.collapsed .pane-head {
      border-bottom-color: transparent;
    }

    .pane-head {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: var(--pane-head-height);
      padding: var(--pane-head-pad-y) 14px;
      border-bottom: 1px solid var(--line);
    }

    .pane-head-main,
    .pane-head-context {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pane-head-main {
      flex: 0 0 auto;
    }

    .pane-head-context {
      flex: 1 1 auto;
    }

    .pane-projects .pane-head {
      padding-left: 10px;
      padding-right: 10px;
      border-bottom: none;
    }

    .pane-projects .pane-title {
      padding-left: 0;
    }

    .pane-title {
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      min-height: var(--pane-control-size);
      padding-left: var(--disclosure-slot);
      letter-spacing: 0.02em;
    }

    .pane-title-collapsible {
      position: relative;
    }

    .pane-title-toggle {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      place-items: center;
      padding: 0;
      position: absolute;
      top: 50%;
      left: 0;
      opacity: 0.42;
      transform: translateY(-50%) scale(0.92);
      transition: opacity 160ms ease, transform 180ms ease, color 160ms ease, background-color 160ms ease;
    }

    .pane-title-toggle svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 220ms ease;
    }

    .pane-title-toggle:hover,
    .pane-title-toggle:focus-visible {
      color: var(--text);
      background: rgba(16, 33, 46, 0.84);
      outline: none;
    }

    .sidebar-collapse-btn {
      width: var(--pane-control-size-compact);
      height: var(--pane-control-size-compact);
      border-radius: 10px;
    }

    .sidebar-collapse-btn svg {
      transition: transform 180ms ease;
    }

    .sidebar-collapse-btn[aria-pressed="true"] {
      color: var(--text);
      background: rgba(16, 33, 46, 0.84);
    }

    .sidebar-collapse-btn[aria-pressed="true"] svg {
      transform: rotate(180deg);
    }

    html[data-layout-mode="one"] .sidebar-collapse-btn {
      display: none;
    }

    .pane-changelog .pane-head:hover .pane-title-toggle,
    .pane-changelog .pane-head:focus-within .pane-title-toggle {
      opacity: 0.96;
      transform: translateY(-50%) scale(1);
    }

    .pane-changelog.collapsed .pane-title-toggle svg {
      transform: rotate(-90deg);
    }

    .pane-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: var(--pane-control-size-compact);
      margin-left: auto;
    }

    .pane-head .muted {
      display: inline-flex;
      align-items: center;
      min-height: var(--pane-control-size-compact);
      line-height: 1;
    }

    .pane-head-tools {
      gap: 10px;
    }

    .tool-cluster {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .compact-tools {
      min-height: var(--pane-control-size-compact);
      padding: 2px;
      border: 1px solid rgba(147, 184, 207, 0.14);
      border-radius: 12px;
      background: rgba(8, 15, 21, 0.5);
      box-shadow: inset 0 1px 0 rgba(248, 251, 255, 0.02);
    }

    .compact-tools .icon-btn {
      width: var(--pane-control-size-compact);
      height: var(--pane-control-size-compact);
      border: none;
      border-radius: 10px;
      background: transparent;
      box-shadow: none;
    }

    .compact-tools .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    .compact-tools .icon-btn:hover,
    .compact-tools .icon-btn:focus-visible {
      background: rgba(16, 33, 46, 0.72);
    }

    .compact-tools .mode-toggle {
      padding: 0;
      border: none;
      background: transparent;
      gap: 2px;
    }

    .compact-tools .mode-btn {
      width: var(--pane-control-size-compact);
      height: var(--pane-control-size-compact);
      border-radius: 10px;
    }

    .pane-todo .pane-head-context {
      justify-content: flex-end;
    }

    .pane-todo .pane-head-actions {
      min-width: 0;
    }

    .todo-status {
      min-width: 0;
      justify-content: flex-start;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      gap: 8px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.03em;
      padding: 0 10px;
      border: 1px solid rgba(147, 184, 207, 0.16);
      border-radius: 999px;
      background: rgba(8, 15, 21, 0.56);
    }

    .todo-status-label {
      flex: 0 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .todo-status-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .todo-status-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
    }

    .todo-status-key {
      color: var(--muted);
      font-size: 10px;
    }

    .todo-status-priority {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      min-width: 1.1em;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .todo-status-priority[data-priority="P1"] {
      color: var(--task-priority-p1);
    }

    .todo-status-priority[data-priority="P2"] {
      color: var(--task-priority-p2);
    }

    .todo-status-priority[data-priority="P3"] {
      color: var(--task-priority-p3);
    }

    .todo-status-priority[data-priority="P0"] {
      color: var(--task-priority-none);
    }

    .pane-notes .pane-head {
      gap: 10px;
    }

    .pane-notes .pane-head-context {
      justify-content: center;
    }

    .pane-notes .pane-head-actions {
      margin-left: 0;
    }

    .codex-head-context,
    .codex-head-actions {
      min-width: 0;
    }

    .codex-head-context {
      justify-content: center;
    }

    .codex-head-copy {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: var(--pane-control-size-compact);
      max-width: min(100%, 44ch);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pane-search {
      height: 36px;
      flex: 1 1 auto;
      min-width: 0;
      max-width: 500px;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid rgba(147, 184, 207, 0.18);
      border-radius: 12px;
      padding: 0 11px;
      background: rgba(8, 15, 21, 0.92);
      overflow: hidden;
    }

    .pane-search-field {
      min-width: 0;
      flex: 1 1 140px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .pane-search svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      color: var(--muted);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pane-search:focus-within {
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.2);
      background: rgba(10, 20, 28, 0.98);
    }

    .pane-search-input {
      appearance: none;
      -webkit-appearance: none;
      flex: 1 1 auto;
      min-width: 0;
      width: auto;
      height: 100%;
      border: none;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.25;
      outline: none;
    }

    .pane-search-input::-webkit-search-decoration,
    .pane-search-input::-webkit-search-cancel-button,
    .pane-search-input::-webkit-search-results-button,
    .pane-search-input::-webkit-search-results-decoration {
      display: none;
      -webkit-appearance: none;
    }

    .pane-search-input::placeholder {
      color: var(--muted);
      opacity: 0.9;
    }

    .pane-search-input:disabled {
      cursor: default;
      opacity: 0.52;
    }

    .pane-search-clear {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      background: rgba(16, 33, 46, 0.72);
      color: var(--muted);
      padding: 0;
      display: inline-grid;
      place-items: center;
      transition: color 120ms ease, background-color 120ms ease, transform 120ms ease;
    }

    .pane-search-clear[hidden] {
      display: none;
    }

    .pane-search-clear svg {
      width: 11px;
      height: 11px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pane-search-clear:hover,
    .pane-search-clear:focus-visible {
      color: var(--text);
      background: rgba(24, 46, 64, 0.92);
      transform: scale(1.02);
      outline: none;
    }

    .pane-search-nav {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
      margin-left: auto;
    }

    .pane-search-nav[hidden] {
      display: none;
    }

    .pane-search-count {
      min-width: 0;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      white-space: nowrap;
    }

    .pane-search-nav-btn {
      width: 22px;
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: rgba(10, 20, 28, 0.86);
      color: var(--muted);
      padding: 0;
      display: inline-grid;
      place-items: center;
      transition: color 120ms ease, border-color 120ms ease, background-color 120ms ease;
    }

    .pane-search-nav-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .pane-search-nav-btn:hover,
    .pane-search-nav-btn:focus-visible {
      color: var(--text);
      border-color: var(--line-strong);
      background: rgba(16, 33, 46, 0.92);
      outline: none;
    }

    .pane-search-nav-btn:disabled {
      opacity: 0.46;
      cursor: default;
      background: rgba(8, 15, 21, 0.62);
      color: var(--muted);
    }

    .pane-body {
      min-height: 0;
      overflow: auto;
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .pane-projects .pane-body {
      padding: 0 10px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
    }

    .pane-todo .pane-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-changelog .pane-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 160ms ease, transform 220ms ease;
    }

    .pane-codex .pane-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-changelog.collapsed .pane-body {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }

    .icon-btn,
    .text-btn {
      border: 1px solid rgba(147, 184, 207, 0.16);
      border-radius: 10px;
      background: rgba(9, 18, 25, 0.78);
      color: var(--text);
      padding: 8px 10px;
    }

    .icon-btn {

    }

    .note-editor-meta {

    .codex-terminal-shell {

      display: grid;
      grid-template-rows: auto minmax(0, 1fr);

      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;

      color: var(--muted);

    .codex-terminal-meta {

    .codex-terminal-empty {

    .codex-composer {

      padding: 12px;

    .codex-terminal-helper {

    .note-toggle-caret,
    .note-collapse {
      width: 18px;
      height: 18px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      padding: 0;
      flex: 0 0 auto;
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 160ms ease, transform 180ms ease, color 160ms ease, background-color 160ms ease;

    .note-toggle-caret {
      pointer-events: none;
    }

    .note-collapse {
      opacity: 0.72;
      transform: translateX(0);
    }

    .note-collapse svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;

      stroke-linecap: round;
      stroke-linejoin: round;
      transform: rotate(-90deg);

      line-height: 1.82;
    }

    .markdown-search-overlay[hidden] {
      display: none;
    }

    .markdown-search-overlay-content {
      margin: 0;
      min-height: 100%;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: break-word;
      transform: translate3d(0, 0, 0);
      will-change: transform;
    }

    mark.markdown-search-hit {
      background: rgba(250, 204, 21, 0.22);
      color: rgba(255, 246, 181, 0.18);
      border-radius: 4px;
      box-shadow:
        inset 0 -0.5em 0 rgba(250, 204, 21, 0.18),
        inset 0 0 0 1px rgba(250, 204, 21, 0.26);
    }

    mark.markdown-search-hit.active {
      background: rgba(250, 204, 21, 0.34);
      color: rgba(255, 247, 204, 0.28);
      box-shadow:
        inset 0 -0.58em 0 rgba(250, 204, 21, 0.28),
        inset 0 0 0 1px rgba(250, 204, 21, 0.42),
        0 0 0 1px rgba(250, 204, 21, 0.14);
    }

    .clean-editor {
      min-height: 320px;
      border: none;
      border-radius: 0;
      background: transparent;
      padding: 4px 0 0;
      overflow: auto;
      line-height: 1.82;
      font-size: 15px;
    }

    .clean-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--muted);
      pointer-events: none;
    }

    .clean-editor:focus {
      outline: none;
      box-shadow: inset 0 1px 0 rgba(56, 189, 248, 0.55);
    }

    .clean-editor h1,
    .clean-editor h2,
    .clean-editor h3,
    .clean-editor p {
      margin-top: 0;
    }

    .starter-shell {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px 10px;
    }

    .starter-card {
      width: min(440px, 100%);
      display: grid;
      gap: 16px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(14, 24, 34, 0.96), rgba(10, 18, 25, 0.92));
      box-shadow: 0 24px 60px rgba(2, 8, 14, 0.3);
    }

    .starter-label {
      color: var(--muted);
      font-size: 13px;
      font-family: "IBM Plex Mono", monospace;
    }

    .starter-actions {
      display: grid;
      gap: 10px;
    }

    .starter-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .starter-btn.active {
      background: linear-gradient(180deg, rgba(67, 97, 190, 0.95), rgba(54, 78, 154, 0.95));
      box-shadow: inset 0 0 0 1px rgba(147, 184, 255, 0.16);
    }

    .starter-btn:not(.active) {
      color: #bcc9d7;
    }

    .starter-btn:hover {
      background-color: rgba(17, 30, 40, 0.72);
    }

    .starter-btn:not(.active):hover,
    .starter-btn:not(.active):focus-visible {
      background: linear-gradient(180deg, rgba(67, 97, 190, 0.95), rgba(54, 78, 154, 0.95));
      box-shadow: inset 0 0 0 1px rgba(147, 184, 255, 0.16);
      color: var(--text);
    }

    .starter-btn.active:hover,
    .starter-btn.active:focus-visible {
      background: linear-gradient(180deg, rgba(77, 109, 208, 0.98), rgba(60, 85, 172, 0.98));
    }

    .starter-btn-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .overlay-shell {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4, 9, 14, 0.58);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      z-index: 1200;
    }

    .overlay-shell.open {
      display: flex;
    }

    .overlay-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(var(--app-height) - 48px));
      overflow: auto;
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(14, 24, 34, 0.98), rgba(10, 18, 25, 0.96));
      box-shadow: 0 26px 60px rgba(2, 8, 14, 0.42);
    }

    .confirm-overlay-card {
      width: min(440px, 100%);
    }

    .overlay-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
    }

    .overlay-head-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .overlay-title {
      display: grid;
      gap: 6px;
    }

    .overlay-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .overlay-section {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(9, 18, 25, 0.62);
    }

    .overlay-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .overlay-actions,
    .overlay-inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .settings-action-list {
      display: grid;
      gap: 10px;
    }

    .settings-action-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(147, 184, 207, 0.28);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(12, 23, 32, 0.9), rgba(8, 15, 22, 0.94));
      color: var(--text);
      text-align: left;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .settings-action-btn:hover,
    .settings-action-btn:focus-visible {
      border-color: rgba(56, 189, 248, 0.42);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.16);
      background: linear-gradient(180deg, rgba(15, 30, 42, 0.94), rgba(10, 20, 28, 0.96));
      color: #e6f4ff;
      transform: translateY(-1px);
      outline: none;
    }

    .settings-action-btn.danger-btn:hover,
    .settings-action-btn.danger-btn:focus-visible {
      border-color: rgba(248, 113, 113, 0.42);
      box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.14);
      background: linear-gradient(180deg, rgba(38, 16, 18, 0.9), rgba(24, 10, 12, 0.94));
      color: #ffe4e6;
    }

    .settings-action-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      color: #67e8f9;
    }

    .settings-action-btn.danger-btn .settings-action-icon {
      color: #fca5a5;
    }

    .settings-action-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .project-icon-current {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .project-card-icon.project-card-icon-large {
      width: 40px;
      height: 40px;
      border-radius: 12px;
    }

    .project-card-icon.project-card-icon-large svg {
      width: 20px;
      height: 20px;
    }

    .project-icon-picker {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 560px) {
      .project-icon-picker {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }
    }

    @media (max-width: 420px) {
      .project-icon-picker {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    .project-icon-option {
      min-height: 48px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(147, 184, 207, 0.24);
      border-radius: 10px;
      background: rgba(10, 18, 25, 0.72);
      color: var(--text);
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    .project-icon-option:hover,
    .project-icon-option:focus-visible {
      border-color: rgba(56, 189, 248, 0.42);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.14);
      background: rgba(14, 28, 38, 0.9);
      transform: translateY(-1px);
      outline: none;
    }

    .project-icon-option.active {
      border-color: rgba(56, 189, 248, 0.54);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.18);
      background: linear-gradient(180deg, rgba(13, 28, 39, 0.94), rgba(9, 19, 27, 0.96));
    }

    .project-card-icon.project-icon-glyph {
      width: 20px;
      height: 20px;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      color: currentColor;
    }

    .project-card-icon.project-icon-glyph svg {
      width: 18px;
      height: 18px;
    }

    .overlay-value {
      color: #cbd7e3;
      line-height: 1.55;
      word-break: break-word;
    }

    .overlay-muted {
      color: var(--muted);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .overlay-message {
      color: #fed7aa;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .overlay-message.error {
      color: #fecaca;
    }

    .port-viewer-overlay-card {
      width: min(760px, 100%);
    }

    .port-viewer-list {
      display: grid;
      gap: 12px;
    }

    .port-session-card {
      gap: 12px;
    }

    .port-session-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .port-session-title {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .port-session-title h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .port-session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .port-session-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 8px;
      border: 1px solid rgba(147, 184, 207, 0.24);
      border-radius: 999px;
      background: rgba(10, 18, 25, 0.52);
      color: #d9e7f4;
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
    }

    .port-session-command {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px;
      line-height: 1.6;
    }

    .port-session-warning {
      color: #fed7aa;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      line-height: 1.5;
    }

    .danger-btn {
      border-color: rgba(248, 113, 113, 0.3);
      color: #fecaca;
    }

    .disabled-note {
      color: var(--muted);
      font-size: 13px;
    }

    html[data-layout-mode="two"] .layout {
      grid-template-columns: var(--sidebar-pane-width) 1fr;
      grid-template-areas:
        "projects todo"
        "notes notes";
    }

    html[data-layout-mode="two"] .layout.sidebar-collapsed {
      grid-template-columns: var(--sidebar-pane-width-collapsed) 1fr;
    }

    html[data-layout-mode="two"] .pane-projects { grid-area: projects; }
    html[data-layout-mode="two"] .todo-stack { grid-area: todo; }
    html[data-layout-mode="two"] .pane-notes { grid-area: notes; }
    html[data-layout-mode="two"] .pane-codex { grid-area: notes; }
    html[data-layout-mode="two"] .pane-archive { grid-area: auto; }

    html[data-layout-mode="one"] .shell {
      padding: 10px;
    }

    html[data-layout-mode="one"] .layout {
      min-height: 0;
      height: 100%;
      grid-template-columns: 1fr;
      grid-template-areas: none;
    }

    html[data-layout-mode="one"] .pane-projects,
    html[data-layout-mode="one"] .todo-stack,
    html[data-layout-mode="one"] .pane-notes,
    html[data-layout-mode="one"] .pane-codex,
    html[data-layout-mode="one"] .pane-archive {
      grid-area: auto;
    }

    html[data-layout-mode="one"] .layout.archive-view .pane-archive {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    html[data-layout-mode="one"] .layout.codex-view .pane-codex {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    html[data-layout-mode="one"] .pane-projects {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    html[data-layout-mode="one"] .pane-projects .pane-head {
      padding: var(--pane-head-pad-y) 12px;
    }

    html[data-layout-mode="one"] .pane-projects .pane-body {
      padding: 0;
    }

    html[data-layout-mode="one"] .layout.empty-app .todo-stack {
      grid-column: auto;
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="layout">
      <section class="pane pane-projects">
        <div class="pane-head">
          <div class="pane-head-main">
            <span class="pane-title">Projects</span>
          </div>
          <div class="pane-head-actions">
            <button class="icon-btn subtle sidebar-collapse-btn" id="sidebar-collapse-toggle" type="button" aria-label="Collapse project sidebar" title="Collapse project sidebar" aria-pressed="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 6-6 6 6 6"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="pane-body">
          <div id="project-tray"></div>
          <div id="project-list" class="project-list"></div>
          <div class="project-pane-footer">
            <div class="archive-menu" id="archive-menu-wrap">
              <button class="text-btn archive-launch-btn" id="archive-menu-toggle" type="button" aria-label="Open archive" title="Open archive">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 8h16"></path>
                  <path d="M6 8V6.8A1.8 1.8 0 0 1 7.8 5h8.4A1.8 1.8 0 0 1 18 6.8V8"></path>
                  <path d="M5 8v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"></path>
                  <path d="M10 12h4"></path>
                </svg>
                <span class="sidebar-footer-label">Archive</span>
              </button>
              <button class="text-btn sidebar-footer-btn" id="ports-menu-toggle" type="button" aria-label="Open ports" title="Open ports">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 6v12"></path>
                  <path d="M8 9h8"></path>
                  <path d="M8 15h8"></path>
                  <path d="M5 4h14"></path>
                  <path d="M5 20h14"></path>
                </svg>
                <span class="sidebar-footer-label">Ports</span>
              </button>
              <button class="text-btn archive-launch-btn" id="settings-menu-toggle" type="button" aria-label="Open settings" title="Open settings">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="3"></circle>
                  <path d="M19.5 12a1.4 1.4 0 0 0 .02.26l1.54 1.2a1 1 0 0 1 .2 1.32l-1.45 2.5a1 1 0 0 1-1.26.43l-1.82-.73a7.8 7.8 0 0 1-1.35.78l-.28 1.93a1 1 0 0 1-.99.86h-2.9a1 1 0 0 1-.99-.86l-.28-1.93a7.8 7.8 0 0 1-1.35-.78l-1.82.73a1 1 0 0 1-1.26-.43l-1.45-2.5a1 1 0 0 1 .2-1.32l1.54-1.2a1.4 1.4 0 0 0 0-.52L2.94 11.06a1 1 0 0 1-.2-1.32l1.45-2.5a1 1 0 0 1 1.26-.43l1.82.73c.42-.32.88-.58 1.35-.78l.28-1.93a1 1 0 0 1 .99-.86h2.9a1 1 0 0 1 .99.86l.28 1.93c.47.2.93.46 1.35.78l1.82-.73a1 1 0 0 1 1.26.43l1.45 2.5a1 1 0 0 1-.2 1.32l-1.54 1.2a1.4 1.4 0 0 0-.02.26z"></path>
                </svg>
                <span class="sidebar-footer-label">Settings</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="todo-stack">
        <section class="pane pane-todo">
          <div class="pane-head">
            <div class="pane-head-main">
              <span class="pane-title">To-do</span>
            </div>
            <div class="pane-head-context">
              <span class="muted todo-status" id="todo-status">Ready</span>
            </div>
            <div class="pane-head-actions pane-head-tools">
              <div class="tool-cluster compact-tools">
                <button class="icon-btn" id="todo-sort-priority" type="button" aria-label="Sort by priority" title="Sort by priority" aria-pressed="false" disabled>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 6h10"></path>
                    <path d="M7 12h7"></path>
                    <path d="M7 18h4"></path>
                  </svg>
                </button>
                <button class="icon-btn" id="todo-toggle-header" type="button" aria-label="Convert selected row to header" title="Convert selected row to header (⇧⌘H)" disabled>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 6v12"></path>
                    <path d="M16 6v12"></path>
                    <path d="M8 12h8"></path>
                  </svg>
                </button>
                <button class="icon-btn" id="todo-toggle-sections" type="button" aria-label="Collapse all headers" title="Collapse all headers" aria-pressed="false" disabled>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 9 5-5 5 5"></path>
                    <path d="m7 15 5 5 5-5"></path>
                  </svg>
                </button>
                <button class="icon-btn" id="todo-copy-selected" type="button" aria-label="Copy to-do.md" title="Copy to-do.md" disabled>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                    <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="pane-body">
            <div id="task-message"></div>
            <div class="task-list" id="active-task-list"></div>
          </div>
        </section>

        <section class="pane pane-changelog" id="changelog-pane">
          <div class="pane-head">
            <div class="pane-head-main">
              <div class="pane-title pane-title-collapsible">
                <button class="pane-title-toggle" id="changelog-toggle" type="button" aria-expanded="true" aria-controls="changelog-body" aria-label="Collapse changelog" title="Collapse changelog">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 10 5 5 5-5"></path>
                  </svg>
                </button>
                <span>Changelog</span>
              </div>
            </div>
            <div class="pane-head-context">
              <span class="muted" id="changelog-status"></span>
            </div>
            <div class="pane-head-actions pane-head-tools">
              <div class="tool-cluster compact-tools">
                <button class="icon-btn" id="changelog-archive" type="button" aria-label="Archive completed tasks" title="Archive completed tasks">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 8h16"></path>
                    <path d="M6 8V6.8A1.8 1.8 0 0 1 7.8 5h8.4A1.8 1.8 0 0 1 18 6.8V8"></path>
                    <path d="M5 8v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"></path>
                    <path d="M10 12h4"></path>
                  </svg>
                </button>
                <button class="icon-btn todo-export-btn" id="changelog-export" type="button" aria-label="Copy changelog" title="Copy changelog">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                    <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="pane-body" id="changelog-body">
            <div class="done-list" id="done-task-list"></div>
          </div>
        </section>
      </div>

      <section class="pane pane-notes">
        <div class="pane-head">
          <div class="pane-head-main">
            <span class="pane-title">Notes</span>
          </div>
          <div class="pane-head-context">
            <label class="pane-search" for="notes-search-input">
              <span class="pane-search-field">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="11" cy="11" r="7"></circle>
                  <path d="m20 20-3.4-3.4"></path>
                </svg>
                <input
                  id="notes-search-input"
                  class="pane-search-input"
                  type="text"
                  placeholder="Search imported docs..."
                  aria-label="Search imported docs in notes"
                  autocomplete="off"
                  spellcheck="false"
                >
                <button class="pane-search-clear" id="notes-search-clear" type="button" aria-label="Clear search" title="Clear search" hidden>
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 7 10 10"></path>
                    <path d="m17 7-10 10"></path>
                  </svg>
                </button>
              </span>
              <div class="pane-search-nav" id="notes-search-nav" hidden>
                <span class="pane-search-count" id="notes-search-count"></span>
                <button class="pane-search-nav-btn" id="notes-search-prev" type="button" aria-label="Previous match" title="Previous match">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m15 6-6 6 6 6"></path>
                  </svg>
                </button>
                <button class="pane-search-nav-btn" id="notes-search-next" type="button" aria-label="Next match" title="Next match">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m9 6 6 6-6 6"></path>
                  </svg>
                </button>
              </div>
            </label>
          </div>
          <div class="pane-head-actions pane-head-tools">
            <span class="muted" id="note-status"></span>
            <div class="tool-cluster compact-tools">
              <div class="mode-toggle" aria-label="Notes view mode">
                <button class="mode-btn" type="button" data-note-mode="clean" aria-label="Clean view" title="Clean view">

    function loadNoteBodyHeights() {
      const raw = readStorageItem(noteBodyHeightsKey, legacyNoteBodyHeightsKey);
      if (!raw) return {};
      try {
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
          return {};
        }
        const heights = {};
        Object.entries(parsed).forEach(([noteId, height]) => {
          const normalized = Number(height);
          if (
            typeof noteId === "string"
            && noteId
            && Number.isFinite(normalized)
            && normalized >= 120
            && normalized <= 5000
          ) {
            heights[noteId] = Math.round(normalized);
          }
        });
        return heights;
      } catch (_error) {
        return {};
      }
    }

      if (!Array.isArray(terms) || !terms.length) {
        return normalizedHtml;
      }
      const scratch = document.createElement("div");
      scratch.innerHTML = normalizedHtml;
      const matches = collectCleanEditorSearchMatches(scratch, terms);
      const match = matches[matchIndex];
      if (!match) {
        return normalizedHtml;

      const range = document.createRange();
      range.setStart(match.startNode, match.startOffset);
      range.setEnd(match.endNode, match.endOffset);
      const marker = document.createElement("mark");
      marker.dataset.noteSearchMarker = "true";
      marker.dataset.noteSearchActive = "true";
      marker.className = "note-search-active";
      marker.appendChild(range.extractContents());
      range.insertNode(marker);
      return scratch.innerHTML;

      return activeMarker instanceof HTMLElement ? activeMarker : null;

        noteSearchAutoJumpTimer = null;
        if (String(state.notesSearchQuery || "").trim() !== query) return;
        const preserveSearchFocus = document.activeElement === notesSearchInput;
        await focusGlobalNoteSearchMatchAt(0, query, { preserveSearchFocus });
      }, 150);
    }

    function applyInitialSearchActivation(query) {
      const searchData = getGlobalNoteSearchData(query);
      if (!searchData.query || !searchData.globalMatches.length) {
        state.noteSearchNavKey = searchData.navKey;
        state.noteSearchNavIndex = -1;
        return false;
      }

      // Bridge "matches found" and "active match selected" in one update cycle.
      state.noteSearchNavKey = searchData.navKey;
      state.noteSearchNavIndex = 0;

      const firstMatch = searchData.globalMatches[0];
      if (!firstMatch || firstMatch.noteId !== state.openNoteId) {
        return false;
      }

      state.pendingNoteSearchJump = {
        noteId: firstMatch.noteId,
        query: searchData.query,
        navKey: searchData.navKey,
        navIndex: 0,
        matchField: firstMatch.field,
        matchFieldIndex: Number.isFinite(firstMatch.fieldIndex) ? firstMatch.fieldIndex : 0,
        retriesRemaining: 1,
        preserveSearchFocus: true
      };
      render({ preserveShellScroll: true });
      return true;
    }

    function getMarkdownOverlayElements(noteId = state.openNoteId) {
      if (!noteId) return {};
      const input = document.querySelector(`[data-note-body-id="${noteId}"]`);
      const overlay = document.querySelector(`[data-note-search-overlay-id="${noteId}"]`);
      const content = overlay?.querySelector(".markdown-search-overlay-content") || null;
      return { input, overlay, content };
    }

    function clearMarkdownSearchOverlays(noteId = null) {
      if (noteId) {
        const { overlay, content } = getMarkdownOverlayElements(noteId);
        if (content instanceof HTMLElement) {
          content.innerHTML = "";
        }
        if (overlay instanceof HTMLElement) {
          overlay.hidden = true;
        }
        return;
      }
      document.querySelectorAll("[data-note-search-overlay-id]").forEach((overlay) => {
        if (!(overlay instanceof HTMLElement)) return;
        const content = overlay.querySelector(".markdown-search-overlay-content");
        if (content instanceof HTMLElement) {
          content.innerHTML = "";
        }
        overlay.hidden = true;
      });
    }

    function getActiveBodyFieldIndexForNote(noteId, query) {
      if (!noteId || !query) return -1;
      const searchData = getGlobalNoteSearchData(query);
      const navIndex = Number.isFinite(state.noteSearchNavIndex) ? state.noteSearchNavIndex : -1;
      if (navIndex < 0 || navIndex >= searchData.globalMatches.length) return -1;
      const activeMatch = searchData.globalMatches[navIndex];
      if (!activeMatch) return -1;
      if (activeMatch.noteId !== noteId || activeMatch.field !== "body") return -1;
      return Number.isFinite(activeMatch.fieldIndex) ? activeMatch.fieldIndex : -1;
    }

    function buildMarkdownSearchOverlayHtml(text, terms, activeFieldIndex = -1) {
      const source = String(text || "");
      if (!source || !Array.isArray(terms) || !terms.length) return "";
      const matches = collectTextSearchMatches(source, terms);
      if (!matches.length) return "";

      let cursor = 0;
      let html = "";
      matches.forEach((match, index) => {
        const start = Math.max(0, Number(match.start) || 0);
        const end = Math.max(start, Number(match.end) || start);
        if (start < cursor) return;
        html += escapeHtml(source.slice(cursor, start));
        const className = index === activeFieldIndex
          ? "markdown-search-hit active"
          : "markdown-search-hit";
        html += `<mark class="${className}">${escapeHtml(source.slice(start, end))}</mark>`;
        cursor = end;
      });
      html += escapeHtml(source.slice(cursor));
      return html;
    }

    function syncMarkdownSearchOverlayPosition(noteId = state.openNoteId) {
      const { input, content } = getMarkdownOverlayElements(noteId);
      if (!(input instanceof HTMLTextAreaElement) || !(content instanceof HTMLElement)) return;
      content.style.transform = `translate(${-input.scrollLeft}px, ${-input.scrollTop}px)`;
    }

    function syncMarkdownSearchOverlayMetrics(noteId = state.openNoteId) {
      const { input, overlay, content } = getMarkdownOverlayElements(noteId);
      if (!(input instanceof HTMLTextAreaElement) || !(overlay instanceof HTMLElement) || !(content instanceof HTMLElement)) {
        return;
      }

      const styles = window.getComputedStyle(input);
      overlay.style.paddingTop = styles.paddingTop;
      overlay.style.paddingRight = styles.paddingRight;
      overlay.style.paddingBottom = styles.paddingBottom;
      overlay.style.paddingLeft = styles.paddingLeft;
      overlay.style.fontFamily = styles.fontFamily;
      overlay.style.fontSize = styles.fontSize;
      overlay.style.fontWeight = styles.fontWeight;
      overlay.style.fontStyle = styles.fontStyle;
      overlay.style.fontStretch = styles.fontStretch;
      overlay.style.fontVariant = styles.fontVariant;
      overlay.style.lineHeight = styles.lineHeight;
      overlay.style.letterSpacing = styles.letterSpacing;
      overlay.style.wordSpacing = styles.wordSpacing;
      overlay.style.textTransform = styles.textTransform;
      overlay.style.textIndent = styles.textIndent;
      overlay.style.tabSize = styles.tabSize;
      overlay.style.overflowWrap = styles.overflowWrap;
      overlay.style.wordBreak = styles.wordBreak;
      overlay.style.borderRadius = styles.borderRadius;
      content.style.minHeight = `${Math.max(input.scrollHeight, input.clientHeight)}px`;
    }

    function renderMarkdownSearchOverlay(noteId = state.openNoteId, queryOverride = null) {
      const { input, overlay, content } = getMarkdownOverlayElements(noteId);
      if (!(input instanceof HTMLTextAreaElement) || !(overlay instanceof HTMLElement) || !(content instanceof HTMLElement)) return;
      content.innerHTML = "";
      overlay.hidden = true;
    }

    function bindMarkdownSearchOverlayTracking() {
      document.querySelectorAll("[data-note-body-id]").forEach((node) => {
        if (!(node instanceof HTMLTextAreaElement)) return;
        if (observedMarkdownOverlayInputs.has(node)) return;
        observedMarkdownOverlayInputs.add(node);
        node.addEventListener("scroll", () => {
          syncMarkdownSearchOverlayPosition(node.dataset.noteBodyId || null);
        }, { passive: true });
        node.addEventListener("input", () => {
          renderMarkdownSearchOverlay(node.dataset.noteBodyId || null);
        });
        syncMarkdownSearchOverlayMetrics(node.dataset.noteBodyId || null);
      });
    }
