    function buildActiveTaskSectionState(workspace, draftsByAfter) {
      const sections = new Map();
      const hiddenTaskIds = new Set();
      if (!workspace) return { sections, hiddenTaskIds };
      const sectionRanges = [];
      let currentSectionTaskId = null;

      workspace.active_tasks.forEach((task) => {
        const title = state.taskEdits[task.id] ?? task.title;
        const headingLabel = getTaskHeadingLabel(title);

        if (headingLabel !== null) {
          currentSectionTaskId = headingLabel ? task.id : null;
          if (currentSectionTaskId) {
            sections.set(task.id, {
              collapsed: isTaskSectionCollapsed(task.id),
              itemCount: draftsByAfter.get(task.id)?.length || 0,
              completedItemCount: 0
            });
            sectionRanges.push({
              id: task.id,
              startSortOrder: task.sort_order
            });
          }
          return;
        }

        if (!currentSectionTaskId) return;

        const section = sections.get(currentSectionTaskId);
        if (!section) return;

        section.itemCount += 1;
        section.itemCount += draftsByAfter.get(task.id)?.length || 0;
        if (section.collapsed) {
          hiddenTaskIds.add(task.id);
        }
      });

      if (!sectionRanges.length) {
        return { sections, hiddenTaskIds };
      }

      workspace.done_tasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        for (let index = 0; index < sectionRanges.length; index += 1) {
          const sectionRange = sectionRanges[index];
          const nextSectionRange = sectionRanges[index + 1] || null;
          if (task.sort_order <= sectionRange.startSortOrder) continue;
          if (nextSectionRange && task.sort_order >= nextSectionRange.startSortOrder) continue;

          const section = sections.get(sectionRange.id);
          if (section) {
            section.completedItemCount += 1;
          }
          return;
        }
      });

      return { sections, hiddenTaskIds };
    }

    function buildTaskSectionMap(workspace) {
      const sectionMap = new Map();
      if (!workspace) return sectionMap;

      const orderedTasks = [...workspace.active_tasks, ...workspace.done_tasks]
        .sort((left, right) => left.sort_order - right.sort_order || left.id.localeCompare(right.id));

      let currentSection = null;
      orderedTasks.forEach((task) => {
        const headingLabel = getTaskHeadingLabel(task.title);
        if (headingLabel !== null) {
          currentSection = headingLabel || null;
          sectionMap.set(task.id, currentSection);
          return;
        }

        sectionMap.set(task.id, currentSection);
      });

      return sectionMap;
    }

    function getLastActiveTaskIdInSection(sectionTaskId, workspace = state.workspace) {
      if (!workspace || !sectionTaskId) return sectionTaskId || null;

      let lastTaskId = sectionTaskId;
      let inTargetSection = false;

      workspace.active_tasks.forEach((task) => {
        const rawTitle = state.taskEdits[task.id] ?? task.title;
        const headingLabel = getTaskHeadingLabel(rawTitle);

        if (headingLabel !== null) {
          if (task.id === sectionTaskId) {
            inTargetSection = true;
            lastTaskId = sectionTaskId;
            return;
          }

          if (inTargetSection) {
            inTargetSection = false;
          }
          return;
        }

        if (!inTargetSection) return;
        lastTaskId = task.id;
      });

      return lastTaskId;
    }

    function buildTaskSectionCopyText(sectionTaskId) {
      if (!state.workspace || !sectionTaskId) return "";

      const lines = [];
      let inTargetSection = false;

      for (const task of state.workspace.active_tasks) {
        const rawTitle = state.taskEdits[task.id] ?? task.title;
        const headingLabel = getTaskHeadingLabel(rawTitle);

        if (headingLabel !== null) {
          if (task.id === sectionTaskId) {
            lines.push(`## ${headingLabel}`);
            inTargetSection = true;
            continue;
          }

          if (inTargetSection) {
            break;
          }

          continue;
        }

        if (!inTargetSection) continue;
        lines.push(`- [ ] ${getVisibleTaskTitle(rawTitle || "Untitled task")}`);
      }

      return lines.join("\n").trim();
    }

    function buildDoneTaskSectionState(workspace) {
      const sections = new Map();
      const taskToSection = new Map();
      if (!workspace) return { sections, taskToSection };

      const doneTaskIds = new Set(workspace.done_tasks.map((task) => task.id));
      const orderedTasks = [...workspace.active_tasks, ...workspace.done_tasks]
        .sort((left, right) => left.sort_order - right.sort_order || left.id.localeCompare(right.id));

      let currentSectionTaskId = null;
      let currentSectionLabel = null;
      orderedTasks.forEach((task) => {
        const headingLabel = getTaskHeadingLabel(task.title);
        if (headingLabel !== null) {
          currentSectionTaskId = headingLabel ? task.id : null;
          currentSectionLabel = headingLabel || null;
          if (currentSectionTaskId) {
            sections.set(task.id, {
              label: currentSectionLabel,
              collapsed: isDoneTaskSectionCollapsed(task.id),
              itemCount: 0
            });
          }
          return;
        }

        if (!currentSectionTaskId || !doneTaskIds.has(task.id)) return;

        const section = sections.get(currentSectionTaskId);
        if (!section) return;

        section.itemCount += 1;
        taskToSection.set(task.id, {
          id: currentSectionTaskId,
          label: currentSectionLabel
        });
      });

      sections.forEach((section, taskId) => {
        if (section.itemCount === 0) {
          sections.delete(taskId);
        }
      });

      return { sections, taskToSection };
    }

    function renderDoneTaskList(doneTasks, doneSectionState) {
      const rows = [];
      let lastSectionTaskId = null;

      doneTasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        const sectionMeta = doneSectionState.taskToSection.get(task.id) || null;
        const sectionTaskId = sectionMeta?.id || null;
        const section = sectionTaskId ? doneSectionState.sections.get(sectionTaskId) || null : null;

        if (sectionTaskId !== lastSectionTaskId) {
          if (sectionTaskId && section) {
            rows.push(renderDoneSectionHeading(sectionTaskId, section));
          }
          lastSectionTaskId = sectionTaskId;
        }

        if (section?.collapsed) return;
        rows.push(renderDoneTaskRow(task));
      });

      return rows.join("");
    }

    function renderDoneSectionHeading(sectionTaskId, section) {
      if (!sectionTaskId || !section?.label) return "";

      return `
        <div class="done-section-heading">
          <button
            class="task-section-toggle"
            type="button"
            draggable="false"
            data-done-section-toggle-id="${sectionTaskId}"
            aria-expanded="${section.collapsed ? "false" : "true"}"
            aria-label="${section.collapsed ? "Expand section" : "Collapse section"}"
            title="${section.collapsed ? "Expand section" : "Collapse section"}"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 6 6 6-6 6"></path>

    function formatLocalTimestamp(isoValue, fallbackLabel = "") {
      if (!isoValue) return fallbackLabel;
      const parsed = new Date(isoValue);
      if (Number.isNaN(parsed.getTime())) return fallbackLabel;
      if (doneTimestampFormatter) {
        try {
          return doneTimestampFormatter.format(parsed);
        } catch (_error) {
          // Fall through to the browser default formatter.
        }
      }
      return parsed.toLocaleString();
    }

    function formatLocalShortTime(isoValue, fallbackLabel = "") {
      if (!isoValue) return fallbackLabel;
      const parsed = new Date(isoValue);
      if (Number.isNaN(parsed.getTime())) return fallbackLabel;
      if (shortTimeFormatter) {
        try {
          return shortTimeFormatter.format(parsed);
        } catch (_error) {
          // Fall through to the browser default formatter.
        }
      }
      return parsed.toLocaleTimeString();
    }

    function formatNoteLastSynced(note) {
      const inboundIso = note?.sync_last_inbound_at_iso || "";
      const outboundIso = note?.sync_last_outbound_at_iso || "";
      const inboundMs = inboundIso ? new Date(inboundIso).getTime() : Number.NaN;
      const outboundMs = outboundIso ? new Date(outboundIso).getTime() : Number.NaN;

      if (!Number.isNaN(inboundMs) && (Number.isNaN(outboundMs) || inboundMs >= outboundMs)) {
        return `last synced ${formatLocalShortTime(inboundIso, note.sync_last_inbound_at_label || "")}`;
      }

      if (!Number.isNaN(outboundMs)) {
        return `last synced ${formatLocalShortTime(outboundIso, note.sync_last_outbound_at_label || "")}`;
      }

      return "";
    }

    function resetTodoStatusLabel() {
      if (!state.projects.length) {
        todoStatus.textContent = "";
      } else if (!state.workspace) {
        todoStatus.textContent = "Idle";
      } else {
        const counts = activePriorityCounts(state.workspace.active_tasks);
        const summaryMarkup = todoStatusSummaryMarkup(state.workspace.active_tasks.length, counts);
        if (state.workspace.project?.task_sync_status === "conflict") {
          todoStatus.innerHTML = `<span class="todo-status-label">Sync conflict</span>${summaryMarkup}`;
          return;
        }
        if (state.workspace.project?.task_sync_status === "paused" && state.workspace.project?.task_sync_enabled) {
          todoStatus.innerHTML = `<span class="todo-status-label">Sync paused</span>${summaryMarkup}`;
          return;
        }
        todoStatus.innerHTML = summaryMarkup;
      }
    }

    function resetTransientStatusLabel(node) {
      if (node) node.textContent = "";
    }

    function flashStatusLabel(node, timerKey, label, duration = 1800, onReset = null) {
      if (!node) return;
      if (state[timerKey]) {
        window.clearTimeout(state[timerKey]);
      }
      node.textContent = label;
      state[timerKey] = window.setTimeout(() => {
        state[timerKey] = null;
        if (onReset) {
          onReset();
          return;
        }
        resetTransientStatusLabel(node);
      }, duration);
    }

    function flashTodoStatus(label, duration = 1800) {
      flashStatusLabel(todoStatus, "todoStatusTimer", label, duration, resetTodoStatusLabel);
    }

    function flashChangelogStatus(label, duration = 1800) {
      flashStatusLabel(changelogStatus, "changelogStatusTimer", label, duration);
    }

    function flashNoteStatus(label, duration = 1800) {
      flashStatusLabel(noteStatus, "noteStatusTimer", label, duration);
    }

    function buildChangelogExportDocument() {
      if (!state.workspace || !state.workspace.done_tasks.length) return null;

      const sectionMap = buildTaskSectionMap(state.workspace);
      const exportStamp = formatLocalTimestamp(new Date().toISOString(), new Date().toLocaleString());
      const title = `${state.workspace.project.title} changelog`;
      const plainLines = [
        title,
        `Exported ${exportStamp}`,
        ""
      ];
      const htmlParts = [
        `<h1>${escapeHtml(title)}</h1>`,
        `<p>Exported ${escapeHtml(exportStamp)}</p>`
      ];
      let hasVisibleTasks = false;
      let listOpen = false;
      let sectionInitialized = false;
      let lastSection = null;

      function closeHtmlList() {
        if (!listOpen) return;
        htmlParts.push("</ul>");
        listOpen = false;
      }

      state.workspace.done_tasks.forEach((task) => {
        if (isMarkdownTaskHeading(task.title)) return;

        const sectionLabel = sectionMap.get(task.id) || null;
        if (!sectionInitialized || sectionLabel !== lastSection) {
          closeHtmlList();
          if (hasVisibleTasks && plainLines[plainLines.length - 1] !== "") {
            plainLines.push("");
          }
          if (sectionLabel) {
            plainLines.push(sectionLabel);
            htmlParts.push(`<h2>${escapeHtml(sectionLabel)}</h2>`);
          }
          lastSection = sectionLabel;
          sectionInitialized = true;
        }

        const visibleTitle = getVisibleTaskTitle(task.title || "Untitled task");
        hasVisibleTasks = true;
        plainLines.push(`- ${visibleTitle}`);
        if (!listOpen) {
          htmlParts.push("<ul>");
          listOpen = true;
        }
        htmlParts.push(`<li>${escapeHtml(visibleTitle)}</li>`);
      });

      closeHtmlList();
      if (!hasVisibleTasks) return null;

      return {
        plainText: plainLines.join("\n").replace(/\n{3,}/g, "\n\n").trim(),
        html: htmlParts.join("")
      };
    }

    async function copyTextWithFallback(copyLabel, exportText, successLabel, fallbackLabel, flashStatus = flashTodoStatus) {
      if (!exportText) return false;

      let copied = false;
      if (navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(exportText);
          copied = true;
        } catch (_error) {
          copied = false;
        }
      }

      if (!copied) {
        const manualCopy = window.prompt(copyLabel, exportText);
        if (manualCopy === null) return false;
      }

      flashStatus(copied ? successLabel : fallbackLabel);
      return true;
    }

    async function copyRichTextWithFallback(copyLabel, plainText, htmlText, successLabel, fallbackLabel, flashStatus = flashChangelogStatus) {
      if (!plainText) return false;

      let copied = false;
      if (navigator.clipboard?.write && typeof ClipboardItem !== "undefined" && htmlText) {
        try {
          await navigator.clipboard.write([
            new ClipboardItem({
              "text/plain": new Blob([plainText], { type: "text/plain" }),
              "text/html": new Blob([htmlText], { type: "text/html" })
            })
          ]);
          copied = true;
        } catch (_error) {
          copied = false;
        }
      }

      if (!copied && navigator.clipboard?.writeText) {
        try {
          await navigator.clipboard.writeText(plainText);
          copied = true;
        } catch (_error) {
          copied = false;
        }
      }

      if (!copied) {
        const manualCopy = window.prompt(copyLabel, plainText);
        if (manualCopy === null) return false;
      }

      flashStatus(copied ? successLabel : fallbackLabel);
      return true;
    }

    async function copyTaskSection(taskId) {

    function buildSelectedTaskCopyText(taskId) {
      const task = findTask(taskId);
      if (!task) return "";

      const rawTitle = state.taskEdits[task.id] ?? task.title ?? "";
      if (isMarkdownTaskHeading(rawTitle)) {
        const sectionText = buildTaskSectionCopyText(task.id);
        return sectionText || `## ${getVisibleTaskTitle(rawTitle || "Untitled section")}`;
      }

      const visibleTitle = getVisibleTaskTitle(rawTitle || "Untitled task");
      return `- [ ] ${visibleTitle}`;
    }

    function buildActiveTodoCopyText() {
      if (!state.workspace?.active_tasks?.length) return "";

      const lines = [];
      state.workspace.active_tasks.forEach((task) => {
        const rawTitle = state.taskEdits[task.id] ?? task.title ?? "";
        if (isMarkdownTaskHeading(rawTitle)) {
          lines.push(`## ${getVisibleTaskTitle(rawTitle || "Untitled section")}`);
          return;
        }

        lines.push(`- [ ] ${getVisibleTaskTitle(rawTitle || "Untitled task")}`);
      });

      return lines.join("\n").trim();
    }

    function buildNoteCopyPayload(noteId) {
      if (!state.workspace) return null;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return null;

      const title = getDraftNoteTitle(noteId, note);
      const trimmedTitle = String(title || "").trim();

      if (state.noteMode === "clean") {
        const cleanBodyHtml = normalizeCleanHtml(
          state.noteHtmlEdits[noteId] ?? getCurrentCleanHtml(noteId) ?? note.rendered_html
        );
        const markdownBody = cleanHtmlToMarkdown(cleanBodyHtml);
        const trimmedBody = String(markdownBody || "").trim();
        const trimmedBodyHtml = String(cleanBodyHtml || "").trim();
        let plainText = "";
        let html = "";

        if (trimmedTitle && trimmedBody) {
          plainText = `# ${trimmedTitle}\n\n${trimmedBody}`;
        } else if (trimmedTitle) {
          plainText = `# ${trimmedTitle}`;
        } else {
          plainText = trimmedBody;
        }

        if (trimmedTitle) {
          html += `<h1>${escapeHtml(trimmedTitle)}</h1>`;
        }
        if (trimmedBodyHtml) {
          html += trimmedBodyHtml;
        }

        if (!plainText && !html) return null;
        return {
          plainText,
          html: html || null
        };
      }

      const body = getDraftNoteBody(noteId, note);
      const trimmedBody = String(body || "").trim();
      if (trimmedTitle && trimmedBody) {
        return {
          plainText: `# ${trimmedTitle}\n\n${trimmedBody}`,
          html: null
        };
      }
      if (trimmedTitle) {
        return {
          plainText: `# ${trimmedTitle}`,
          html: null
        };
      }
      if (!trimmedBody) return null;
      return {
        plainText: trimmedBody,
        html: null
      };
    }

    async function copyNote(noteId) {
      const copyPayload = buildNoteCopyPayload(noteId);

      if (!state.workspace || !state.workspace.done_tasks.length) return;

          project_id: state.workspace.project.id,
          tasks: state.workspace.done_tasks.map((task) => ({

            expected_revision: task.revision

      applyWorkspace(response.workspace);

    function showScrollbarWhileScrolling(node) {
      if (!node) return;
      const overlay = updateScrollIndicator(node);
      if (!overlay) {
        return;
      }

      overlay.classList.add("scroll-active");
      const existingTimer = scrollRevealTimers.get(node);
      if (existingTimer) {
        window.clearTimeout(existingTimer);
      }

      const timer = window.setTimeout(() => {
        overlay.classList.remove("scroll-active");
        scrollRevealTimers.delete(node);
      }, 420);

      scrollRevealTimers.set(node, timer);
    }

    function ensureScrollIndicator(node) {
      if (!node || !node.parentElement) return null;

      let overlay = scrollIndicators.get(node);
      const parent = node.parentElement;
      if (overlay && overlay.isConnected) {
        if (overlay.parentElement !== parent) {
          parent.appendChild(overlay);
        }
        return overlay;
      }

      overlay = document.createElement("div");
      overlay.className = "scroll-indicator-overlay";

      const thumb = document.createElement("div");
      thumb.className = "scroll-indicator-thumb";
      overlay.appendChild(thumb);

      if (window.getComputedStyle(parent).position === "static") {
        parent.style.position = "relative";
      }

      parent.appendChild(overlay);
      scrollIndicators.set(node, overlay);
      return overlay;
    }

    function updateScrollIndicator(node) {
      if (!node) return null;

      const viewport = node.clientHeight;
      const content = node.scrollHeight;
      const scrollRange = content - viewport;
      const canScroll = scrollRange > 1;
      const existingOverlay = scrollIndicators.get(node);

      if (!canScroll || viewport <= 0) {
        if (existingOverlay) {
          existingOverlay.classList.remove("is-scrollable", "scroll-active");
        }
        return null;
      }

      const overlay = ensureScrollIndicator(node);
      if (!overlay) return null;

      const thumb = overlay.firstElementChild;
      const parentRect = overlay.parentElement.getBoundingClientRect();
      const nodeRect = node.getBoundingClientRect();
      const trackHeight = Math.max(0, Math.round(viewport - 4));
      if (trackHeight <= 0) {
        overlay.classList.remove("is-scrollable", "scroll-active");
        return null;
      }
      const overlayTop = Math.max(0, Math.round(nodeRect.top - parentRect.top + 2));
      const thumbSize = Math.max(28, Math.min(trackHeight, Math.round((viewport / content) * trackHeight)));
      const maxOffset = Math.max(0, trackHeight - thumbSize);
      const thumbOffset = maxOffset > 0
        ? Math.round((node.scrollTop / scrollRange) * maxOffset)
        : 0;

      overlay.classList.add("is-scrollable");
      overlay.style.top = `${overlayTop}px`;
      overlay.style.height = `${trackHeight}px`;
      thumb.style.height = `${thumbSize}px`;
      thumb.style.transform = `translateY(${thumbOffset}px)`;
      return overlay;
    }

    function getResponsiveLayoutWidth() {
      const innerWidth = window.innerWidth || 0;
      const outerWidth = typeof window.outerWidth === "number" ? window.outerWidth : 0;

      // `outerWidth` stays stable when desktop browser zoom changes while `innerWidth` shrinks.
      return Math.max(innerWidth, outerWidth);
    }

    function applyResponsiveLayoutMode() {
      if (isDesktopShell) {
        if (document.documentElement.dataset.layoutMode !== "three") {
          document.documentElement.dataset.layoutMode = "three";
        }
        return;
      }

      const width = getResponsiveLayoutWidth();
      let nextMode = "three";
      if (width <= layoutModeBreakpoints.oneColumn) {
        nextMode = "one";
      } else if (width <= layoutModeBreakpoints.twoColumn) {
        nextMode = "two";
      }

      if (document.documentElement.dataset.layoutMode === nextMode) return;
      document.documentElement.dataset.layoutMode = nextMode;
    }

    function bindScrollReveal(node) {
      if (!node || node.dataset.scrollRevealBound === "true") return;
      node.dataset.scrollRevealBound = "true";
      node.addEventListener("scroll", () => {
        showScrollbarWhileScrolling(node);
      }, { passive: true });
    }

    function refreshScrollRevealBindings() {
      document.querySelectorAll(".pane-body, .task-list, .done-list, .overlay-card, .clean-editor, .markdown-input").forEach((node) => {
        bindScrollReveal(node);
        updateScrollIndicator(node);
      });
    }

    window.addEventListener("resize", () => {
      applyResponsiveLayoutMode();
      scheduleTaskRowSync();
      scheduleCodexTerminalResize();
      syncMarkdownSearchOverlayMetrics();
      syncMarkdownSearchOverlayPosition();
      refreshScrollRevealBindings();
    });

    function getProjectById(projectId) {
      return state.projects.find((project) => project.id === projectId) || null;
    }

    function projectSupportsCodex(project) {
      return Boolean(isDesktopShell && project?.source_kind === "local");
    }

    function syncProjectSummary(projectSummary) {
      if (!projectSummary?.id) return;
      let found = false;
      state.projects = state.projects.map((project) => {
        if (project.id !== projectSummary.id) return project;
        found = true;
        return { ...project, ...projectSummary };
      });
      if (!found) {
        state.projects.push(projectSummary);
      }
    }

    function syncProjectCodexCounts(projectId, sessions) {
      if (!projectId) return;
      const totalCount = Array.isArray(sessions) ? sessions.length : 0;
      const liveCount = Array.isArray(sessions)
        ? sessions.filter((session) => session.status === "live").length
        : 0;
      state.projects = state.projects.map((project) => project.id === projectId
        ? {
          ...project,
          codex_session_count: totalCount,
          codex_live_count: liveCount
        }
        : project);
      if (state.workspace?.project?.id === projectId) {
        state.workspace.project.codex_session_count = totalCount;
        state.workspace.project.codex_live_count = liveCount;
      }
    }

    function filterTopsideCodexSessions(sessions) {
      return (Array.isArray(sessions) ? sessions : [])
        .filter((session) => session?.origin === "topside")
        .map((session) => ({ ...session }));
    }

    function syncCodexSessionCache(projectId, sessions) {
      if (!projectId) return [];
      const normalizedSessions = filterTopsideCodexSessions(sessions);
      state.codexSessionsByProject[projectId] = normalizedSessions;
      syncProjectCodexCounts(projectId, normalizedSessions);
      return normalizedSessions;
    }

    function getProjectCodexSessions(projectId = state.selectedProjectId) {
      if (!projectId) return [];
      if (state.workspace?.project?.id === projectId) {
        return filterTopsideCodexSessions(state.workspace.codex_sessions);
      }
      return filterTopsideCodexSessions(state.codexSessionsByProject[projectId]);
    }

    function getDefaultCodexSession(sessions = getProjectCodexSessions()) {
      return (Array.isArray(sessions) ? sessions : [])[0] || null;
    }

    function getCurrentCodexSession() {
      const sessions = getProjectCodexSessions();
      if (!sessions.length) return null;
      return sessions.find((session) => session.id === state.openCodexSessionId)
        || getDefaultCodexSession(sessions);
    }

    function getActiveTaskCodexSession(taskId, projectId = state.selectedProjectId) {
      if (!taskId || !projectId) return null;
      return getProjectCodexSessions(projectId).find((session) => (
        session.task_id === taskId
        && (session.status === "live" || session.status === "launching")
      )) || null;
    }

    function isTaskCodexAssignmentPending(taskId) {
      return Boolean(taskId && state.codexAssigningTaskIds[taskId]);
    }

    function setProjectCodexSessions(projectId, sessions) {
      if (!projectId) return [];
      const normalizedSessions = syncCodexSessionCache(projectId, sessions);
      if (state.workspace?.project?.id === projectId) {
        state.workspace.codex_sessions = normalizedSessions;
      }
      return normalizedSessions;
    }

    function getCodexArchiveFallbackSession(sessions, archivedSessionId) {
      const currentSessions = Array.isArray(sessions) ? sessions : [];
      const archivedIndex = currentSessions.findIndex((session) => session.id === archivedSessionId);
      const remainingSessions = currentSessions.filter((session) => session.id !== archivedSessionId);
      if (!remainingSessions.length) {
        return { remainingSessions, fallbackSession: null };
      }
      if (archivedIndex < 0) {
        return { remainingSessions, fallbackSession: remainingSessions[0] };
      }
      const fallbackIndex = Math.min(archivedIndex, remainingSessions.length - 1);
      return { remainingSessions, fallbackSession: remainingSessions[fallbackIndex] };
    }

    function captureCodexSessionLocalState(sessionId) {
      const hasPendingPrompt = state.codexPendingPrompt?.sessionId === sessionId;
      return {
        sessionId,
        hasTerminalTail: Object.prototype.hasOwnProperty.call(state.codexTerminalTails, sessionId),
        terminalTail: state.codexTerminalTails[sessionId],
        hasTitleEdit: Object.prototype.hasOwnProperty.call(state.codexSessionTitleEdits, sessionId),
        titleEdit: state.codexSessionTitleEdits[sessionId],
        hasSummaryEdit: Object.prototype.hasOwnProperty.call(state.codexSessionSummaryEdits, sessionId),
        summaryEdit: state.codexSessionSummaryEdits[sessionId],
        hasPromptEdit: Object.prototype.hasOwnProperty.call(state.codexPromptEdits, sessionId),
        promptEdit: state.codexPromptEdits[sessionId],
        pendingPrompt: hasPendingPrompt ? { ...state.codexPendingPrompt } : null,
      };
    }

    function clearCodexSessionLocalState(sessionId) {
      if (!sessionId) return;
      delete state.codexTerminalTails[sessionId];
      delete state.codexSessionTitleEdits[sessionId];
      delete state.codexSessionSummaryEdits[sessionId];
      delete state.codexPromptEdits[sessionId];
      delete state.codexSessionAutoRestarted[sessionId];
      delete state.codexRestartingSessions[sessionId];
      if (state.codexPendingPrompt?.sessionId === sessionId) {
        state.codexPendingPrompt = null;
      }
    }

    function restoreCodexSessionLocalState(snapshot) {
      if (!snapshot?.sessionId) return;
      const { sessionId } = snapshot;
      if (snapshot.hasTerminalTail) {
        state.codexTerminalTails[sessionId] = snapshot.terminalTail;
      } else {
        delete state.codexTerminalTails[sessionId];
      }
      if (snapshot.hasTitleEdit) {
        state.codexSessionTitleEdits[sessionId] = snapshot.titleEdit;
      } else {
        delete state.codexSessionTitleEdits[sessionId];
      }
      if (snapshot.hasSummaryEdit) {
        state.codexSessionSummaryEdits[sessionId] = snapshot.summaryEdit;
      } else {
        delete state.codexSessionSummaryEdits[sessionId];
      }
      if (snapshot.hasPromptEdit) {
        state.codexPromptEdits[sessionId] = snapshot.promptEdit;
      } else {
        delete state.codexPromptEdits[sessionId];
      }
      if (snapshot.pendingPrompt) {
        state.codexPendingPrompt = snapshot.pendingPrompt;
      } else if (state.codexPendingPrompt?.sessionId === sessionId) {
        state.codexPendingPrompt = null;
      }
    }

    async function refreshSelectedProjectCodexWorkspace(projectId = state.selectedProjectId) {
      if (!projectId) return null;
      const workspace = await fetchJson(
        `/api/projects/${encodeURIComponent(projectId)}/workspace`,
        {},
        "codex",
        true
      );
      if (workspace) {
        if (state.workspace?.project?.id === projectId) {
          applyWorkspace(workspace);
        } else {
          syncCodexSessionCache(
            projectId,
            Array.isArray(workspace.codex_sessions) ? workspace.codex_sessions : []
          );
        }
      }
      return workspace;
    }

    function setRightPaneMode(mode) {
      const nextMode = mode === "codex" ? "codex" : "notes";
      const selectedProject = state.workspace?.project || getProjectById(state.selectedProjectId);
      if (nextMode === "codex" && !projectSupportsCodex(selectedProject)) {
        state.rightPaneMode = "notes";
        state.codexHeadNotice = "";
        state.codexMessage = isDesktopShell
          ? "Codex sessions are available only on local-linked projects."
          : "Codex sessions are available only inside the Topside desktop app.";
        disconnectCodexSocket();
        return;
      }
      state.rightPaneMode = nextMode;
      if (nextMode !== "codex") {
        state.codexHeadNotice = "";
        disconnectCodexSocket();
      }
    }

    function codexStatusLabel(status) {
      if (status === "live") return "Running";
      if (status === "launching") return "Launching";
      return "Resumable";
    }

    function renderCodexStatusPill(status) {
      const normalized = status === "live" || status === "launching" ? status : "resumable";
      return `<span class="codex-status-pill ${normalized}">${escapeHtml(codexStatusLabel(normalized))}</span>`;
    }

    function renderCodexSessionTab(session, activeSessionId) {
      return `
        <button
          class="codex-session-tab ${activeSessionId === session.id ? "active" : ""}"
          type="button"
          data-codex-tab-id="${escapeAttribute(session.id)}"
        >
          <span class="codex-session-tab-head">
            <span class="project-codex-status-dot ${escapeAttribute(session.status)}"></span>
            <span class="codex-session-tab-title">${escapeHtml(session.title || "Untitled session")}</span>
          </span>
          <span class="codex-session-tab-meta">
            <span>${escapeHtml(session.last_seen_at_label || "")}</span>
          </span>
        </button>
      `;
    }

    function renderCodexSessionGroup(label, sessions, activeSessionId) {
      if (!sessions.length) return "";
      return `
        <div class="codex-session-group">
          <div class="small-label codex-session-group-label">${escapeHtml(label)}</div>
          ${sessions.map((session) => renderCodexSessionTab(session, activeSessionId)).join("")}
        </div>
      `;
    }

    function pathLeaf(value) {
      const normalized = String(value || "").replace(/[\\/]+$/, "");
      if (!normalized) return "";
      const parts = normalized.split(/[\\/]/).filter(Boolean);
      return parts[parts.length - 1] || normalized;
    }

    function syncCurrentWorkspaceCodexSessionState(sessionId, patch) {
      const projectId = state.selectedProjectId;
      if (!projectId) return;
      const currentSessions = getProjectCodexSessions(projectId).map((session) => session.id === sessionId
        ? { ...session, ...patch }
        : session);
      syncCodexSessionCache(projectId, currentSessions);
      if (state.workspace?.project?.id === projectId) {
        state.workspace.codex_sessions = currentSessions;
      }
    }

    function markCodexSessionResumable(sessionId, message = "") {
      syncCurrentWorkspaceCodexSessionState(sessionId, { status: "resumable" });
      restorePendingCodexPrompt(sessionId);
      clearCodexTerminalPrompt(sessionId);
      state.codexMessage = message || "This Codex session is not attached right now. Resume it to reopen the embedded chat.";
      disconnectCodexSocket();
    }

    function getCodexSessionTitleValue(session) {
      if (!session) return "";
      return Object.prototype.hasOwnProperty.call(state.codexSessionTitleEdits, session.id)
        ? state.codexSessionTitleEdits[session.id]
        : session.title;
    }

    function getCodexSessionSummaryValue(session) {
      if (!session) return "";
      return Object.prototype.hasOwnProperty.call(state.codexSessionSummaryEdits, session.id)
        ? state.codexSessionSummaryEdits[session.id]
        : session.summary;
    }

    function getCodexPromptValue(session) {
      if (!session) return "";
      return Object.prototype.hasOwnProperty.call(state.codexPromptEdits, session.id)
        ? state.codexPromptEdits[session.id]
        : "";
    }

    function stripTerminalControlSequences(value) {
      return String(value || "")
        .replace(/\u001b\][^\u0007]*(?:\u0007|\u001b\\)/g, "")
        .replace(/\u001b\[[0-?]*[ -/]*[@-~]/g, "")
        .replace(/\u001b[@-Z\\-_]/g, "")
        .replace(/\u200a/g, " ");
    }

    function normalizeCodexTerminalOutput(value) {
      return String(value || "");
    }

    function clearCodexTerminalPrompt(sessionId = null) {
      if (!sessionId) {
        state.codexTerminalPrompt = null;
        return;
      }
      delete state.codexTerminalTails[sessionId];
      if (state.codexTerminalPrompt?.sessionId === sessionId) {
        state.codexTerminalPrompt = null;
      }
    }

    function focusCodexTerminal() {
      if (!state.codexTerminal) return;
      try {
        state.codexTerminal.focus();
      } catch (_error) {
        // Ignore focus failures on detached terminals.
      }
    }

    function sendCodexTerminalInput(sessionId, data) {
      if (!sessionId || !data) return false;
      if (state.codexSocketSessionId !== sessionId) return false;
      if (!state.codexSocket || state.codexSocket.readyState !== WebSocket.OPEN) return false;
      state.codexSocket.send(JSON.stringify({ type: "input", data }));
      window.requestAnimationFrame(() => {
        focusCodexTerminal();
      });
      return true;
    }

    function encodeCodexPromptInput(value) {
      const normalized = String(value || "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .trim();
      if (!normalized) return "";
      return `${normalized.replace(/\n/g, "\r")}\r`;
    }

    function restorePendingCodexPrompt(sessionId) {
      const pending = state.codexPendingPrompt;
      if (!pending || pending.sessionId !== sessionId) return false;
      state.codexPromptEdits[sessionId] = pending.text;
      state.codexPendingPrompt = null;
      return true;
    }

    function flushPendingCodexPrompt(sessionId) {
      const pending = state.codexPendingPrompt;
      if (!pending || pending.sessionId !== sessionId) return false;
      const data = encodeCodexPromptInput(pending.text);
      if (!data) {
        state.codexPendingPrompt = null;
        return false;
      }
      const sent = sendCodexTerminalInput(sessionId, data);
      if (sent) {
        state.codexPendingPrompt = null;
      }
      return sent;
    }

    async function restartCodexSession(sessionId, options = {}) {
      const normalizedSessionId = normalizeSessionId(sessionId);
      if (!normalizedSessionId || !state.selectedProjectId) return;
      if (state.codexRestartingSessions[normalizedSessionId]) return;
      const automatic = options.automatic === true;
      state.codexRestartingSessions[normalizedSessionId] = true;
      disconnectCodexSocket(state.openCodexSessionId === normalizedSessionId);
      clearCodexTerminalPrompt(normalizedSessionId);
      state.codexHeadNotice = automatic
        ? "Restarting Codex after update..."
        : "Restarting Codex session...";
      state.codexMessage = "";
      render();
      const response = await fetchJson(
        `/api/codex-sessions/${encodeURIComponent(normalizedSessionId)}/restart`,
        { method: "POST" },
        "codex"
      );
      delete state.codexRestartingSessions[normalizedSessionId];
      if (!response) {
        delete state.codexSessionAutoRestarted[normalizedSessionId];
        state.codexHeadNotice = "";
        state.codexMessage = state.codexMessage || (
          automatic
            ? "Failed to restart Codex after updating."
            : "Failed to restart Codex session."
        );
        render();
        return;
      }
      applyWorkspace(response.workspace);
      state.openCodexSessionId = response.opened_session_id || normalizedSessionId;
      state.codexHeadNotice = automatic
        ? "Codex restarted after update."
        : (response.message || "Codex session restarted.");
      state.codexMessage = "";
      render();
    }

    function codexTerminalTailNeedsRestart(sessionId) {
      const tail = String(state.codexTerminalTails[sessionId] || "");
      return tail.includes("update ran successfully!")
        && tail.includes("please restart codex");
    }

    function beginCodexSessionAutoRestart(sessionId) {
      if (
        !codexTerminalTailNeedsRestart(sessionId)
        || state.codexRestartingSessions[sessionId]
        || state.codexSessionAutoRestarted[sessionId]
      ) {
        return false;
      }
      state.codexSessionAutoRestarted[sessionId] = true;
      if (state.codexTerminalPrompt?.sessionId === sessionId) {
        state.codexTerminalPrompt = null;
      }
      return true;
    }

    function recordCodexTerminalOutput(sessionId, chunk) {
      const effect = {
        shouldRender: false,
        autoRestart: false,
      };
      const stripped = stripTerminalControlSequences(chunk)
        .replace(/\s+/g, " ")
        .trim();
      if (!stripped) return effect;

      const nextTail = `${state.codexTerminalTails[sessionId] || ""} ${stripped}`
        .slice(-4000)
        .toLowerCase();
      state.codexTerminalTails[sessionId] = nextTail;

      if (
        nextTail.includes("update available!")
        && nextTail.includes("press enter to continue")
        && nextTail.includes("update now")
        && nextTail.includes("skip")
      ) {
        const changed = state.codexTerminalPrompt?.sessionId !== sessionId
          || state.codexTerminalPrompt?.kind !== "update_available";
        state.codexTerminalPrompt = {
          sessionId,
          kind: "update_available",
        };
        effect.shouldRender = changed;
        return effect;
      }

      if (codexTerminalTailNeedsRestart(sessionId)) {
        if (beginCodexSessionAutoRestart(sessionId)) {
          effect.shouldRender = true;
          effect.autoRestart = true;
        }
        return effect;
      }

      if (nextTail.includes("openai codex") || nextTail.includes("starting mcp servers")) {
        const changed = state.codexTerminalPrompt?.sessionId === sessionId
          || Boolean(state.codexSessionAutoRestarted[sessionId]);
        state.codexTerminalPrompt = null;
        delete state.codexSessionAutoRestarted[sessionId];
        effect.shouldRender = changed;
        return effect;
      }

      return effect;
    }

    function handleCodexTerminalPromptAction(action) {
      const session = getCurrentCodexSession();
      if (!session) return;
      const sequences = {
        focus: null,
        enter: "\r",
        escape: "\u001b",
        arrow_up: "\u001b[A",
        arrow_down: "\u001b[B",
        ctrl_c: "\u0003",
        update_skip: "2\r",
        update_skip_version: "3\r",
        update_now: "1\r",
      };
      const sequence = sequences[action];
      if (action === "focus") {
        focusCodexTerminal();
        return;
      }
      if (!sequence) return;
      if (!sendCodexTerminalInput(session.id, sequence)) return;
      if (action.startsWith("update_")) {
        clearCodexTerminalPrompt(session.id);
      }
      renderCodexPane();
    }

    async function submitCodexPrompt(sessionId) {
      const normalizedSessionId = normalizeSessionId(sessionId);
      if (!normalizedSessionId) return;
      const session = getProjectCodexSessions().find((item) => item.id === normalizedSessionId) || null;
      if (!session) {
        state.codexMessage = "Codex session not found.";
        render();
        return;
      }
      const draft = getCodexPromptValue(session).trim();
      if (!draft) {
        focusCodexTerminal();
        return;
      }
      state.codexPromptEdits[normalizedSessionId] = "";
      state.codexPendingPrompt = {
        sessionId: normalizedSessionId,
        text: draft,
      };
      renderCodexPane();
      if (session.status === "resumable") {
        await openCodexSession(normalizedSessionId, { resumeIfNeeded: true });
        return;
      }
      if (
        state.codexSocketSessionId === normalizedSessionId
        && state.codexSocket
        && state.codexSocket.readyState === WebSocket.OPEN
      ) {
        flushPendingCodexPrompt(normalizedSessionId);
        renderCodexPane();
        return;
      }
      attachCodexSocket(session);
      renderCodexPane();
    }

    async function ensureCodexProjectSessionsLoaded(projectId, options = {}) {
      const normalizedProjectId = normalizeSessionId(projectId);
      if (!normalizedProjectId || !projectSupportsCodex(getProjectById(normalizedProjectId))) {
        return getProjectCodexSessions(normalizedProjectId);
      }
      if (!options.force && Array.isArray(state.codexSessionsByProject[normalizedProjectId])) {
        return state.codexSessionsByProject[normalizedProjectId];
      }
      if (state.codexLoadingProjects[normalizedProjectId]) {
        return state.codexSessionsByProject[normalizedProjectId] || [];
      }
      state.codexLoadingProjects[normalizedProjectId] = true;
      render();
      const sessions = await fetchJson(
        `/api/projects/${encodeURIComponent(normalizedProjectId)}/codex-sessions`,
        {},
        "codex",
        true
      );
      delete state.codexLoadingProjects[normalizedProjectId];
      if (!sessions) {
        render();
        return state.codexSessionsByProject[normalizedProjectId] || [];
      }
      const normalized = syncCodexSessionCache(normalizedProjectId, sessions);
      render();
      return normalized;
    }

    function buildCodexSocketUrl(sessionId) {
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const query = isDesktopShell ? "?desktop=true" : "";
      return `${protocol}://${window.location.host}/api/codex-sessions/${encodeURIComponent(sessionId)}/pty${query}`;
    }

    function ensureCodexTerminal() {
      if (state.codexTerminal) {
        return true;
      }
      if (!(codexTerminalHost instanceof HTMLElement)) {
        return false;
      }
      if (typeof window.Terminal !== "function" || typeof window.FitAddon?.FitAddon !== "function") {
        return false;
      }

      state.codexTerminal = new window.Terminal({
        fontFamily: "\"IBM Plex Mono\", monospace",
        fontSize: 12,
        lineHeight: 1.3,
        fontWeight: 500,
        fontWeightBold: 700,
        cursorBlink: true,
        allowTransparency: false,
        minimumContrastRatio: 4.5,
        scrollback: 5000,
        theme: {
          background: "#04090e",
          foreground: "#f8fcff",
          cursor: "#56d5ff",
          selectionBackground: "rgba(56, 189, 248, 0.28)",
          black: "#5c7183",
          red: "#f87171",
          green: "#34d399",
          yellow: "#f59e0b",
          blue: "#38bdf8",
          magenta: "#c084fc",
          cyan: "#67e8f9",
          white: "#f8fcff",
          brightBlack: "#c0d0db",
          brightRed: "#fca5a5",
          brightGreen: "#6ee7b7",
          brightYellow: "#fcd34d",
          brightBlue: "#7dd3fc",
          brightMagenta: "#d8b4fe",
          brightCyan: "#a5f3fc",
          brightWhite: "#f8fbff"
        }
      });
      state.codexFitAddon = new window.FitAddon.FitAddon();
      state.codexTerminal.loadAddon(state.codexFitAddon);
      codexTerminalHost.tabIndex = 0;
      codexTerminalHost.setAttribute("role", "application");
      codexTerminalHost.setAttribute("aria-label", "Codex terminal");
      codexTerminalHost.title = "Click to focus the live Codex terminal";
      state.codexTerminal.open(codexTerminalHost);
      if (codexTerminalHost.dataset.codexTerminalFocusBound !== "true") {
        codexTerminalHost.dataset.codexTerminalFocusBound = "true";
        codexTerminalHost.addEventListener("click", () => {
          focusCodexTerminal();
        });
        codexTerminalHost.addEventListener("pointerdown", () => {
          focusCodexTerminal();
        });
      }
      if (!state.codexTerminalResizeObserver && typeof ResizeObserver !== "undefined") {
        state.codexTerminalResizeObserver = new ResizeObserver(() => {
          scheduleCodexTerminalResize();
        });
        state.codexTerminalResizeObserver.observe(codexTerminalHost);
      }
      state.codexTerminal.onData((data) => {
        if (!state.codexSocket || state.codexSocket.readyState !== WebSocket.OPEN) return;
        state.codexSocket.send(JSON.stringify({ type: "input", data }));
      });
      scheduleCodexTerminalResize();
      return true;
    }

    function disconnectCodexSocket(clearTerminal = false) {
      if (state.codexSocket) {
        try {
          state.codexSocket.close();
        } catch (_error) {
          // Ignore socket close failures.
        }
      }
      state.codexSocket = null;
      state.codexSocketSessionId = null;
      if (state.codexTerminalResizeTimer !== null) {
        window.clearTimeout(state.codexTerminalResizeTimer);
        state.codexTerminalResizeTimer = null;
      }
      if (clearTerminal && state.codexTerminal) {
        try {
          state.codexTerminal.reset();
        } catch (_error) {
          state.codexTerminal.clear();
        }
      }
    }

    function scheduleCodexTerminalResize() {
      if (state.codexTerminalResizeTimer !== null) {
        window.clearTimeout(state.codexTerminalResizeTimer);
      }
      state.codexTerminalResizeTimer = window.setTimeout(() => {
        state.codexTerminalResizeTimer = null;
        if (!state.codexTerminal || !state.codexFitAddon || state.rightPaneMode !== "codex") return;
        try {
          state.codexFitAddon.fit();
        } catch (_error) {
          return;
        }
        if (state.codexSocket && state.codexSocket.readyState === WebSocket.OPEN) {
          state.codexSocket.send(JSON.stringify({
            type: "resize",
            cols: state.codexTerminal.cols,
            rows: state.codexTerminal.rows
          }));
        }
      }, 60);
    }

    function attachCodexSocket(session) {
      if (!session || state.rightPaneMode !== "codex") return;
      if (session.status !== "live" && session.status !== "launching") {
        disconnectCodexSocket();
        return;
      }
      if (!ensureCodexTerminal()) {
        state.codexMessage = "The embedded terminal failed to initialize.";
        renderCodexPane();
        return;
      }
      if (
        state.codexSocketSessionId === session.id
        && state.codexSocket
        && (state.codexSocket.readyState === WebSocket.OPEN || state.codexSocket.readyState === WebSocket.CONNECTING)
      ) {
        scheduleCodexTerminalResize();
        return;
      }

      disconnectCodexSocket(true);
      state.codexSocketSessionId = session.id;
      const socket = new WebSocket(buildCodexSocketUrl(session.id));
      state.codexSocket = socket;

      socket.addEventListener("open", () => {
        if (state.codexSocket !== socket) return;
        state.codexMessage = "";
        scheduleCodexTerminalResize();
        flushPendingCodexPrompt(session.id);
        focusCodexTerminal();
        renderCodexPane();
      });

      socket.addEventListener("message", (event) => {
        let payload = null;
        try {
          payload = JSON.parse(event.data);
        } catch (_error) {
          return;
        }
        if (payload?.type === "output" && state.codexTerminal) {
          const output = normalizeCodexTerminalOutput(String(payload.data || ""));
          state.codexTerminal.write(output);
          const outputEffect = recordCodexTerminalOutput(session.id, output);
          if (outputEffect.autoRestart) {
            void restartCodexSession(session.id, { automatic: true });
          }
          if (outputEffect.shouldRender) {
            renderCodexPane();
          }
          return;
        }
        if (payload?.type === "status") {
          const nextStatus = String(payload.status || "resumable");
          if (nextStatus === "resumable" && beginCodexSessionAutoRestart(session.id)) {
            void restartCodexSession(session.id, { automatic: true });
            render();
            return;
          }
          syncCurrentWorkspaceCodexSessionState(session.id, { status: nextStatus });
          render();
          return;
        }
        if (payload?.type === "error") {
          const message = String(payload.message || "Codex terminal error");
          if (message.toLowerCase().includes("not live")) {
            markCodexSessionResumable(
              session.id,
              "This Codex session is not attached right now. Resume it to reopen the embedded chat."
            );
          } else {
            state.codexMessage = message;
          }
          renderCodexPane();
        }
      });

      socket.addEventListener("close", () => {
        if (state.codexSocket !== socket) return;
        state.codexSocket = null;
        state.codexSocketSessionId = null;
        if (beginCodexSessionAutoRestart(session.id)) {
          void restartCodexSession(session.id, { automatic: true });
          render();
          return;
        }
        if (state.openCodexSessionId === session.id && state.rightPaneMode === "codex") {
          syncCurrentWorkspaceCodexSessionState(session.id, { status: "resumable" });
        }
        render();
      });

      socket.addEventListener("error", () => {
        if (state.codexSocket !== socket) return;
        markCodexSessionResumable(
          session.id,
          "The embedded Codex terminal disconnected. Resume the session to reopen chat."
        );
        render();
      });
    }

    async function openCodexSession(sessionId, options = {}) {
      const normalizedSessionId = normalizeSessionId(sessionId);
      if (!normalizedSessionId || !state.selectedProjectId) return;
      const resumeIfNeeded = options.resumeIfNeeded !== false;
      closeArchiveMenu({ render: false });
      closePortViewer({ render: false });
      state.projectTrayMode = null;
      setRightPaneMode("codex");
      state.openCodexSessionId = normalizedSessionId;

      let session = getProjectCodexSessions().find((item) => item.id === normalizedSessionId) || null;
      if (!session) {
        const sessions = await ensureCodexProjectSessionsLoaded(state.selectedProjectId, { force: true });
        session = sessions.find((item) => item.id === normalizedSessionId) || null;
      }
      if (!session) {
        state.codexMessage = "Codex session not found.";
        render();
        return;
      }

      if (session.status === "resumable") {
        if (resumeIfNeeded) {
          const response = await fetchJson(
            `/api/codex-sessions/${encodeURIComponent(session.id)}/resume`,
            { method: "POST" },
            "codex"
          );
          if (!response) {
            restorePendingCodexPrompt(session.id);
            renderCodexPane();
            return;
          }
          applyWorkspace(response.workspace);
          state.openCodexSessionId = response.opened_session_id || session.id;
          render();
          return;
        }
      }

      render();
    }

    async function assignTaskToCodexSession(taskId, options = {}) {
      const normalizedTaskId = normalizeSessionId(taskId);
      const openPane = options.openPane === true;
      if (!normalizedTaskId || !state.selectedProjectId || !projectSupportsCodex(state.workspace?.project)) {
        return;
      }
      if (isTaskCodexAssignmentPending(normalizedTaskId)) return;
      const task = findTask(normalizedTaskId);
      if (!task) return;

      const activeSession = getActiveTaskCodexSession(normalizedTaskId);
      if (activeSession) {
        if (openPane) {
          await openCodexSession(activeSession.id, { resumeIfNeeded: true });
        }
        return;
      }

      closeArchiveMenu({ render: false });
      closePortViewer({ render: false });
      state.projectTrayMode = null;
      state.codexAssigningTaskIds[normalizedTaskId] = true;
      render();

      const response = await fetchJson(
        `/api/tasks/${encodeURIComponent(normalizedTaskId)}/assign-codex-session`,
        {
          method: "POST",
          body: JSON.stringify({
            expected_revision: task.revision
          })
        },
        options.errorChannel || "task"
      );

      delete state.codexAssigningTaskIds[normalizedTaskId];
      if (!response) {
        render();
        return;
      }

      applyWorkspace(response.workspace);
      if (openPane) {
        state.openCodexSessionId = response.opened_session_id || state.openCodexSessionId;
        setRightPaneMode("codex");
      }
      render();
    }

    async function createCodexSession() {
      if (!state.selectedProjectId || !projectSupportsCodex(state.workspace?.project)) return;
      const selectedTask = getSelectedActiveTask();
      const selectedTaskTitle = selectedTask
        ? (state.taskEdits[selectedTask.id] ?? selectedTask.title ?? "")
        : "";
      if (selectedTask && !isMarkdownTaskHeading(selectedTaskTitle)) {
        const activeSession = getActiveTaskCodexSession(selectedTask.id);
        if (activeSession) {
          await openCodexSession(activeSession.id, { resumeIfNeeded: true });
          return;
        }
        await assignTaskToCodexSession(selectedTask.id, { errorChannel: "codex", openPane: true });
        return;
      }
      closeArchiveMenu({ render: false });
      closePortViewer({ render: false });
      state.projectTrayMode = null;
      const response = await fetchJson(
        `/api/projects/${encodeURIComponent(state.selectedProjectId)}/codex-sessions`,
        {
          method: "POST",
          body: JSON.stringify({})
        },
        "codex"
      );
      if (!response) return;
      applyWorkspace(response.workspace);
      state.openCodexSessionId = response.opened_session_id || state.openCodexSessionId;
      setRightPaneMode("codex");
      render();
    }

    async function saveCodexSessionDetails(sessionId) {
      const session = getProjectCodexSessions().find((item) => item.id === sessionId) || null;
      if (!session) return;
      const response = await fetchJson(
        `/api/codex-sessions/${encodeURIComponent(session.id)}`,
        {
          method: "PATCH",
          body: JSON.stringify({
            title: getCodexSessionTitleValue(session),
            summary: getCodexSessionSummaryValue(session)
          })
        },
        "codex"
      );
      if (!response) return;
      delete state.codexSessionTitleEdits[session.id];
      delete state.codexSessionSummaryEdits[session.id];
      applyWorkspace(response.workspace);
      state.codexMessage = response.message || "";
      render();
    }

    async function terminateCodexSession(sessionId) {
      const normalizedSessionId = normalizeSessionId(sessionId);
      if (!normalizedSessionId) return;
      disconnectCodexSocket();
      const response = await fetchJson(
        `/api/codex-sessions/${encodeURIComponent(normalizedSessionId)}/terminate`,
        { method: "POST" },
        "codex"
      );
      if (!response) return;
      applyWorkspace(response.workspace);
      state.codexMessage = response.message || "";
      render();
    }

    async function archiveCodexSession(sessionId) {
      const normalizedSessionId = normalizeSessionId(sessionId);
      if (!normalizedSessionId || !state.selectedProjectId) return;
      const projectId = state.selectedProjectId;
      const currentSessions = getProjectCodexSessions(projectId);
      const previousOpenCodexSessionId = state.openCodexSessionId;
      const archivedSessionLocalState = captureCodexSessionLocalState(normalizedSessionId);
      const archivedWasOpen = state.openCodexSessionId === normalizedSessionId;
      const { remainingSessions, fallbackSession } = getCodexArchiveFallbackSession(
        currentSessions,
        normalizedSessionId
      );
      disconnectCodexSocket(archivedWasOpen);
      clearCodexSessionLocalState(normalizedSessionId);
      setProjectCodexSessions(projectId, remainingSessions);
      if (archivedWasOpen) {
        state.openCodexSessionId = fallbackSession?.id || null;
      }
      state.codexHeadNotice = "Archiving session...";
      state.codexMessage = "";
      render();
      const response = await fetchJson(
        `/api/codex-sessions/${encodeURIComponent(normalizedSessionId)}/archive`,
        { method: "POST" },
        "codex"
      );
      if (!response) {
        const failureMessage = state.codexMessage || "Failed to archive Codex session.";
        setProjectCodexSessions(projectId, currentSessions);
        if (state.selectedProjectId === projectId) {
          state.openCodexSessionId = previousOpenCodexSessionId;
        }
        restoreCodexSessionLocalState(archivedSessionLocalState);
        const workspace = await refreshSelectedProjectCodexWorkspace(projectId);
        if (
          workspace
          && !getProjectCodexSessions(projectId).some((session) => session.id === normalizedSessionId)
        ) {
          clearCodexSessionLocalState(normalizedSessionId);
        }
        state.codexHeadNotice = "";
        state.codexMessage = failureMessage;
        render();
        return;
      }
      applyWorkspace(response.workspace);
      state.openCodexSessionId = response.opened_session_id || state.openCodexSessionId || null;
      state.codexHeadNotice = response.message || "";
      state.codexMessage = "";
      render();
    }

          </div>

        setCodexTerminalEmptyMarkup(`

      const activeIcon = normalizeProjectIconKey(currentIcon);
      return PROJECT_ICON_OPTIONS.map((option) => `
        <button
          class="project-icon-option${option.value === activeIcon ? " active" : ""}"
          type="button"
          data-project-settings-icon="${option.value}"
          aria-pressed="${option.value === activeIcon ? "true" : "false"}"
          aria-label="${escapeHtml(option.label)}"
          title="${escapeHtml(option.label)}"
        >
          ${renderProjectIconBadge(option.value, "project-card-icon project-icon-glyph")}
        </button>
      `).join("");
    }

    function renderProjects() {
      const highlightSelectedProject = !isAlternateProjectViewOpen();
      const addProjectCard = `
        <button
          class="project-card project-select project-add-card"
          type="button"
          data-project-add
          aria-label="Add project"
          title="Add project"
        >
          <span class="project-add-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
          </span>
          <span class="project-card-title">Add project</span>
        </button>
      `;

      if (!state.projects.length) {
        projectList.innerHTML = `${addProjectCard}<div class="empty-state">No projects yet.</div>`;
        return;
      }

      projectList.innerHTML = `${addProjectCard}${state.projects.map((project) => `
        <div class="project-row ${projectSupportsCodex(project) ? "has-codex" : ""} ${state.codexExpandedProjects[project.id] ? "expanded" : ""}">
          <div class="project-row-main">
            ${projectSupportsCodex(project) ? `
              <button
                class="project-codex-toggle"
                type="button"
                aria-label="${state.codexExpandedProjects[project.id] ? "Collapse" : "Expand"} Codex sessions"
                title="${state.codexExpandedProjects[project.id] ? "Collapse" : "Expand"} Codex sessions"
                aria-expanded="${state.codexExpandedProjects[project.id] ? "true" : "false"}"
                data-project-codex-toggle="${project.id}"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m9 6 6 6-6 6"></path>
                </svg>
              </button>
            ` : ""}
            <button
              class="project-card project-select ${highlightSelectedProject && project.id === state.selectedProjectId ? "active" : ""}"
              type="button"
              data-project-select-id="${project.id}"
              aria-label="Select ${escapeAttribute(project.title)}"
              title="${escapeAttribute(project.title)}"
            >
              ${renderProjectIconBadge(project.icon)}
              <span class="project-card-main">
                <span class="project-card-title">${escapeHtml(project.title)}</span>
              </span>
            </button>
            <button
              class="project-actions-btn"
              type="button"
              aria-label="Project settings"
              title="Project settings"
              data-project-menu-id="${project.id}"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="5" r="1.8"></circle>
                <circle cx="12" cy="12" r="1.8"></circle>
                <circle cx="12" cy="19" r="1.8"></circle>
              </svg>
            </button>
          </div>
          ${renderProjectCodexChildren(project)}
        </div>
      `).join("")}`;

      projectList.querySelectorAll("[data-project-codex-toggle]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          const projectId = button.dataset.projectCodexToggle;
          state.codexExpandedProjects[projectId] = !state.codexExpandedProjects[projectId];
          render();
        });
      });

      projectList.querySelectorAll("[data-project-codex-nav]").forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          await selectProject(button.dataset.projectCodexNav, { preferredPaneMode: "codex" });
        });
      });

      projectList.querySelectorAll("[data-project-menu-id]").forEach((button) => {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openProjectSettings(button.dataset.projectMenuId);
        });
      });

      projectList.querySelectorAll("[data-project-select-id]").forEach((button) => {
        button.addEventListener("click", async (event) => {
          event.preventDefault();
          event.stopPropagation();
          await selectProject(button.dataset.projectSelectId);
        });
      });
    }

    function renderProjectSettings() {
      const project = getProjectById(state.projectSettingsId);
      if (!project) {
        projectSettingsOverlay.innerHTML = "";
        return;
      }

      const sourceKind = effectiveProjectSourceKind(project);
      const sourceLocator = currentProjectSourceLocator();
      const sourceLabel = sourceKind === "local"
        ? "Linked folder"
        : sourceLocator
          ? "Linked source"
          : "No source linked";

      projectSettingsOverlay.innerHTML = `
        <div class="overlay-shell open" data-project-settings-backdrop="true">
          <section class="overlay-card" role="dialog" aria-modal="true" aria-label="Project settings">
            <div class="overlay-head">
              <div class="overlay-title">
                <div class="small-label">Project settings</div>
                <h2>${escapeHtml(project.title)}</h2>
              </div>
              <button class="icon-btn" type="button" data-project-settings-close aria-label="Close project settings">+</button>
            </div>
            ${state.projectSettingsMessage ? `<div class="overlay-message error">${escapeHtml(state.projectSettingsMessage)}</div>` : ""}
            <section class="overlay-section">
              <div class="overlay-section-head">
                <div class="small-label">Icon</div>
              </div>
              <div class="project-icon-current">
                ${renderProjectIconBadge(project.icon, "project-card-icon project-card-icon-large")}
                <div>
                  <div class="overlay-value">${escapeHtml(projectIconLabel(project.icon))}</div>
                  <div class="overlay-muted">Click an icon to save it. The selected icon appears in the project list.</div>
                </div>
              </div>
              <div class="project-icon-picker">
                ${renderProjectIconPicker(project.icon)}
              </div>
            </section>
            <section class="overlay-section">
              <div class="overlay-section-head">
                <div class="small-label">Source</div>
              </div>
              <div class="overlay-value">${escapeHtml(sourceLabel)}</div>
              <div class="overlay-muted">${sourceLocator ? escapeHtml(sourceLocator) : "This project is currently local to Topside only."}</div>
              ${renderProjectSettingsSourceControls(sourceKind, sourceLocator)}
            </section>
            <section class="overlay-section">
              <div class="overlay-section-head">

    function taskSyncStatusLabel(project, sourceKind) {
      if (sourceKind !== "local") {
        return "Unavailable";
      }

      if (!project.task_sync_enabled) {
        return "Disabled";
      }

      if (project.task_sync_status === "conflict") {
        return "Conflict";
      }

      if (project.task_sync_status === "paused") {
        return "Paused";
      }

      return "Live";
    }

    function taskSyncSummary(project, sourceKind) {
      if (sourceKind !== "local") {
        return "Managed task sync is available only when this project is linked to a local folder.";
      }

      if (!project.task_sync_enabled) {
        return "Keep one Topside-managed docs/to-do.md in the linked folder and sync tasks both ways automatically.";
      }

      if (project.task_sync_status === "conflict") {
        return project.task_sync_conflict_summary || "Topside paused automatic task sync because both sides changed before reconciliation.";
      }

      const details = [];
      if (project.task_sync_file) {
        details.push(project.task_sync_file);
      }
      if (project.task_sync_last_inbound_at_label) {
        details.push(`inbound ${project.task_sync_last_inbound_at_label}`);
      }
      if (project.task_sync_last_outbound_at_label) {
        details.push(`outbound ${project.task_sync_last_outbound_at_label}`);
      }
      if (project.task_sync_conflict_at_label && project.task_sync_status === "paused") {
        details.push(`paused ${project.task_sync_conflict_at_label}`);
      }

      return details.join(" | ") || "Managed task sync is active for this project.";
    }

    function renderManagedTaskSyncControls(project, sourceKind) {
      if (sourceKind !== "local") {
        return `<div class="disabled-note">Link a local project folder to enable managed bidirectional task sync.</div>`;
      }

      if (!project.task_sync_enabled) {
        return `
          <div class="settings-action-list">
            ${renderProjectSettingsActionButton("enable-task-sync", "Enable Task Sync", "sync")}
          </div>

      }

      const actions = [];
      if (project.source_locator && project.task_sync_file) {
        actions.push(renderProjectSettingsActionButton("open-task-sync-file", "Open Sync File", "open"));
      }

      if (project.task_sync_status === "paused") {
        actions.push(renderProjectSettingsActionButton("resume-task-sync", "Resume Sync", "play"));
      } else if (project.task_sync_status !== "conflict") {
        actions.push(renderProjectSettingsActionButton("pause-task-sync", "Pause Sync", "pause"));
      }

      if (project.task_sync_status === "conflict") {
        actions.push(renderProjectSettingsActionButton("resolve-task-sync-file", "Resolve Using File", "sync"));
        actions.push(renderProjectSettingsActionButton("resolve-task-sync-local", "Resolve Using Topside", "save"));
      }

      return `
        <div class="settings-action-list">
          ${actions.join("")}
        </div>

      state.projectArchiveConfirmId = null;

    function getProjectById(projectId) {
      if (!projectId) return null;
      if (state.workspace?.project?.id === projectId) return state.workspace.project;
      return state.projects.find((project) => project.id === projectId) || null;
    }

    function effectiveProjectSourceKind(project) {
      return project?.source_kind || null;
    }

    function currentProjectSourceLocator() {
      return getProjectById(state.projectSettingsId)?.source_locator || "";
    }

    function deriveProjectTitleFromSource(sourceKind, sourceLocator, fallbackTitle = "") {
      const locator = String(sourceLocator || "").trim();
      if (!locator) return fallbackTitle;

      if (sourceKind === "local") {
        const parts = locator.split(/[\\/]/).filter(Boolean);
        return parts[parts.length - 1] || fallbackTitle;
      }

      return fallbackTitle;
    }

    async function pickProjectSettingsDirectory() {
      const response = await fetchJson("/api/system/pick-directory", {
        method: "POST"
      }, "project", true);
      if (!response) {
        if (isDirectoryPickerCanceled(state.projectMessage)) {
          state.projectMessage = "";
          state.projectSettingsMessage = "";
          renderProjectSettings();
          return;
        }
        state.projectSettingsPickerFallback = true;
        renderProjectSettings();
        return;
      }

      state.projectSettingsSourceInput = response.path;
      await saveProjectSourceLink("local", response.path);
    }

    async function saveProjectSourceLink(forcedKind = null, forcedLocator = null) {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const sourceKind = forcedKind || state.projectSettingsSourceMode;
      const sourceLocator = (forcedLocator || state.projectSettingsSourceInput || "").trim();
      const title = deriveProjectTitleFromSource(sourceKind, sourceLocator, project.title);
      if (!sourceKind || !sourceLocator) {
        state.projectSettingsMessage = "Source link is incomplete";
        renderProjectSettings();
        return;
      }

      const response = await fetchJson(`/api/projects/${project.id}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId,
          title,
          source_kind: sourceKind,
          source_locator: sourceLocator
        })
      }, "project");
      if (!response) return;

      applyUiState(response);
      state.projectSettingsSourceMode = null;
      state.projectSettingsSourceInput = "";
      state.projectSettingsMessage = "";
      state.projectSettingsPickerFallback = false;
      render();
    }

    async function saveProjectIcon(icon) {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const normalizedIcon = normalizeProjectIconKey(icon);
      if (normalizeProjectIconKey(project.icon) === normalizedIcon) return;

      const response = await fetchJson(`/api/projects/${project.id}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId,
          icon: normalizedIcon

      }, "project");
      if (!response) return;

      applyUiState(response);
      render();

    async function openManagedTaskSyncFile() {
      const project = getProjectById(state.projectSettingsId);
      if (!project || !project.source_locator || !project.task_sync_file) return;

      const root = String(project.source_locator).replace(/[\\/]+$/, "");
      const relative = String(project.task_sync_file).replace(/^[/\\]+/, "");
      const joinedPath = `${root}/${relative}`;

      await fetchJson("/api/system/open-path", {
        method: "POST",
        body: JSON.stringify({ path: joinedPath })
      }, "project");

    async function performManagedTaskSyncAction(action) {
      const project = getProjectById(state.projectSettingsId);
      if (!project) return;

      const endpoint = action === "enable-task-sync"
        ? "enable"
        : action === "pause-task-sync"
          ? "pause"
          : action === "resume-task-sync"
            ? "resume"
            : action === "resolve-task-sync-file"
              ? "resolve-file"
              : action === "resolve-task-sync-local"
                ? "resolve-local"
                : null;

      if (!endpoint) return;

      const response = await fetchJson(`/api/projects/${project.id}/task-sync/${endpoint}`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: project.revision,
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!response) return;

      applyUiState(response);
      state.projectSettingsMessage = "";
      render();

    function renderTasks() {
      taskMessage.innerHTML = state.taskMessage ? `<div class="message error">${escapeHtml(state.taskMessage)}</div>` : "";
      if (!state.projects.length) {
        activeTaskList.innerHTML = renderEmptyAppState();
        activeTaskList.classList.remove("priority-sorted");
        resetTodoStatusLabel();
        return;
      }

      if (state.projectTrayMode === "chooser") {
        activeTaskList.innerHTML = renderEmptyAppState();
        activeTaskList.classList.remove("priority-sorted");
        todoStatus.textContent = "";
        return;
      }

      if (!state.workspace) {
        activeTaskList.innerHTML = `<div class="empty-state">Select or create a project to start a to-do list.</div>`;
        activeTaskList.classList.remove("priority-sorted");
        resetTodoStatusLabel();
        return;
      }

      ensureDraftRow();

      const activeRows = [];
      const draftsByAfter = buildTaskDraftsByAfterMap();

      if (draftsByAfter.has("__top__")) {
        draftsByAfter.get("__top__").forEach((draft) => activeRows.push(renderDraftRow(draft)));
      }

      const taskSectionState = buildActiveTaskSectionState(state.workspace, draftsByAfter);
      const activeTasks = state.sortTasksByPriority
        ? sortActiveTasksByPriority(state.workspace.active_tasks)
        : state.workspace.active_tasks;
      activeTasks.forEach((task) => {
        if (taskSectionState.hiddenTaskIds.has(task.id)) return;

        const sectionState = taskSectionState.sections.get(task.id) || null;
        activeRows.push(renderActiveTaskRow(task, sectionState));

        const drafts = draftsByAfter.get(task.id);
        if (drafts) {
          if (sectionState?.collapsed) return;
          drafts.forEach((draft) => activeRows.push(renderDraftRow(draft)));
        }
      });

      activeTaskList.innerHTML = activeRows.join("");
      activeTaskList.classList.toggle("priority-sorted", state.sortTasksByPriority);
      resetTodoStatusLabel();
      applyPendingActiveTaskAnimation();
    }

    function renderDraftRow(draft) {
      const isHeading = isMarkdownTaskHeading(draft.title);
      const visibleTitle = getVisibleTaskTitle(draft.title);
      const leadingControl = isHeading
        ? ""
        : '<span class="task-draft-check" aria-hidden="true"></span>';

      return `
        <div class="task-draft${isHeading ? " is-heading" : ""}">
