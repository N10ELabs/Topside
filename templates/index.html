<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>n10e</title>
  <style>
    :root {
      --app-height: 100vh;
      --bg: #0b1218;
      --panel: #101b24;
      --panel-soft: #13212b;
      --line: rgba(147, 184, 207, 0.28);
      --line-strong: rgba(147, 184, 207, 0.42);
      --text: #e8f0f5;
      --muted: #8fa4b5;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.18);
      --scrollbar-size: 8px;
      --scrollbar-clearance: calc(var(--scrollbar-size) + 8px);
      --scrollbar-track: rgba(56, 189, 248, 0.12);
      --scrollbar-thumb: rgba(56, 189, 248, 0.68);
      --scrollbar-thumb-hover: rgba(125, 211, 252, 0.84);
      --warm: #f59e0b;
      --success: #34d399;
      --danger: #f87171;
      --shadow: 0 18px 48px rgba(2, 8, 14, 0.38);
      --glass-shell: rgba(8, 16, 23, 0.2);
      --glass-panel: rgba(16, 27, 36, 0.66);
      --glass-blur: 14px;
      --glass-shell-blur: 24px;
      --glass-shell-radius: 18px;
      --pane-head-height: 62px;
      --pane-head-pad-y: 10px;
      --pane-control-size: 34px;
      --disclosure-slot: 18px;
      --task-row-min-height: 44px;
      --changelog-list-height: min(38vh, 340px);
      --changelog-pane-height: min(calc(38vh + var(--pane-head-height) + 25px), 427px);
    }

    @supports (height: 100dvh) {
      :root {
        --app-height: 100dvh;
      }
    }

    * {
      box-sizing: border-box;
      scrollbar-width: none;
      scrollbar-color: transparent transparent;
    }

    *::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    *::-webkit-scrollbar-track {
      background: transparent;
    }

    *::-webkit-scrollbar-thumb {
      background: transparent;
      border: 0 solid transparent;
      border-radius: 999px;
      box-shadow: none;
    }

    .scroll-indicator-overlay {
      position: absolute;
      top: 0;
      right: 2px;
      height: 0;
      width: var(--scrollbar-size);
      overflow: hidden;
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      border-radius: 999px;
      background: var(--scrollbar-track);
      transform: translateX(3px);
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 3;
    }

    .scroll-indicator-overlay.is-scrollable {
      visibility: visible;
    }

    .scroll-indicator-overlay.scroll-active {
      opacity: 1;
      transform: translateX(0);
    }

    .scroll-indicator-thumb {
      width: 100%;
      height: 0;
      border: 1px solid var(--scrollbar-track);
      border-radius: 999px;
      background: linear-gradient(180deg, var(--scrollbar-thumb-hover), var(--scrollbar-thumb));
      box-shadow: inset 0 0 0 1px rgba(232, 240, 245, 0.06);
      transform: translateY(0);
      transition: transform 60ms linear, height 60ms linear;
    }

    *::-webkit-scrollbar-corner {
      background: transparent;
    }

    html {
      height: 100%;
      color-scheme: dark;
      overflow: hidden;
    }

    body {
      margin: 0;
      height: 100%;
      position: relative;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.1), transparent 24%),
        linear-gradient(180deg, #0a1117, #0b1218);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    html[data-n10e-desktop="true"] body {
      background: transparent;
      border-radius: var(--glass-shell-radius);
      overflow: hidden;
    }

    html[data-n10e-desktop="true"] .shell::before {
      content: none;
    }

    html[data-n10e-desktop="true"] .shell {
      padding: 8px;
      position: relative;
      z-index: 1;
      border-radius: inherit;
      overflow: hidden;
      isolation: isolate;
      background-clip: padding-box;
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      clip-path: inset(0 round var(--glass-shell-radius));
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-n10e-desktop="true"] .layout {
      position: relative;
      z-index: 1;
      gap: 8px;
    }

    html[data-n10e-desktop="true"] .pane {
      box-shadow: 0 12px 28px rgba(2, 8, 14, 0.28);
    }

    html[data-n10e-desktop="true"] .pane-projects {
      align-self: stretch;
      grid-template-rows: auto 1fr;
      border: none;
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-n10e-desktop="true"] .pane-projects .pane-head,
    html[data-n10e-desktop="true"] .pane-projects .pane-body,
    html[data-n10e-desktop="true"] #project-tray,
    html[data-n10e-desktop="true"] #project-list {
      background: transparent;
      box-shadow: none;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
    }

    html[data-n10e-desktop="true"] .pane-projects .pane-body {
      padding-top: 6px;
      min-height: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .shell {
      height: var(--app-height);
      padding: 14px;
      display: flex;
      overflow: hidden;
    }

    .layout {
      flex: 1;
      min-height: 0;
      height: 100%;
      display: grid;
      gap: 12px;
      grid-template-columns: 220px minmax(0, 1fr) minmax(0, 1fr);
    }

    .todo-stack {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .layout.empty-app .todo-stack {
      grid-column: 2 / -1;
    }

    .layout.empty-app .pane-todo .pane-head {
      display: none;
    }

    .layout.empty-app .pane-changelog {
      display: none;
    }

    .layout.empty-app .pane-notes {
      display: none;
    }

    .layout.project-starter .todo-stack {
      grid-column: 2 / -1;
    }

    .layout.project-starter .pane-todo {
      grid-template-rows: 1fr;
    }

    .layout.project-starter .pane-todo .pane-head {
      display: none;
    }

    .layout.project-starter .pane-todo .pane-body {
      display: flex;
      flex-direction: column;
    }

    .layout.project-starter #task-message {
      display: none;
    }

    .layout.project-starter #active-task-list {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
    }

    .layout.project-starter .starter-shell {
      width: 100%;
      height: 100%;
    }

    .layout.project-starter .pane-changelog {
      display: none;
    }

    .layout.project-starter .pane-notes {
      display: none;
    }

    .pane.pane-archive {
      display: none;
      min-height: 0;
    }

    .layout.archive-view .todo-stack,
    .layout.archive-view .pane-notes {
      display: none;
    }

    .layout.archive-view .pane.pane-archive {
      display: grid;
      grid-column: 2 / -1;
      grid-row: 1 / -1;
    }

    .pane {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--glass-panel);
      box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(130%);
      backdrop-filter: blur(var(--glass-blur)) saturate(130%);
      overflow: hidden;
    }

    .pane-projects {
      align-self: start;
      border: none;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      grid-template-rows: auto auto;
      -webkit-backdrop-filter: none;
      backdrop-filter: none;
      overflow: visible;
    }

    .pane-todo {
      flex: 1 1 auto;
    }

    .pane-changelog {
      flex: 0 0 auto;
      height: var(--changelog-pane-height);
      transition: height 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
    }

    .pane-changelog.collapsed {
      height: var(--pane-head-height);
    }

    .pane-changelog.collapsed .pane-head {
      border-bottom-color: transparent;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: var(--pane-head-height);
      padding: var(--pane-head-pad-y) 16px;
      border-bottom: 1px solid var(--line);
    }

    .pane-projects .pane-head {
      padding-left: 12px;
      padding-right: 12px;
      border-bottom: none;
    }

    .pane-projects .pane-title {
      padding-left: 0;
    }

    .pane-title {
      font-family: "IBM Plex Mono", monospace;
      font-size: 15px;
      line-height: 1;
      text-transform: lowercase;
      display: inline-flex;
      align-items: center;
      min-height: var(--pane-control-size);
      padding-left: var(--disclosure-slot);
    }

    .pane-title-collapsible {
      position: relative;
    }

    .pane-title-toggle {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      place-items: center;
      padding: 0;
      position: absolute;
      top: 50%;
      left: 0;
      opacity: 0.42;
      transform: translateY(-50%) scale(0.92);
      transition: opacity 160ms ease, transform 180ms ease, color 160ms ease, background-color 160ms ease;
    }

    .pane-title-toggle svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 220ms ease;
    }

    .pane-title-toggle:hover,
    .pane-title-toggle:focus-visible {
      color: var(--text);
      background: rgba(16, 33, 46, 0.84);
      outline: none;
    }

    .pane-changelog .pane-head:hover .pane-title-toggle,
    .pane-changelog .pane-head:focus-within .pane-title-toggle {
      opacity: 0.96;
      transform: translateY(-50%) scale(1);
    }

    .pane-changelog.collapsed .pane-title-toggle svg {
      transform: rotate(-90deg);
    }

    .pane-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      min-height: var(--pane-control-size);
    }

    .pane-head .muted {
      display: inline-flex;
      align-items: center;
      min-height: var(--pane-control-size);
      line-height: 1;
    }

    .pane-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .pane-projects .pane-body {
      padding: 0 12px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }

    .pane-todo .pane-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-changelog .pane-body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 160ms ease, transform 220ms ease;
    }

    .pane-changelog.collapsed .pane-body {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }

    .icon-btn,
    .text-btn {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(9, 18, 25, 0.9);
      color: var(--text);
      padding: 8px 10px;
    }

    .icon-btn {
      width: var(--pane-control-size);
      height: var(--pane-control-size);
      display: inline-grid;
      place-items: center;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-btn.subtle {
      border: none;
      background: transparent;
    }

    .icon-btn.subtle:hover,
    .icon-btn.subtle:focus-visible {
      background: rgba(16, 33, 46, 0.84);
      outline: none;
    }

    .mode-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(9, 18, 25, 0.9);
    }

    .mode-btn {
      width: var(--pane-control-size);
      height: var(--pane-control-size);
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      display: inline-grid;
      place-items: center;
    }

    .mode-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mode-btn.active {
      color: var(--text);
      border-color: rgba(56, 189, 248, 0.6);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.22);
      background: rgba(16, 33, 46, 0.98);
    }

    .mode-btn:hover {
      color: var(--text);
      background: rgba(16, 33, 46, 0.58);
    }

    .project-card.active {
      border-color: rgba(56, 189, 248, 0.6);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.22);
      background: rgba(16, 33, 46, 0.98);
    }

    .inline-shell,
    .project-card,
    .task-row,
    .task-draft,
    .note-card,
    .done-row,
    .empty-state,
    .message {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(10, 18, 25, 0.78);
    }

    .inline-shell,
    .message,
    .empty-state {
      padding: 10px;
    }

    .inline-shell {
      display: grid;
      gap: 8px;
    }

    .inline-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .project-chooser-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .project-chooser-btn {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(12, 23, 32, 0.94), rgba(8, 15, 22, 0.98));
      color: var(--muted);
      padding: 0;
      display: inline-grid;
      place-items: center;
      transition: transform 120ms ease, border-color 120ms ease, color 120ms ease, box-shadow 120ms ease, background-color 120ms ease;
    }

    .project-chooser-btn svg {
      width: 18px;
      height: 18px;
    }

    .project-chooser-btn[data-project-chooser="new"] {
      color: #67e8f9;
    }

    .project-chooser-btn[data-project-chooser="local"] {
      color: #86efac;
    }

    .project-chooser-btn:hover,
    .project-chooser-btn:focus-visible {
      color: var(--text);
      border-color: var(--line-strong);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.18);
      background: linear-gradient(180deg, rgba(15, 30, 42, 0.96), rgba(10, 20, 28, 0.98));
      transform: translateY(-1px);
      outline: none;
    }

    .text-input,
    .task-input,
    .note-title-input,
    .markdown-input,
    .path-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(8, 15, 21, 0.92);
      color: var(--text);
      padding: 10px 11px;
    }

    .markdown-input {
      min-height: 240px;
      resize: vertical;
      line-height: 1.55;
      font-family: "IBM Plex Mono", monospace;
      font-size: 13px;
    }

    .project-list,
    .task-list,
    .done-list,
    .notes-list {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .project-row {
      position: relative;
      min-width: 0;
      max-width: 100%;
    }

    .project-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
      padding: 10px 12px;
      text-align: left;
    }

    .pane-projects .project-card {
      border: 1px solid rgba(147, 184, 207, 0.36);
      border-radius: 12px;
      background: rgba(8, 16, 23, 0.4);
      padding: 9px 42px 9px 10px;
      box-shadow: inset 0 0 0 1px rgba(3, 9, 14, 0.16);
      transition: border-color 120ms ease, background-color 120ms ease, box-shadow 120ms ease;
    }

    .pane-projects .project-card:hover {
      border-color: rgba(147, 184, 207, 0.52);
      background: rgba(16, 33, 46, 0.56);
    }

    .pane-projects .project-card.active {
      border-color: rgba(56, 189, 248, 0.58);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.18);
      background: rgba(16, 33, 46, 0.9);
    }

    .project-select {
      width: 100%;
    }

    .project-actions-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      display: inline-grid;
      place-items: center;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      z-index: 1;
      transition: opacity 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .project-actions-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .project-row:hover .project-actions-btn,
    .project-row:focus-within .project-actions-btn {
      opacity: 1;
      pointer-events: auto;
    }

    .project-actions-btn:hover,
    .project-actions-btn:focus-visible {
      color: var(--text);
      background: rgba(16, 33, 46, 0.84);
      outline: none;
    }

    .pane-projects .inline-shell,
    .pane-projects .empty-state,
    .pane-projects .message {
      border-radius: 10px;
      background: rgba(10, 18, 25, 0.46);
    }

    .project-card-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-add-card {
      width: 100%;
      justify-content: flex-start;
      gap: 12px;
      padding-right: 12px;
    }

    .project-add-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      color: #67e8f9;
      background: rgba(56, 189, 248, 0.08);
    }

    .project-add-icon svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .project-pane-footer {
      margin-top: auto;
      padding-top: 0;
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: transparent;
    }

    .archive-menu {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      max-width: 100%;
    }

    .archive-launch-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: var(--pane-control-size);
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: #f8fbff;
      font-size: 15px;
      line-height: 1;
      font-family: "IBM Plex Mono", monospace;
      text-transform: lowercase;
    }

    .archive-launch-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .archive-launch-btn.active {
      border: none;
      background: transparent;
      color: #f8fbff;
    }

    .archive-launch-btn:hover,
    .archive-launch-btn:focus-visible {
      background: transparent;
      color: #ffffff;
      outline: none;
    }

    .archive-menu-shell {
      display: grid;
      gap: 10px;
      width: 100%;
    }

    .archive-menu-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .archive-menu-title {
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: lowercase;
      color: var(--muted);
    }

    .archive-menu-count {
      font-size: 11px;
      font-family: "IBM Plex Mono", monospace;
      color: var(--muted);
    }

    .archive-menu-list {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .archive-menu-section-label {
      font-size: 10px;
      font-family: "IBM Plex Mono", monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      padding: 0 2px;
    }

    .archive-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(10, 18, 25, 0.72);
    }

    .archive-item-meta {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .archive-item-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 600;
    }

    .archive-item-detail {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11px;
      color: var(--muted);
      font-family: "IBM Plex Mono", monospace;
    }

    .archive-item .text-btn {
      padding: 7px 10px;
      font-size: 11px;
      text-transform: lowercase;
      font-family: "IBM Plex Mono", monospace;
    }

    .archive-menu-actions,
    .archive-empty-confirm {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .archive-empty-confirm {

    .starter-btn:not(.active):hover,
    .starter-btn:not(.active):focus-visible {
      background: linear-gradient(180deg, rgba(67, 97, 190, 0.95), rgba(54, 78, 154, 0.95));
      box-shadow: inset 0 0 0 1px rgba(147, 184, 255, 0.16);
      color: var(--text);
    }

    .starter-btn.active:hover,
    .starter-btn.active:focus-visible {
      background: linear-gradient(180deg, rgba(77, 109, 208, 0.98), rgba(60, 85, 172, 0.98));
    }

    .starter-btn-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .overlay-shell {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(4, 9, 14, 0.58);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      z-index: 1200;
    }

    .overlay-shell.open {
      display: flex;
    }

    .overlay-card {
      width: min(560px, 100%);
      max-height: min(720px, calc(var(--app-height) - 48px));
      overflow: auto;
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(14, 24, 34, 0.98), rgba(10, 18, 25, 0.96));
      box-shadow: 0 26px 60px rgba(2, 8, 14, 0.42);
    }

    .confirm-overlay-card {
      width: min(440px, 100%);
    }

    .overlay-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
    }

    .overlay-title {
      display: grid;
      gap: 6px;
    }

    .overlay-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .overlay-section {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(9, 18, 25, 0.62);
    }

    .overlay-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .overlay-actions,
    .overlay-inline-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .settings-action-list {
      display: grid;
      gap: 10px;
    }

    .settings-action-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(147, 184, 207, 0.28);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(12, 23, 32, 0.9), rgba(8, 15, 22, 0.94));
      color: var(--text);
      text-align: left;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .settings-action-btn:hover,
    .settings-action-btn:focus-visible {
      border-color: rgba(56, 189, 248, 0.42);
      box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.16);
      background: linear-gradient(180deg, rgba(15, 30, 42, 0.94), rgba(10, 20, 28, 0.96));
      color: #e6f4ff;
      transform: translateY(-1px);
      outline: none;
    }

    .settings-action-btn.danger-btn:hover,
    .settings-action-btn.danger-btn:focus-visible {
      border-color: rgba(248, 113, 113, 0.42);
      box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.14);
      background: linear-gradient(180deg, rgba(38, 16, 18, 0.9), rgba(24, 10, 12, 0.94));
      color: #ffe4e6;
    }

    .settings-action-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      color: #67e8f9;
    }

    .settings-action-btn.danger-btn .settings-action-icon {
      color: #fca5a5;
    }

    .settings-action-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .overlay-value {
      color: #cbd7e3;
      line-height: 1.55;
      word-break: break-word;
    }

    .overlay-muted {
      color: var(--muted);
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .overlay-message {
      color: #fed7aa;
      font-size: 12px;
      font-family: "IBM Plex Mono", monospace;
    }

    .overlay-message.error {
      color: #fecaca;
    }

    .danger-btn {
      border-color: rgba(248, 113, 113, 0.3);
      color: #fecaca;
    }

    .disabled-note {
      color: var(--muted);
      font-size: 13px;
    }

    html[data-layout-mode="two"] .layout {
      grid-template-columns: 240px 1fr;
      grid-template-areas:
        "projects todo"
        "notes notes";
    }

    html[data-layout-mode="two"] .pane-projects { grid-area: projects; }
    html[data-layout-mode="two"] .todo-stack { grid-area: todo; }
    html[data-layout-mode="two"] .pane-notes { grid-area: notes; }
    html[data-layout-mode="two"] .pane-archive { grid-area: auto; }

    html[data-layout-mode="one"] .shell {
      padding: 10px;
    }

    html[data-layout-mode="one"] .layout {
      min-height: 0;
      height: 100%;
      grid-template-columns: 1fr;
      grid-template-areas: none;
    }

    html[data-layout-mode="one"] .pane-projects,
    html[data-layout-mode="one"] .todo-stack,
    html[data-layout-mode="one"] .pane-notes,
    html[data-layout-mode="one"] .pane-archive {
      grid-area: auto;
    }

    html[data-layout-mode="one"] .layout.archive-view .pane-archive {
      grid-column: 1 / -1;
      grid-row: auto;
    }

    html[data-layout-mode="one"] .pane-projects {
      border-right: none;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    html[data-layout-mode="one"] .pane-projects .pane-head {
      padding: var(--pane-head-pad-y) 12px;
    }

    html[data-layout-mode="one"] .pane-projects .pane-body {
      padding: 0;
    }

    html[data-layout-mode="one"] .layout.empty-app .todo-stack {
      grid-column: auto;
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="layout">
      <section class="pane pane-projects">
        <div class="pane-head">
          <span class="pane-title">/projects</span>
        </div>
        <div class="pane-body">
          <div id="project-tray"></div>
          <div id="project-list" class="project-list"></div>
          <div class="project-pane-footer">
            <div class="archive-menu" id="archive-menu-wrap">
              <button class="text-btn archive-launch-btn" id="archive-menu-toggle" type="button" aria-label="Open archive" title="Open archive">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 8h16"></path>
                  <path d="M6 8V6.8A1.8 1.8 0 0 1 7.8 5h8.4A1.8 1.8 0 0 1 18 6.8V8"></path>
                  <path d="M5 8v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"></path>
                  <path d="M10 12h4"></path>
                </svg>
                <span>archive</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <div class="todo-stack">
        <section class="pane pane-todo">
          <div class="pane-head">
            <span class="pane-title">to-do.md</span>
            <div class="pane-head-actions">
              <span class="muted" id="todo-status">ready</span>
              <button class="icon-btn" id="todo-toggle-header" type="button" aria-label="Convert selected row to header" title="Convert selected row to header (⇧⌘H)" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 6v12"></path>
                  <path d="M16 6v12"></path>
                  <path d="M8 12h8"></path>
                </svg>
              </button>
              <button class="icon-btn" id="todo-copy-selected" type="button" aria-label="Copy to-do.md" title="Copy to-do.md" disabled>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                  <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                </svg>
              </button>
            </div>
          </div>
          <div class="pane-body">
            <div id="task-message"></div>
            <div class="task-list" id="active-task-list"></div>
          </div>
        </section>

        <section class="pane pane-changelog" id="changelog-pane">
          <div class="pane-head">
            <div class="pane-title pane-title-collapsible">
              <button class="pane-title-toggle" id="changelog-toggle" type="button" aria-expanded="true" aria-controls="changelog-body" aria-label="Collapse changelog" title="Collapse changelog">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m7 10 5 5 5-5"></path>
                </svg>
              </button>
              <span>changelog</span>
            </div>
            <div class="pane-head-actions">
              <span class="muted" id="changelog-status"></span>
              <button class="icon-btn" id="changelog-archive" type="button" aria-label="Archive completed tasks" title="Archive completed tasks">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 8h16"></path>
                  <path d="M6 8V6.8A1.8 1.8 0 0 1 7.8 5h8.4A1.8 1.8 0 0 1 18 6.8V8"></path>
                  <path d="M5 8v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8"></path>
                  <path d="M10 12h4"></path>
                </svg>
              </button>
              <button class="icon-btn todo-export-btn" id="changelog-export" type="button" aria-label="Copy changelog" title="Copy changelog">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="7" y="7" width="10" height="10" rx="2.5"></rect>
                  <rect x="11" y="11" width="10" height="10" rx="2.5"></rect>
                </svg>
              </button>
            </div>
          </div>
          <div class="pane-body" id="changelog-body">
            <div class="done-list" id="done-task-list"></div>
          </div>
        </section>
      </div>

      <section class="pane pane-notes">
        <div class="pane-head">
          <span class="pane-title">/docs</span>
          <div class="pane-head-actions">
            <span class="muted" id="note-status"></span>
            <div class="mode-toggle" aria-label="Notes view mode">
              <button class="mode-btn" type="button" data-note-mode="clean" aria-label="Clean view" title="Clean view">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 3h6l5 5v13H8z"></path>
                  <path d="M14 3v5h5"></path>
                  <path d="M10 13h7"></path>
                  <path d="M10 17h7"></path>
                </svg>
              </button>
              <button class="mode-btn" type="button" data-note-mode="markdown" aria-label="Markdown view" title="Markdown view">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m8 8-4 4 4 4"></path>
                  <path d="m16 8 4 4-4 4"></path>
                  <path d="m13 6-2 12"></path>
                </svg>
              </button>
            </div>
            <div class="note-picker" id="note-link-picker-wrap">
              <button class="icon-btn" id="notes-link" type="button" aria-label="Link markdown file" title="Link markdown file">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07L12 5"></path>
                  <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07L12 19"></path>
                </svg>
              </button>
              <div class="note-picker-panel" id="note-link-picker"></div>
            </div>
            <button class="icon-btn" id="notes-add" type="button">+</button>
          </div>
        </div>
        <div class="pane-body">
          <div id="note-message"></div>
          <div id="notes-list" class="notes-list"></div>
        </div>
      </section>

      <section class="pane pane-archive" id="archive-pane">
        <div class="pane-head">
          <span class="pane-title">archive</span>
          <div class="pane-head-actions">
            <span class="muted" id="archive-status"></span>
          </div>
        </div>
        <div class="pane-body">
          <div id="archive-body" class="archive-menu-shell"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="project-settings-overlay"></div>
  <div id="project-archive-overlay"></div>
  <div id="note-archive-overlay"></div>
  <div class="task-input-measure" id="task-input-measure" aria-hidden="true"></div>

  <script id="initial-state" type="application/json">{{ initial_state_json|safe }}</script>
  {% if dev_reload_enabled %}
  <script>
    (() => {
      let currentReloadToken = "{{ dev_reload_token }}";

      async function pollReloadToken() {
        try {
          const response = await fetch("/__dev/reload-token", { cache: "no-store" });
          if (response.ok) {
            const payload = await response.json();
            if (payload.token !== currentReloadToken) {
              window.location.reload();
              return;
            }
          }
        } catch (_error) {
          // Ignore transient failures while the dev server is rebuilding.
        }

        window.setTimeout(pollReloadToken, 1000);
      }

      window.setTimeout(pollReloadToken, 1000);
    })();
  </script>
  {% endif %}
  <script>
    const initialState = JSON.parse(document.getElementById("initial-state").textContent);
    const noteModeKey = "n10e-note-mode";
    const changelogCollapseKey = "n10e-changelog-collapsed";
    const taskSectionCollapseKey = "n10e-task-sections-collapsed";
    const doneTaskSectionCollapseKey = "n10e-done-task-sections-collapsed";
    const isDesktopShell = document.documentElement.dataset.n10eDesktop === "true";
    const layoutModeBreakpoints = Object.freeze({
      oneColumn: 960,
      twoColumn: 1360,
    });
    const state = {
      projects: initialState.projects || [],
      selectedProjectId: initialState.selected_project_id || null,
      workspace: initialState.workspace || null,
      serverPort: initialState.server_port,
      noteMode: localStorage.getItem(noteModeKey) || "markdown",
      changelogCollapsed: localStorage.getItem(changelogCollapseKey) === "true",
      collapsedTaskSections: loadCollapsedTaskSections(),
      collapsedDoneTaskSections: loadCollapsedDoneTaskSections(),
      openNoteId: initialState.workspace?.suggested_open_note_id || null,
      projectTrayMode: null,
      projectInput: "",
      projectSourceInput: "",
      projectPickerFallback: false,
      projectMessage: "",
      taskMessage: "",
      noteMessage: "",
      taskDrafts: [],
      taskEdits: {},
      noteFilePickerOpen: false,
      noteLinkableFiles: [],
      noteLinkableFilesLoaded: false,
      noteFilePickerLoading: false,
      noteTitleEdits: {},
      noteBodyEdits: {},
      noteHtmlEdits: {},
      noteRevisionConflict: null,
      selectedTaskId: null,
      taskTimers: {},
      noteTimers: {},
      todoStatusTimer: null,
      changelogStatusTimer: null,
      noteStatusTimer: null,
      draggedTaskId: null,
      focusTaskId: null,
      focusDraftKey: null,
      focusNoteId: null,
      projectSettingsId: null,
      projectSettingsSourceMode: null,
      projectSettingsSourceInput: "",
      projectSettingsMessage: "",
      projectSettingsPickerFallback: false,
      archiveMenuOpen: false,
      archiveMenuLoading: false,
      archiveItems: [],
      archiveTotalCount: 0,
      archiveEmptyConfirm: false,
      projectArchiveConfirmId: null,
      noteArchiveConfirmId: null,
      emptyAppAction: "local",
      uiRefreshTimer: null,
      uiRefreshInFlight: false,
      pendingRemoteUiState: null,
    };

    const projectTray = document.getElementById("project-tray");
    const projectList = document.getElementById("project-list");
    const archiveMenuWrap = document.getElementById("archive-menu-wrap");
    const archiveMenuToggle = document.getElementById("archive-menu-toggle");
    const archivePane = document.getElementById("archive-pane");
    const archiveStatus = document.getElementById("archive-status");
    const archiveBody = document.getElementById("archive-body");
    const taskMessage = document.getElementById("task-message");
    const noteMessage = document.getElementById("note-message");
    const activeTaskList = document.getElementById("active-task-list");
    const doneTaskList = document.getElementById("done-task-list");
    const notesList = document.getElementById("notes-list");
    const todoStatus = document.getElementById("todo-status");
    const changelogStatus = document.getElementById("changelog-status");
    const noteStatus = document.getElementById("note-status");
    const notesLinkButton = document.getElementById("notes-link");
    const noteLinkPickerWrap = document.getElementById("note-link-picker-wrap");
    const noteLinkPicker = document.getElementById("note-link-picker");
    const todoHeaderToggleButton = document.getElementById("todo-toggle-header");
    const todoCopySelectedButton = document.getElementById("todo-copy-selected");
    const changelogPane = document.getElementById("changelog-pane");
    const changelogToggleButton = document.getElementById("changelog-toggle");
    const changelogArchiveButton = document.getElementById("changelog-archive");
    const changelogExportButton = document.getElementById("changelog-export");
    const layout = document.querySelector(".layout");
    const taskInputMeasure = document.getElementById("task-input-measure");
    const projectSettingsOverlay = document.getElementById("project-settings-overlay");
    const projectArchiveOverlay = document.getElementById("project-archive-overlay");
    const noteArchiveOverlay = document.getElementById("note-archive-overlay");
    const projectsPaneBody = document.querySelector(".pane-projects .pane-body");
    const changelogBody = document.getElementById("changelog-body");
    const notesPaneBody = document.querySelector(".pane-notes .pane-body");
    let taskRowSyncFrame = null;
    if (typeof ResizeObserver !== "undefined") {
      const taskListResizeObserver = new ResizeObserver(() => {
        scheduleTaskRowSync();
      });
      [activeTaskList, doneTaskList].forEach((listNode) => {
        if (listNode) taskListResizeObserver.observe(listNode);
      });
    }
    if (document.fonts?.ready) {
      document.fonts.ready.then(() => {
        scheduleTaskRowSync();
      }).catch(() => {
        // Ignore font readiness failures; resize on render/viewport changes still applies.
      });
    }
    const doneTimestampFormatter = typeof Intl !== "undefined"
      ? new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short"
      })
      : null;
    const shortTimeFormatter = typeof Intl !== "undefined"
      ? new Intl.DateTimeFormat(undefined, {
        hour: "numeric",
        minute: "2-digit"
      })
      : null;
    const scrollRevealTimers = new WeakMap();
    const scrollIndicators = new WeakMap();
    const uiRefreshIntervalMs = 1400;

    changelogExportButton.addEventListener("click", () => {
      exportChangelog();
    });

    changelogArchiveButton.addEventListener("click", () => {
      archiveChangelog();
    });

    todoHeaderToggleButton.addEventListener("pointerdown", (event) => {
      event.preventDefault();
    });

    todoHeaderToggleButton.addEventListener("click", (event) => {
      event.preventDefault();
      const taskId = getSelectedActiveTaskId();
      if (!taskId) return;
      toggleTaskHeading(taskId);
    });

    todoCopySelectedButton.addEventListener("pointerdown", (event) => {
      event.preventDefault();
    });

    todoCopySelectedButton.addEventListener("click", async (event) => {
      event.preventDefault();
      await copySelectedTask();
    });

    changelogToggleButton.addEventListener("click", () => {
      state.changelogCollapsed = !state.changelogCollapsed;
      localStorage.setItem(changelogCollapseKey, String(state.changelogCollapsed));
      renderChangelogPane();
      refreshScrollRevealBindings();
      window.setTimeout(() => {
        refreshScrollRevealBindings();
      }, 240);
    });

    document.getElementById("notes-add").addEventListener("click", async () => {
      if (!state.selectedProjectId) return;
      const response = await fetchJson("/api/notes", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          title: "Untitled note"
        })
      }, "note");
      if (!response) return;
      applyWorkspace(response.workspace, response.created_note_id);
      state.focusNoteId = response.created_note_id;
      render();
    });

    notesLinkButton.addEventListener("click", async (event) => {
      event.preventDefault();
      if (notesLinkButton.disabled) return;
      if (state.noteFilePickerOpen) {
        closeNoteFilePicker();
        return;
      }
      state.noteFilePickerOpen = true;
      renderNoteFilePicker();
      if (!state.noteLinkableFilesLoaded && !state.noteFilePickerLoading) {
        await loadLinkableNoteFiles();
      }
      renderNoteFilePicker();
    });

    archiveMenuToggle.addEventListener("click", async (event) => {
      event.preventDefault();
      if (state.archiveMenuOpen) {
        closeArchiveMenu();
        return;
      }
      state.projectTrayMode = null;
      state.archiveMenuOpen = true;
      state.archiveEmptyConfirm = false;
      render();
      await loadArchiveMenu();
    });

    document.querySelectorAll("[data-note-mode]").forEach((button) => {
      button.addEventListener("click", async () => {
        const nextMode = button.dataset.noteMode;
        if (nextMode === state.noteMode) return;
        await saveOpenNote();
        state.noteMode = nextMode;
        localStorage.setItem(noteModeKey, nextMode);
        render();
      });
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        scheduleUiRefresh(50);
      }
    });

    document.addEventListener("focusout", () => {
      window.setTimeout(() => {
        flushPendingRemoteUiState();
      }, 0);
    });

    document.addEventListener("click", async (event) => {
      if (state.noteFilePickerOpen && !event.target.closest("#note-link-picker-wrap")) {
        closeNoteFilePicker();
      }

      const emptyAction = event.target.closest("[data-empty-action]");
      if (emptyAction) {
        const action = emptyAction.dataset.emptyAction;
        state.emptyAppAction = action;
        updateStarterButtons();
        state.projectMessage = "";
        state.projectInput = "";
        state.projectSourceInput = "";
        state.projectPickerFallback = false;

        if (action === "local") {
          state.projectTrayMode = null;
          render();
          await pickLocalDirectory();
          return;
        }

        if (action === "new") {
          state.projectTrayMode = "new";
          render();
          return;
        }

      }

      const chooserBtn = event.target.closest("[data-project-chooser]");
      if (chooserBtn) {
        const mode = chooserBtn.dataset.projectChooser;
        state.projectInput = "";
        state.projectSourceInput = "";
        state.projectPickerFallback = false;
        if (mode === "local") {
          state.projectTrayMode = null;
          render();
          await pickLocalDirectory();
          return;
        }
        state.projectTrayMode = mode;
        render();
        return;
      }

      if (event.target.closest("[data-project-tray-cancel]")) {
        state.projectTrayMode = null;
        state.projectInput = "";
        state.projectSourceInput = "";
        state.projectPickerFallback = false;
        render();
        return;
      }

      const projectMenuButton = event.target.closest("[data-project-menu-id]");
      if (projectMenuButton) {
        event.preventDefault();
        event.stopPropagation();
        openProjectSettings(projectMenuButton.dataset.projectMenuId);
        return;
      }

      const projectAddButton = event.target.closest("[data-project-add]");
      if (projectAddButton) {
        event.preventDefault();
        event.stopPropagation();
        closeArchiveMenu();
        state.projectMessage = "";
        state.projectTrayMode = state.projectTrayMode ? null : "chooser";
        render();
        return;
      }

      const projectButton = event.target.closest("[data-project-select-id]");
      if (projectButton) {
        const projectId = projectButton.dataset.projectSelectId;
        closeArchiveMenu();
        await selectProject(projectId);
        return;
      }

      const doneSectionToggle = event.target.closest("[data-done-section-toggle-id]");
      if (doneSectionToggle) {
        event.preventDefault();
        event.stopPropagation();
        toggleDoneTaskSection(doneSectionToggle.dataset.doneSectionToggleId);
        return;
      }

      const doneRow = event.target.closest("[data-done-row-id]");
      if (doneRow && !event.target.closest("[data-done-check-id]")) {
        const doneCheck = doneRow.querySelector("[data-done-check-id]");
        if (doneCheck) {
          event.preventDefault();
          doneCheck.checked = !doneCheck.checked;
          doneCheck.dispatchEvent(new Event("change", { bubbles: true }));
          return;
        }
      }

      const taskGroupCompleteButton = event.target.closest("[data-task-group-complete-id]");
      if (taskGroupCompleteButton) {
        event.preventDefault();
        event.stopPropagation();
        await toggleTask(taskGroupCompleteButton.dataset.taskGroupCompleteId, "done");
        return;
      }

      const taskDeleteButton = event.target.closest("[data-task-delete-id]");
      if (taskDeleteButton) {
        event.preventDefault();
        event.stopPropagation();
        await deleteTask(taskDeleteButton.dataset.taskDeleteId);
        return;
      }

      const taskSectionToggle = event.target.closest("[data-task-section-toggle-id]");
      if (taskSectionToggle) {
        event.preventDefault();
        event.stopPropagation();
        toggleTaskSection(taskSectionToggle.dataset.taskSectionToggleId);
        return;
      }

      const taskSectionCopyButton = event.target.closest("[data-task-section-copy-id]");
      if (taskSectionCopyButton) {
        event.preventDefault();
        event.stopPropagation();
        await copyTaskSection(taskSectionCopyButton.dataset.taskSectionCopyId);
        return;
      }

      const settingsClose = event.target.closest("[data-project-settings-close]");
      const settingsBackdrop = event.target instanceof HTMLElement
        ? event.target.dataset.projectSettingsBackdrop === "true"
        : false;
      if (settingsClose || settingsBackdrop) {
        closeProjectSettings();
        return;
      }

      const settingsAction = event.target.closest("[data-project-settings-action]");
      if (settingsAction) {
        const action = settingsAction.dataset.projectSettingsAction;

        if (action === "open-source") {
          await openProjectSource();
          return;
        }

        if (action === "open-task-sync-file") {
          await openManagedTaskSyncFile();
          return;
        }

        if (
          action === "enable-task-sync"
          || action === "pause-task-sync"
          || action === "resume-task-sync"
          || action === "resolve-task-sync-file"
          || action === "resolve-task-sync-local"
        ) {
          await performManagedTaskSyncAction(action);
          return;
        }

        if (action === "link-local") {
          state.projectSettingsSourceMode = "local";
          state.projectSettingsSourceInput = "";
          state.projectSettingsPickerFallback = false;
          renderProjectSettings();
          await pickProjectSettingsDirectory();
          return;
        }

        if (action === "cancel-link") {
          state.projectSettingsSourceMode = null;
          state.projectSettingsSourceInput = "";
          state.projectSettingsPickerFallback = false;
          renderProjectSettings();
          return;
        }

        if (action === "save-link") {
          await saveProjectSourceLink();
          return;
        }

        if (action === "sync-project") {
          await syncProjectFromSettings();
          return;
        }

        if (action === "archive-project") {
          openProjectArchiveConfirm();
          return;
        }
      }

      const projectArchiveClose = event.target.closest("[data-project-archive-close]");
      const projectArchiveBackdrop = event.target instanceof HTMLElement
        ? event.target.dataset.projectArchiveBackdrop === "true"
        : false;
      if (projectArchiveClose || projectArchiveBackdrop) {
        closeProjectArchiveConfirm();
        return;
      }

      const projectArchiveConfirm = event.target.closest("[data-project-archive-confirm]");
      if (projectArchiveConfirm) {
        event.preventDefault();
        event.stopPropagation();
        await confirmProjectArchive();
        return;
      }

      const archiveRestoreButton = event.target.closest("[data-archive-restore-id]");
      if (archiveRestoreButton) {
        event.preventDefault();
        event.stopPropagation();
        await restoreArchivedEntity(
          archiveRestoreButton.dataset.archiveRestoreId,
          archiveRestoreButton.dataset.archiveRestoreRevision
        );
        return;
      }

      const archiveEmptyTrigger = event.target.closest("[data-archive-empty-trigger]");
      if (archiveEmptyTrigger) {
        event.preventDefault();
        event.stopPropagation();
        state.archiveEmptyConfirm = true;
        renderArchivePane();
        return;
      }

      const archiveEmptyCancel = event.target.closest("[data-archive-empty-cancel]");
      if (archiveEmptyCancel) {
        event.preventDefault();
        event.stopPropagation();
        state.archiveEmptyConfirm = false;
        renderArchivePane();
        return;
      }

      const archiveEmptyConfirm = event.target.closest("[data-archive-empty-confirm]");
      if (archiveEmptyConfirm) {
        event.preventDefault();
        event.stopPropagation();
        await emptyArchive();
        return;
      }

      const noteLinkSelection = event.target.closest("[data-note-link-select]");
      if (noteLinkSelection) {
        event.preventDefault();
        event.stopPropagation();
        await linkSelectedNoteFile(noteLinkSelection.dataset.noteLinkSelect);
        return;
      }

      const noteRevisionAction = event.target.closest("[data-note-revision-action]");
      if (noteRevisionAction) {
        event.preventDefault();
        event.stopPropagation();
        await resolveNoteRevisionConflict(
          noteRevisionAction.dataset.noteRevisionId,
          noteRevisionAction.dataset.noteRevisionAction
        );
        return;
      }

      const noteArchiveClose = event.target.closest("[data-note-archive-close]");
      const noteArchiveBackdrop = event.target instanceof HTMLElement
        ? event.target.dataset.noteArchiveBackdrop === "true"
        : false;
      if (noteArchiveClose || noteArchiveBackdrop) {
        closeNoteArchiveConfirm();
        return;
      }

      const noteArchiveConfirm = event.target.closest("[data-note-archive-confirm]");
      if (noteArchiveConfirm) {
        await confirmNoteArchive();
        return;
      }

      const noteAction = event.target.closest("[data-note-action]");
      if (noteAction) {
        const action = noteAction.dataset.noteAction;
        if (action === "copy") {
          event.preventDefault();
          event.stopPropagation();
          await copyNote(noteAction.dataset.noteActionId);
          return;
        }
        if (action === "archive") {
          openNoteArchiveConfirm(noteAction.dataset.noteActionId);
          return;
        }
        if (action === "resolve-file") {
          event.preventDefault();
          event.stopPropagation();
          await resolveNoteSync(noteAction.dataset.noteActionId, "file");
          return;
        }
        if (action === "resolve-local") {
          event.preventDefault();
          event.stopPropagation();
          await resolveNoteSync(noteAction.dataset.noteActionId, "local");
          return;
        }
      }

      const noteToggle = event.target.closest("[data-note-id]");
      if (noteToggle && noteToggle.dataset.noteToggle === "true") {
        const noteId = noteToggle.dataset.noteId;
        if (state.openNoteId === noteId) {
          state.openNoteId = null;
        } else {
          await saveOpenNote();
          state.openNoteId = noteId;
        }
        render();
        return;
      }

      const toolbarButton = event.target.closest("[data-rich-command]");
      if (toolbarButton) {
        handleRichCommand(toolbarButton.dataset.richCommand);
      }
    });

    document.addEventListener("mouseover", (event) => {
      const emptyAction = event.target.closest("[data-empty-action]");
      if (!emptyAction) return;
      state.emptyAppAction = emptyAction.dataset.emptyAction;
      updateStarterButtons();
    });

    document.addEventListener("focusin", (event) => {
      const emptyAction = event.target.closest("[data-empty-action]");
      if (!emptyAction) return;
      state.emptyAppAction = emptyAction.dataset.emptyAction;
      updateStarterButtons();
    });

    document.addEventListener("focusin", (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        setSelectedTaskId(taskInput.dataset.taskId);
        const task = findTask(taskInput.dataset.taskId);
        expandHeadingInput(taskInput, state.taskEdits[taskInput.dataset.taskId] ?? task?.title ?? taskInput.value);
        return;
      }

      if (!event.target.closest("#todo-toggle-header, #todo-copy-selected")) {
        setSelectedTaskId(null);
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        expandHeadingInput(draftInput, draft?.title ?? draftInput.value);
      }
    });

    document.addEventListener("input", (event) => {
      const projectTitleInput = event.target.closest("[data-project-title-input]");
      if (projectTitleInput) {
        state.projectInput = projectTitleInput.value;
        return;
      }

      const projectSourceInput = event.target.closest("[data-project-source-input]");
      if (projectSourceInput) {
        state.projectSourceInput = projectSourceInput.value;
        return;
      }

      const projectSettingsSourceInput = event.target.closest("[data-project-settings-source]");
      if (projectSettingsSourceInput) {
        state.projectSettingsSourceInput = projectSettingsSourceInput.value;
        return;
      }

      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        const taskId = taskInput.dataset.taskId;
        const title = normalizeTaskEditorValue(taskInput.value);
        if (taskInput.value !== title) taskInput.value = title;
        syncTaskRowFromInput(taskInput);
        state.taskEdits[taskId] = title;
        debounceTaskSave(taskId);
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        const title = normalizeTaskEditorValue(draftInput.value);
        if (draftInput.value !== title) draftInput.value = title;
        syncTaskRowFromInput(draftInput);
        if (draft) draft.title = title;
        return;
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        state.noteTitleEdits[noteTitle.dataset.noteTitleId] = noteTitle.value;
        debounceNoteSave(noteTitle.dataset.noteTitleId);
        return;
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        state.noteBodyEdits[markdownBody.dataset.noteBodyId] = markdownBody.value;
        debounceNoteSave(markdownBody.dataset.noteBodyId);
        return;
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        state.noteHtmlEdits[cleanEditor.dataset.noteCleanId] = cleanEditor.innerHTML;
        debounceNoteSave(cleanEditor.dataset.noteCleanId);
      }
    });

    document.addEventListener("keydown", async (event) => {
      if (state.archiveMenuOpen && event.key === "Escape") {
        event.preventDefault();
        closeArchiveMenu();
        return;
      }

      if (state.projectArchiveConfirmId && event.key === "Escape") {
        event.preventDefault();
        closeProjectArchiveConfirm();
        return;
      }

      if (state.noteArchiveConfirmId && event.key === "Escape") {
        event.preventDefault();
        closeNoteArchiveConfirm();
        return;
      }

      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        if (isHeaderShortcut(event)) {
          event.preventDefault();
          toggleTaskHeading(taskInput.dataset.taskId);
        } else if (event.key === "Enter") {
          event.preventDefault();
          const taskId = taskInput.dataset.taskId;
          await saveTask(taskId);
          if (isTaskSectionCollapsed(taskId)) {
            setTaskSectionCollapsed(taskId, false);
          }
          insertDraftAfter(taskId);
          render();
        }
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draftKey = draftInput.dataset.taskDraftKey;
        const draft = getDraft(draftKey);
        if (!draft) return;

        if (isHeaderShortcut(event)) {
          event.preventDefault();
          toggleDraftHeading(draftKey);
        } else if (event.key === "Enter") {
          event.preventDefault();
          await commitDraftTask(draft);
        } else if (event.key === "Backspace" && !draft.title) {
          removeDraft(draftKey);
          render();
        } else if (event.key === "Escape") {
          removeDraft(draftKey);
          render();
        }
        return;
      }

      const projectInput = event.target.closest("[data-project-title-input], [data-project-source-input]");
      if (projectInput && event.key === "Enter") {
        event.preventDefault();
        if (state.projectTrayMode === "new") {
          await submitProjectCreate("new", state.projectInput, null);
        } else if (state.projectTrayMode === "local" && state.projectPickerFallback) {
          await submitProjectCreate("local", state.projectInput, state.projectSourceInput);
        }
      }

      const projectSettingsInput = event.target.closest("[data-project-settings-source]");
      if (projectSettingsInput) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeProjectSettings();
        } else if (event.key === "Enter") {
          event.preventDefault();
          if (projectSettingsInput.hasAttribute("data-project-settings-source")) {
            await saveProjectSourceLink();
          }
        }
      }
    });

    document.addEventListener("blur", async (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        await saveTask(taskInput.dataset.taskId);
        const task = findTask(taskInput.dataset.taskId);
        collapseHeadingInput(taskInput, state.taskEdits[taskInput.dataset.taskId] ?? task?.title ?? taskInput.value);
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draftKey = draftInput.dataset.taskDraftKey;
        window.setTimeout(async () => {
          const draft = getDraft(draftKey);
          if (!draft) return;
          if (draft.title.trim()) {
            await commitDraftTask(draft);
            return;
          }
          removeDraft(draft.key);
          render();
        }, 0);
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        await saveNote(noteTitle.dataset.noteTitleId);
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        await saveNote(markdownBody.dataset.noteBodyId);
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        await saveNote(cleanEditor.dataset.noteCleanId);
      }
    }, true);

    document.addEventListener("change", async (event) => {
      const taskCheck = event.target.closest("[data-task-check-id]");
      if (taskCheck) {
        await toggleTask(taskCheck.dataset.taskCheckId, taskCheck.checked ? "done" : "todo");
        return;
      }

      const doneCheck = event.target.closest("[data-done-check-id]");
      if (doneCheck) {
        await toggleTask(doneCheck.dataset.doneCheckId, doneCheck.checked ? "done" : "todo");
      }
    });

    document.addEventListener("dragstart", (event) => {
      const dragOrigin = event.target instanceof Element ? event.target : null;
      if (!dragOrigin) return;
      const dragHandle = dragOrigin.closest(".task-input, .task-check, .task-delete-btn, .task-copy-btn, .task-section-toggle, .task-heading-complete-btn");
      if (dragHandle) {
        event.preventDefault();
        return;
      }
      const row = dragOrigin.closest("[data-draggable-task-id]");
      if (!row) return;
      state.draggedTaskId = row.dataset.draggableTaskId;
      row.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", state.draggedTaskId);
    });

    document.addEventListener("dragend", (event) => {
      const dragOrigin = event.target instanceof Element ? event.target : null;
      const row = dragOrigin ? dragOrigin.closest("[data-draggable-task-id]") : null;
      if (row) row.classList.remove("dragging");
      state.draggedTaskId = null;
      clearTaskDropIndicator();
    });

    document.addEventListener("dragover", (event) => {
      if (!state.draggedTaskId) return;
      const taskList = event.target.closest("#active-task-list");
      if (!taskList) {
        clearTaskDropIndicator();
        return;
      }

      const dropLocation = resolveTaskDropLocation(event.clientY);
      if (!dropLocation) {
        clearTaskDropIndicator();
        return;
      }

      event.preventDefault();
      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = "move";
      }
      setTaskDropIndicator(dropLocation.taskId, dropLocation.position);
    });

    document.addEventListener("drop", async (event) => {
      const taskList = event.target.closest("#active-task-list");
      if (!taskList || !state.draggedTaskId || !state.workspace) return;
      event.preventDefault();
      const dropLocation = resolveTaskDropLocation(event.clientY);
      clearTaskDropIndicator();
      if (!dropLocation || dropLocation.taskId === state.draggedTaskId) return;

      const activeIds = state.workspace.active_tasks.map((task) => task.id);
      const fromIndex = activeIds.indexOf(state.draggedTaskId);
      if (fromIndex === -1) return;

      const [movedTaskId] = activeIds.splice(fromIndex, 1);
      const targetIndex = activeIds.indexOf(dropLocation.taskId);
      if (targetIndex === -1) return;
      const insertionIndex = dropLocation.position === "after"
        ? targetIndex + 1
        : targetIndex;
      activeIds.splice(insertionIndex, 0, movedTaskId);

      const response = await fetchJson("/api/tasks/reorder", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          ordered_active_task_ids: activeIds
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response);
      render();
    });

    function isAlternateProjectViewOpen() {
      return Boolean(state.projectTrayMode || state.archiveMenuOpen || state.archiveEmptyConfirm);
    }

    async function selectProject(projectId) {
      if (state.selectedProjectId === projectId) {
        if (!isAlternateProjectViewOpen()) return;
        closeArchiveMenu();
        state.projectTrayMode = null;
        render();
        return;
      }
      await saveOpenNote();
      const workspace = await fetchJson(`/api/projects/${projectId}/workspace`, {}, "project");
      if (!workspace) return;
      closeArchiveMenu();
      state.noteLinkableFiles = [];
      state.noteLinkableFilesLoaded = false;
      state.noteFilePickerLoading = false;
      state.noteFilePickerOpen = false;
      state.selectedProjectId = projectId;
      applyWorkspace(workspace);
      state.taskDrafts = [];
      state.projectTrayMode = null;
      syncLocation();
      render();
    }

    async function submitProjectCreate(mode, title, sourceLocator) {
      const response = await fetchJson("/api/projects", {
        method: "POST",
        body: JSON.stringify({
          mode,
          title: title || null,
          source_locator: sourceLocator || null
        })
      }, "project");
      if (!response) return;
      applyUiState(response);
      state.projectTrayMode = null;
      state.projectInput = "";
      state.projectSourceInput = "";
      state.projectPickerFallback = false;
      render();
    }

    function closeArchiveMenu() {
      if (!state.archiveMenuOpen && !state.archiveEmptyConfirm) return;
      state.archiveMenuOpen = false;
      state.archiveEmptyConfirm = false;
      render();
    }

    async function loadArchiveMenu() {
      state.archiveMenuLoading = true;
      renderArchivePane();
      const response = await fetchJson("/api/archive", {}, "project");
      state.archiveMenuLoading = false;
      if (!response) {
        renderArchivePane();
        return;
      }

      state.archiveItems = Array.isArray(response.items) ? response.items : [];
      state.archiveTotalCount = Number.isFinite(response.total_count) ? response.total_count : 0;
      renderArchivePane();
    }

    function applyArchiveMutation(response) {
      if (!response) return false;
      state.archiveItems = Array.isArray(response.archive?.items) ? response.archive.items : [];
      state.archiveTotalCount = Number.isFinite(response.archive?.total_count)
        ? response.archive.total_count
        : 0;
      state.archiveEmptyConfirm = false;
      if (response.ui_state) {
        applyUiState(response.ui_state);
      }
      return true;
    }

    async function restoreArchivedEntity(entityId, expectedRevision) {
      if (!entityId || !expectedRevision) return;
      const response = await fetchJson(`/api/archive/${entityId}/restore`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: expectedRevision,
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!applyArchiveMutation(response)) return;
      render();
    }

    async function emptyArchive() {
      const response = await fetchJson("/api/archive/empty", {
        method: "POST",
        body: JSON.stringify({
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!applyArchiveMutation(response)) return;
      render();
    }

    function renderArchiveMenu() {
      archiveMenuToggle.classList.toggle("active", state.archiveMenuOpen);
      archiveMenuToggle.setAttribute("aria-pressed", state.archiveMenuOpen ? "true" : "false");
      archiveMenuToggle.title = state.archiveMenuOpen ? "Close archive" : "Open archive";
      archiveMenuToggle.setAttribute(
        "aria-label",
        state.archiveMenuOpen ? "Close archive" : "Open archive"
      );
    }

    function renderArchivePane() {
      archivePane.setAttribute("aria-hidden", state.archiveMenuOpen ? "false" : "true");

      if (!state.archiveMenuOpen) {
        archiveStatus.textContent = "";
        archiveBody.innerHTML = "";
        return;
      }

      if (state.archiveMenuLoading) {
        archiveStatus.textContent = "loading…";
        archiveBody.innerHTML = `<div class="empty-state">Loading archive…</div>`;
        return;
      }

      let previousType = null;
      const itemsMarkup = state.archiveItems.map((item) => {
        const showSection = item.entity_type !== previousType;
        previousType = item.entity_type;
        const sectionLabel = item.entity_type === "project"
          ? "projects"
          : item.entity_type === "task"
            ? "tasks"
            : "notes";
        const detailParts = [item.context_label, item.detail_label].filter(Boolean);

        return `
          ${showSection ? `<div class="archive-menu-section-label">${escapeHtml(sectionLabel)}</div>` : ""}
          <div class="archive-item">
            <div class="archive-item-meta">
              <div class="archive-item-title">${escapeHtml(item.title || "Untitled")}</div>
              <div class="archive-item-detail">${escapeHtml(detailParts.join(" | "))}</div>
            </div>
            <button
              class="text-btn"
              type="button"
              data-archive-restore-id="${escapeAttribute(item.id)}"
              data-archive-restore-revision="${escapeAttribute(item.revision)}"
            >
              restore
            </button>
          </div>
        `;
      }).join("");

      const totalLabel = state.archiveTotalCount === 1
        ? "1 item"
        : `${state.archiveTotalCount} items`;
      archiveStatus.textContent = totalLabel;

      const emptyStateMarkup = state.archiveItems.length
        ? ""
        : `<div class="empty-state">Archive is empty.</div>`;
      const actionsMarkup = state.archiveTotalCount === 0
        ? ""
        : (state.archiveEmptyConfirm
          ? `
            <div class="archive-empty-confirm">
              <span>Delete ${escapeHtml(totalLabel)} permanently?</span>
              <button class="text-btn" type="button" data-archive-empty-cancel>cancel</button>
              <button class="text-btn danger-btn" type="button" data-archive-empty-confirm>empty archive</button>
            </div>
          `
          : `
            <div class="archive-menu-actions">
              <button class="text-btn danger-btn" type="button" data-archive-empty-trigger>empty archive</button>
            </div>
          `);

      archiveBody.innerHTML = `
        ${state.projectMessage ? `<div class="message error">${escapeHtml(state.projectMessage)}</div>` : ""}
        <div class="archive-menu-list">
          ${itemsMarkup}
        </div>
        ${emptyStateMarkup}
        ${actionsMarkup}
      `;
    }

    async function pickLocalDirectory() {
      const response = await fetchJson("/api/system/pick-directory", {
        method: "POST"
      }, "project", true);
      if (!response) {
        if (isDirectoryPickerCanceled(state.projectMessage)) {
          state.projectMessage = "";
          state.projectSettingsMessage = "";
          return;
        }
        state.projectPickerFallback = true;
        render();
        return;
      }
      await submitProjectCreate("local", "", response.path);
    }

    async function commitDraftTask(draft) {
      const response = await fetchJson("/api/tasks", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          title: draft.title,
          after_task_id: draft.afterTaskId
        })
      }, "task");
      if (!response) return;
      removeDraft(draft.key);
      applyWorkspace(response.workspace);
      insertDraftAfter(response.created_task_id);
      render();
    }

    async function toggleTask(taskId, status) {
      const task = findTask(taskId);
      if (!task) return;
      const response = await fetchJson(`/api/tasks/${taskId}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: task.revision,
          status
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response.workspace);
      render({ preserveShellScroll: true });
    }

    async function saveTask(taskId) {
      if (!Object.prototype.hasOwnProperty.call(state.taskEdits, taskId)) return;
      const task = findTask(taskId);
      if (!task) return;
      const title = state.taskEdits[taskId];
      if (title === task.title) {
        delete state.taskEdits[taskId];
        return;
      }
      const response = await fetchJson(`/api/tasks/${taskId}`, {
        method: "PATCH",
        body: JSON.stringify({
          expected_revision: task.revision,
          title
        })
      }, "task");
      if (!response) return;
      delete state.taskEdits[taskId];
      state.workspace = response.workspace;
      todoStatus.textContent = "saved";
      const activeElement = document.activeElement instanceof HTMLElement
        ? document.activeElement.closest("[data-task-id]")
        : null;
      if (!activeElement || activeElement.dataset.taskId !== taskId) {
        render();
      }
    }

    async function saveOpenNote() {
      if (!state.openNoteId) return;
      await saveNote(state.openNoteId);
    }

    function closeNoteFilePicker() {
      if (!state.noteFilePickerOpen) return;
      state.noteFilePickerOpen = false;
      renderNoteFilePicker();
    }

    async function loadLinkableNoteFiles() {
      if (!state.selectedProjectId) return;
      const projectId = state.selectedProjectId;
      state.noteFilePickerLoading = true;
      renderNoteFilePicker();
      const response = await fetchJson(`/api/projects/${projectId}/notes/linkable-files`, {}, "note");
      state.noteFilePickerLoading = false;
      if (!response) {
        renderNoteFilePicker();
        return;
      }
      if (state.selectedProjectId !== projectId) {
        renderNoteFilePicker();
        return;
      }
      state.noteLinkableFiles = Array.isArray(response) ? response : [];
      state.noteLinkableFilesLoaded = true;
      renderNoteFilePicker();
    }

    async function linkSelectedNoteFile(relativePath) {
      if (!state.selectedProjectId || !relativePath) return;
      const response = await fetchJson(`/api/projects/${state.selectedProjectId}/notes/link-file`, {
        method: "POST",
        body: JSON.stringify({
          relative_path: relativePath
        })
      }, "note");
      if (!response) return;
      applyWorkspace(response.workspace, response.created_note_id);
      state.focusNoteId = response.created_note_id;
      closeNoteFilePicker();
      render();
    }

    async function resolveNoteSync(noteId, source) {
      if (!state.workspace) return;
      const saved = await saveNote(noteId);
      if (!saved || !state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return;
      const endpoint = source === "file" ? "resolve-file" : "resolve-local";
      const response = await fetchJson(`/api/notes/${noteId}/sync/${endpoint}`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: note.revision
        })
      }, "note");
      if (!response) return;
      applyWorkspace(response.workspace, response.created_note_id || noteId);
      render();
    }

    async function deleteTask(taskId) {
      const task = findTask(taskId);
      if (!task) return;

      clearTimeout(state.taskTimers[taskId]);
      delete state.taskTimers[taskId];
      delete state.taskEdits[taskId];

      const response = await fetchJson(`/api/tasks/${taskId}/archive`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: task.revision
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response.workspace);
      render();
    }

    async function archiveNote(noteId) {
      if (!state.workspace) return;

      clearTimeout(state.noteTimers[noteId]);
      delete state.noteTimers[noteId];

      const saved = await saveNote(noteId);
      if (!saved || !state.workspace) return;

      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return;

      delete state.noteTitleEdits[noteId];
      delete state.noteBodyEdits[noteId];
      delete state.noteHtmlEdits[noteId];

      const response = await fetchJson(`/api/notes/${noteId}/archive`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: note.revision
        })
      }, "note");
      if (!response) return;
      applyWorkspace(response.workspace);
      noteMessage.innerHTML = "";
      render();
    }

    function openNoteArchiveConfirm(noteId) {
      if (!state.workspace) return;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return;
      state.noteArchiveConfirmId = noteId;
      renderNoteArchiveConfirm();
    }

    function closeNoteArchiveConfirm() {
      if (!state.noteArchiveConfirmId) return;
      state.noteArchiveConfirmId = null;
      renderNoteArchiveConfirm();
    }

    async function confirmNoteArchive() {
      const noteId = state.noteArchiveConfirmId;
      if (!noteId) return;
      closeNoteArchiveConfirm();
      await archiveNote(noteId);
    }

    async function patchNoteRequest(noteId, expectedRevision, title, body) {
      try {
        const response = await fetch(`/api/notes/${noteId}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            expected_revision: expectedRevision,
            title,
            body
          })
        });
