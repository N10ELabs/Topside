        event.preventDefault();
        event.stopPropagation();
        state.archiveEmptyConfirm = true;
        renderArchivePane();
        return;
      }

      const archiveEmptyCancel = event.target.closest("[data-archive-empty-cancel]");
      if (archiveEmptyCancel) {
        event.preventDefault();
        event.stopPropagation();
        state.archiveEmptyConfirm = false;
        renderArchivePane();
        return;
      }

      const archiveEmptyConfirm = event.target.closest("[data-archive-empty-confirm]");
      if (archiveEmptyConfirm) {
        event.preventDefault();
        event.stopPropagation();
        await emptyArchive();
        return;
      }

      const noteLinkSelection = event.target.closest("[data-note-link-select]");
      if (noteLinkSelection) {
        event.preventDefault();
        event.stopPropagation();
        await linkSelectedNoteFile(noteLinkSelection.dataset.noteLinkSelect);
        return;
      }

      const noteRevisionAction = event.target.closest("[data-note-revision-action]");
      if (noteRevisionAction) {
        event.preventDefault();
        event.stopPropagation();
        await resolveNoteRevisionConflict(
          noteRevisionAction.dataset.noteRevisionId,
          noteRevisionAction.dataset.noteRevisionAction
        );
        return;
      }

      const noteArchiveClose = event.target.closest("[data-note-archive-close]");
      const noteArchiveBackdrop = event.target instanceof HTMLElement
        ? event.target.dataset.noteArchiveBackdrop === "true"
        : false;
      if (noteArchiveClose || noteArchiveBackdrop) {
        closeNoteArchiveConfirm();
        return;
      }

      const noteArchiveConfirm = event.target.closest("[data-note-archive-confirm]");
      if (noteArchiveConfirm) {
        await confirmNoteArchive();
        return;
      }

      const noteAction = event.target.closest("[data-note-action]");
      if (noteAction) {
        const action = noteAction.dataset.noteAction;
        if (action === "copy") {
          event.preventDefault();
          event.stopPropagation();
          await copyNote(noteAction.dataset.noteActionId);
          return;
        }
        if (action === "archive") {
          openNoteArchiveConfirm(noteAction.dataset.noteActionId);
          return;
        }
        if (action === "resolve-file") {
          event.preventDefault();
          event.stopPropagation();
          await resolveNoteSync(noteAction.dataset.noteActionId, "file");
          return;
        }
        if (action === "resolve-local") {
          event.preventDefault();
          event.stopPropagation();
          await resolveNoteSync(noteAction.dataset.noteActionId, "local");
          return;
        }
      }

      const noteToggle = event.target.closest("[data-note-id]");
      if (noteToggle && noteToggle.dataset.noteToggle === "true") {
        const noteId = noteToggle.dataset.noteId;
        if (state.openNoteId === noteId) {
          state.openNoteId = null;
          state.pendingNoteSearchJump = null;
          resetNoteSearchNavigationState();
        } else {
          await saveOpenNote();
          state.openNoteId = noteId;
          const query = String(state.notesSearchQuery || "").trim();
          resetNoteSearchNavigationState();
          state.pendingNoteSearchJump = query
            ? { noteId, query, retriesRemaining: 1 }
            : null;
        }
        render();
        return;
      }

      const toolbarButton = event.target.closest("[data-rich-command]");
      if (toolbarButton) {
        handleRichCommand(toolbarButton.dataset.richCommand);
      }
    });

    document.addEventListener("mouseover", (event) => {
      const emptyAction = event.target.closest("[data-empty-action]");
      if (!emptyAction) return;
      state.emptyAppAction = emptyAction.dataset.emptyAction;
      updateStarterButtons();
    });

    document.addEventListener("focusin", (event) => {
      const emptyAction = event.target.closest("[data-empty-action]");
      if (!emptyAction) return;
      state.emptyAppAction = emptyAction.dataset.emptyAction;
      updateStarterButtons();
    });

    document.addEventListener("focusin", (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        setSelectedTaskId(taskInput.dataset.taskId);
        const task = findTask(taskInput.dataset.taskId);
        expandHeadingInput(taskInput, state.taskEdits[taskInput.dataset.taskId] ?? task?.title ?? taskInput.value);
        return;
      }

      if (!event.target.closest("#todo-toggle-header, #todo-toggle-sections, #todo-sort-priority, #todo-copy-selected")) {
        setSelectedTaskId(null);
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        expandHeadingInput(draftInput, draft?.title ?? draftInput.value);
      }
    });

    document.addEventListener("input", (event) => {
      const projectTitleInput = event.target.closest("[data-project-title-input]");
      if (projectTitleInput) {
        state.projectInput = projectTitleInput.value;
        return;
      }

      const projectSourceInput = event.target.closest("[data-project-source-input]");
      if (projectSourceInput) {
        state.projectSourceInput = projectSourceInput.value;
        return;
      }

      const projectSettingsSourceInput = event.target.closest("[data-project-settings-source]");
      if (projectSettingsSourceInput) {
        state.projectSettingsSourceInput = projectSettingsSourceInput.value;
        return;
      }

      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        const taskId = taskInput.dataset.taskId;
        const currentTitle = state.taskEdits[taskId] ?? findTask(taskId)?.title ?? "";
        const wasHeading = isMarkdownTaskHeading(currentTitle);
        const title = normalizeTaskEditorValue(taskInput.value);
        if (taskInput.value !== title) taskInput.value = title;
        syncTaskRowFromInput(taskInput);
        state.taskEdits[taskId] = title;
        debounceTaskSave(taskId);
        if (wasHeading !== isMarkdownTaskHeading(title)) {
          state.focusTaskId = taskId;
          render();
        }
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draft = getDraft(draftInput.dataset.taskDraftKey);
        const wasHeading = isMarkdownTaskHeading(draft?.title ?? draftInput.value);
        const title = normalizeTaskEditorValue(draftInput.value);
        if (draftInput.value !== title) draftInput.value = title;
        syncTaskRowFromInput(draftInput);
        if (draft) draft.title = title;
        if (draft && wasHeading !== isMarkdownTaskHeading(title)) {
          state.focusDraftKey = draft.key;
          render();
        }
        return;
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        state.noteTitleEdits[noteTitle.dataset.noteTitleId] = noteTitle.value;
        debounceNoteSave(noteTitle.dataset.noteTitleId);
        return;
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        state.noteBodyEdits[markdownBody.dataset.noteBodyId] = markdownBody.value;
        renderMarkdownSearchOverlay(markdownBody.dataset.noteBodyId);
        debounceNoteSave(markdownBody.dataset.noteBodyId);
        return;
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        state.noteHtmlEdits[cleanEditor.dataset.noteCleanId] = cleanEditor.innerHTML;
        debounceNoteSave(cleanEditor.dataset.noteCleanId);
      }
    });

    document.addEventListener("keydown", async (event) => {
      if (state.portViewerOpen && event.key === "Escape") {
        event.preventDefault();
        closePortViewer();
        return;
      }

      if (state.archiveMenuOpen && event.key === "Escape") {
        event.preventDefault();
        closeArchiveMenu();
        return;
      }

      if (state.projectArchiveConfirmId && event.key === "Escape") {
        event.preventDefault();
        closeProjectArchiveConfirm();
        return;
      }

      if (state.changelogArchiveConfirmOpen && event.key === "Escape") {
        event.preventDefault();
        closeChangelogArchiveConfirm();
        return;
      }

      if (state.noteArchiveConfirmId && event.key === "Escape") {
        event.preventDefault();
        closeNoteArchiveConfirm();
        return;
      }

      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        if (isHeaderShortcut(event)) {
          event.preventDefault();
          toggleTaskHeading(taskInput.dataset.taskId);
        } else if (event.key === "Enter") {
          event.preventDefault();
          const taskId = taskInput.dataset.taskId;
          await saveTask(taskId);
          if (isTaskSectionCollapsed(taskId)) {
            setTaskSectionCollapsed(taskId, false);
          }
          insertDraftAfter(taskId);
          render();
        }
        return;
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draftKey = draftInput.dataset.taskDraftKey;
        const draft = getDraft(draftKey);
        if (!draft) return;

        if (isHeaderShortcut(event)) {
          event.preventDefault();
          toggleDraftHeading(draftKey);
        } else if (event.key === "Enter") {
          event.preventDefault();
          await commitDraftTask(draft);
        } else if (event.key === "Backspace" && !draft.title) {
          removeDraft(draftKey);
          render();
        } else if (event.key === "Escape") {
          removeDraft(draftKey);
          render();
        }
        return;
      }

      const projectInput = event.target.closest("[data-project-title-input], [data-project-source-input]");
      if (projectInput && event.key === "Enter") {
        event.preventDefault();
        if (state.projectTrayMode === "new") {
          await submitProjectCreate("new", state.projectInput, null);
        } else if (state.projectTrayMode === "local" && state.projectPickerFallback) {
          await submitProjectCreate("local", state.projectInput, state.projectSourceInput);
        }
      }

      const projectSettingsInput = event.target.closest("[data-project-settings-source]");
      if (projectSettingsInput) {
        if (event.key === "Escape") {
          event.preventDefault();
          closeProjectSettings();
        } else if (event.key === "Enter") {
          event.preventDefault();
          if (projectSettingsInput.hasAttribute("data-project-settings-source")) {
            await saveProjectSourceLink();
          }
        }
      }
    });

    document.addEventListener("blur", async (event) => {
      const taskInput = event.target.closest("[data-task-id]");
      if (taskInput && taskInput.tagName === "TEXTAREA") {
        await saveTask(taskInput.dataset.taskId);
        const task = findTask(taskInput.dataset.taskId);
        collapseHeadingInput(taskInput, state.taskEdits[taskInput.dataset.taskId] ?? task?.title ?? taskInput.value);
      }

      const draftInput = event.target.closest("[data-task-draft-key]");
      if (draftInput && draftInput.tagName === "TEXTAREA") {
        const draftKey = draftInput.dataset.taskDraftKey;
        window.setTimeout(async () => {
          const draft = getDraft(draftKey);
          if (!draft) return;
          if (draft.title.trim()) {
            await commitDraftTask(draft, { insertNextDraft: false });
            return;
          }
          removeDraft(draft.key);
          render();
        }, 0);
      }

      const noteTitle = event.target.closest("[data-note-title-id]");
      if (noteTitle) {
        await saveNote(noteTitle.dataset.noteTitleId);
      }

      const markdownBody = event.target.closest("[data-note-body-id]");
      if (markdownBody && markdownBody.tagName === "TEXTAREA") {
        await saveNote(markdownBody.dataset.noteBodyId);
      }

      const cleanEditor = event.target.closest("[data-note-clean-id]");
      if (cleanEditor) {
        await saveNote(cleanEditor.dataset.noteCleanId);
      }
    }, true);

    document.addEventListener("change", async (event) => {
      const taskCheck = event.target.closest("[data-task-check-id]");
      if (taskCheck) {
        await toggleTask(taskCheck.dataset.taskCheckId, taskCheck.checked ? "done" : "todo");
        return;
      }

      const doneCheck = event.target.closest("[data-done-check-id]");
      if (doneCheck) {
        await toggleTask(doneCheck.dataset.doneCheckId, doneCheck.checked ? "done" : "todo");
      }
    });

    document.addEventListener("dragstart", (event) => {
      if (state.sortTasksByPriority) {
        event.preventDefault();
        return;
      }
      const dragOrigin = event.target instanceof Element ? event.target : null;
      if (!dragOrigin) return;
      const dragHandle = dragOrigin.closest(".task-input, .task-check, .task-priority-btn, .task-delete-btn, .task-copy-btn, .task-section-toggle, .task-heading-complete-btn");
      if (dragHandle) {
        event.preventDefault();
        return;
      }
      const row = dragOrigin.closest("[data-draggable-task-id]");
      if (!row) return;
      state.draggedTaskId = row.dataset.draggableTaskId;
      row.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      const taskInput = row.querySelector(".task-input");
      const taskContent = taskInput instanceof HTMLTextAreaElement
        ? normalizeTaskEditorValue(taskInput.value)
        : "";
      event.dataTransfer.setData("text/plain", taskContent || state.draggedTaskId);
    });

    document.addEventListener("dragend", (event) => {
      const dragOrigin = event.target instanceof Element ? event.target : null;
      const row = dragOrigin ? dragOrigin.closest("[data-draggable-task-id]") : null;
      if (row) row.classList.remove("dragging");
      state.draggedTaskId = null;
      clearTaskDropIndicator();
    });

    document.addEventListener("dragover", (event) => {
      if (state.sortTasksByPriority) return;
      if (!state.draggedTaskId) return;
      const taskList = event.target.closest("#active-task-list");
      if (!taskList) {
        clearTaskDropIndicator();
        return;
      }

      const dropLocation = resolveTaskDropLocation(event.clientY);
      if (!dropLocation) {
        clearTaskDropIndicator();
        return;
      }

      event.preventDefault();
      if (event.dataTransfer) {
        event.dataTransfer.dropEffect = "move";
      }
      setTaskDropIndicator(dropLocation.taskId, dropLocation.position);
    });

    document.addEventListener("drop", async (event) => {
      if (state.sortTasksByPriority) return;
      const taskList = event.target.closest("#active-task-list");
      if (!taskList || !state.draggedTaskId || !state.workspace) return;
      event.preventDefault();
      const dropLocation = resolveTaskDropLocation(event.clientY);
      clearTaskDropIndicator();
      if (!dropLocation || dropLocation.taskId === state.draggedTaskId) return;

      const activeIds = state.workspace.active_tasks.map((task) => task.id);
      const fromIndex = activeIds.indexOf(state.draggedTaskId);
      if (fromIndex === -1) return;

      const [movedTaskId] = activeIds.splice(fromIndex, 1);
      const targetIndex = activeIds.indexOf(dropLocation.taskId);
      if (targetIndex === -1) return;
      const insertionIndex = dropLocation.position === "after"
        ? targetIndex + 1
        : targetIndex;
      activeIds.splice(insertionIndex, 0, movedTaskId);

      const response = await fetchJson("/api/tasks/reorder", {
        method: "POST",
        body: JSON.stringify({
          project_id: state.selectedProjectId,
          ordered_active_task_ids: activeIds
        })
      }, "task");
      if (!response) return;
      applyWorkspace(response);
      render();
    });

    function isAlternateProjectViewOpen() {
      return Boolean(state.projectTrayMode || state.archiveMenuOpen || state.archiveEmptyConfirm);
    }

    async function selectProject(projectId, options = {}) {
      const preferredPaneMode = options.preferredPaneMode === "codex" ? "codex" : "notes";
      if (state.selectedProjectId === projectId) {
        if (!isAlternateProjectViewOpen() && state.rightPaneMode === preferredPaneMode) return;
        closeArchiveMenu();
        state.projectTrayMode = null;
        setRightPaneMode(preferredPaneMode);
        render();
        return;
      }
      await saveOpenNote();
      const workspace = await fetchJson(`/api/projects/${projectId}/workspace`, {}, "project");
      if (!workspace) return;
      closeArchiveMenu();
      closePortViewer({ render: false });
      state.noteLinkableFiles = [];
      state.noteLinkableFilesLoaded = false;
      state.noteFilePickerLoading = false;
      state.noteFilePickerOpen = false;
      state.selectedProjectId = projectId;
      applyWorkspace(workspace);
      state.taskDrafts = [];
      state.projectTrayMode = null;
      setRightPaneMode(preferredPaneMode);
      syncLocation();
      render();
    }

    async function submitProjectCreate(mode, title, sourceLocator) {
      const response = await fetchJson("/api/projects", {
        method: "POST",
        body: JSON.stringify({
          mode,
          title: title || null,
          source_locator: sourceLocator || null
        })
      }, "project");
      if (!response) return;
      applyUiState(response);
      state.projectTrayMode = null;
      state.projectInput = "";
      state.projectSourceInput = "";
      state.projectPickerFallback = false;
      render();
    }

    function closeArchiveMenu(options = {}) {
      if (!state.archiveMenuOpen && !state.archiveEmptyConfirm) return;
      state.archiveMenuOpen = false;
      state.archiveMenuMode = null;
      state.archiveEmptyConfirm = false;
      if (options.render !== false) {
        render();
      }
    }

    async function loadArchiveMenu() {
      if (state.archiveMenuLoading) return;
      state.archiveMenuLoading = true;
      renderArchivePane();
      const response = await fetchJson("/api/archive", {}, "project");
      state.archiveMenuLoading = false;
      if (!response) {
        renderArchivePane();
        return;
      }

      state.archiveItems = Array.isArray(response.items) ? response.items : [];
      state.archiveTotalCount = Number.isFinite(response.total_count) ? response.total_count : 0;
      renderArchivePane();
    }

    function closePortViewer(options = {}) {
      if (!state.portViewerOpen && !state.portViewerKillTarget && !state.portViewerMessage) return;
      state.portViewerOpen = false;
      state.portViewerLoading = false;
      state.portViewerMessage = "";
      state.portViewerKillTarget = null;
      state.portViewerShowAll = false;
      if (options.render !== false) {
        render();
      }
    }

    async function loadPortViewer() {
      if (!state.portViewerOpen) return;
      state.portViewerLoading = true;
      state.portViewerMessage = "";
      renderPortViewer();
      const response = await fetchJson("/api/system/ports", {}, "port", true);
      state.portViewerLoading = false;
      if (!response) {
        renderPortViewer();
        return;
      }

      state.portViewerItems = Array.isArray(response.items) ? response.items : [];
      renderPortViewer();
    }

    async function terminatePortSession(pid, port) {
      if (!state.portViewerOpen || !pid || !port) return;
      const killKey = `${pid}:${port}`;
      if (state.portViewerKillTarget === killKey) return;
      const session = state.portViewerItems.find((item) => Number(item.pid) === pid && Number(item.port) === port);
      if (state.portViewerShowAll && session && !session.is_likely_dev && !session.is_topside_process) {
        const confirmed = window.confirm(
          `Port ${port} does not look like a development process. End it anyway?`
        );
        if (!confirmed) {
          return;
        }
      }
      state.portViewerKillTarget = killKey;
      renderPortViewer();
      const response = await fetchJson("/api/system/ports/terminate", {
        method: "POST",
        body: JSON.stringify({ pid, port })
      }, "port", true);
      state.portViewerKillTarget = null;
      if (!response) {
        renderPortViewer();
        return;
      }

      state.portViewerItems = Array.isArray(response.items) ? response.items : [];
      state.portViewerMessage = typeof response.message === "string" ? response.message : "";
      renderPortViewer();
    }

    function applyArchiveMutation(response) {
      if (!response) return false;
      state.archiveItems = Array.isArray(response.archive?.items) ? response.archive.items : [];
      state.archiveTotalCount = Number.isFinite(response.archive?.total_count)
        ? response.archive.total_count
        : 0;
      state.archiveEmptyConfirm = false;
      if (response.ui_state) {
        applyUiState(response.ui_state);
      }
      return true;
    }

    async function restoreArchivedEntity(entityId, expectedRevision) {
      if (!entityId || !expectedRevision) return;
      const response = await fetchJson(`/api/archive/${entityId}/restore`, {
        method: "POST",
        body: JSON.stringify({
          expected_revision: expectedRevision,
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!applyArchiveMutation(response)) return;
      render();
    }

    async function emptyArchive() {
      const response = await fetchJson("/api/archive/empty", {
        method: "POST",
        body: JSON.stringify({
          current_project_id: state.selectedProjectId
        })
      }, "project");
      if (!applyArchiveMutation(response)) return;
      render();
    }

    function renderPortMenu() {
      portsMenuToggle.classList.toggle("active", state.portViewerOpen);
      portsMenuToggle.setAttribute("aria-pressed", state.portViewerOpen ? "true" : "false");
      portsMenuToggle.title = state.portViewerOpen ? "Close ports" : "Open ports";
      portsMenuToggle.setAttribute("aria-label", state.portViewerOpen ? "Close ports" : "Open ports");
    }

    function renderSidebarCollapseToggle() {
      const sidebarLockedOpen = state.projectTrayMode === "new" || state.projectTrayMode === "local";
      const sidebarCollapsed = shouldCollapseProjectSidebar();
      sidebarCollapseToggle.disabled = sidebarLockedOpen;
      sidebarCollapseToggle.setAttribute("aria-pressed", sidebarCollapsed ? "true" : "false");

      const label = sidebarLockedOpen
        ? "Finish adding a project before collapsing the sidebar"
        : sidebarCollapsed
          ? "Expand project sidebar"
          : "Collapse project sidebar";

      sidebarCollapseToggle.title = label;
      sidebarCollapseToggle.setAttribute("aria-label", label);
    }

    function renderArchiveMenu() {
      const archiveActive = state.archiveMenuOpen && state.archiveMenuMode === "archive";
      const settingsActive = state.archiveMenuOpen && state.archiveMenuMode === "settings";
      archiveMenuToggle.classList.toggle("active", archiveActive);
      archiveMenuToggle.setAttribute("aria-pressed", archiveActive ? "true" : "false");
      archiveMenuToggle.title = archiveActive ? "Close archive" : "Open archive";
      archiveMenuToggle.setAttribute("aria-label", archiveActive ? "Close archive" : "Open archive");
      settingsMenuToggle.classList.toggle("active", settingsActive);
      settingsMenuToggle.setAttribute("aria-pressed", settingsActive ? "true" : "false");
      settingsMenuToggle.title = settingsActive ? "Close settings" : "Open settings";
      settingsMenuToggle.setAttribute("aria-label", settingsActive ? "Close settings" : "Open settings");
    }

    function getVisiblePortViewerItems() {
      const items = Array.isArray(state.portViewerItems) ? state.portViewerItems : [];
      if (state.portViewerShowAll) {
        return items;
      }
      return items.filter((item) => item.is_likely_dev || item.is_topside_process);
    }

    function renderPortViewer() {
      if (!state.portViewerOpen) {
        portViewerOverlay.innerHTML = "";
        return;
      }

      const allItems = Array.isArray(state.portViewerItems) ? state.portViewerItems : [];
      const items = getVisiblePortViewerItems();
      const hiddenCount = Math.max(0, allItems.length - items.length);
      const countLabel = state.portViewerLoading && !allItems.length
        ? "Loading active ports..."
        : state.portViewerShowAll
          ? `${allItems.length} total ${allItems.length === 1 ? "port" : "ports"}`
          : `${items.length} likely dev ${items.length === 1 ? "port" : "ports"}`;
      const filterNote = !state.portViewerShowAll && hiddenCount > 0
        ? `<div class="overlay-muted">${escapeHtml(String(hiddenCount))} other ${hiddenCount === 1 ? "port is" : "ports are"} hidden. Use Show all to inspect them.</div>`
        : "";
      const rowsMarkup = items.map((item) => {
        const pid = Number(item.pid);
        const port = Number(item.port);
        const killKey = `${pid}:${port}`;
        const isBusy = state.portViewerKillTarget === killKey;
        const bindings = Array.isArray(item.bindings) ? item.bindings : [];
        const otherPorts = Array.isArray(item.other_ports)
          ? item.other_ports.filter((value) => Number.isFinite(Number(value)))
          : [];
        const warningMarkup = otherPorts.length
          ? `<div class="port-session-warning">This process also owns port${otherPorts.length === 1 ? "" : "s"} ${escapeHtml(otherPorts.join(", "))}. Ending it will close those listeners too.</div>`
          : "";
        const protectedMarkup = item.is_topside_process
          ? `<div class="disabled-note">Topside cannot end its own process.</div>`
          : "";
        return `
          <section class="overlay-section port-session-card">
            <div class="port-session-head">
              <div class="port-session-title">
                <div class="small-label">Port ${escapeHtml(String(port))}</div>
                <h3>${escapeHtml(item.process_name || "Unknown process")}</h3>
              </div>
              <button
                class="text-btn danger-btn"
                type="button"
                data-port-viewer-kill="true"
                data-port-viewer-kill-pid="${escapeAttribute(String(pid))}"
                data-port-viewer-kill-port="${escapeAttribute(String(port))}"
                ${!item.can_terminate || isBusy ? "disabled" : ""}
              >
                ${isBusy ? "Ending..." : (item.can_terminate ? "End session" : "Protected")}
              </button>
            </div>

    async function patchNoteRequest(noteId, expectedRevision, title, body) {
      try {
        const response = await fetch(`/api/notes/${noteId}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            expected_revision: expectedRevision,
            title,
            body
          })
        });
        const payload = response.status === 204
          ? null
          : await response.json().catch(() => null);
        return {
          ok: response.ok,
          status: response.status,
          payload,
          error: null
        };
      } catch (error) {
        return {
          ok: false,
          status: 0,
          payload: null,
          error: error instanceof Error ? error.message : String(error)
        };
      }
    }

    function getDraftNoteTitle(noteId, note) {
      if (note.sync_kind) return note.title;
      return Object.prototype.hasOwnProperty.call(state.noteTitleEdits, noteId)
        ? state.noteTitleEdits[noteId]
        : note.title;
    }

    function getDraftNoteBody(noteId, note) {
      return state.noteMode === "clean"
        ? cleanHtmlToMarkdown(state.noteHtmlEdits[noteId] ?? getCurrentCleanHtml(noteId) ?? note.rendered_html)
        : (Object.prototype.hasOwnProperty.call(state.noteBodyEdits, noteId)
          ? state.noteBodyEdits[noteId]
          : note.body);
    }

    function clearNoteDraftEdits(noteId) {
      delete state.noteTitleEdits[noteId];
      delete state.noteBodyEdits[noteId];
      delete state.noteHtmlEdits[noteId];
    }

    async function saveNote(noteId, conflictMode = "prompt") {
      if (!state.workspace) return false;
      const note = state.workspace.notes.find((item) => item.id === noteId);
      if (!note) return false;

      const title = getDraftNoteTitle(noteId, note);
      const body = getDraftNoteBody(noteId, note);

      if (title === note.title && body === note.body) {
        clearNoteDraftEdits(noteId);
        if (state.noteRevisionConflict?.noteId === noteId) {
          state.noteRevisionConflict = null;
          state.noteMessage = "";
        }
        return true;
      }

      const baseTitle = note.title;
      const baseBody = note.body;
      let request = await patchNoteRequest(noteId, note.revision, title, body);

      if (!request.ok && request.status === 409 && state.selectedProjectId) {
        const latestWorkspace = await fetchJson(
          `/api/projects/${state.selectedProjectId}/workspace`,
          {},
          "note",
          true
        );

        if (latestWorkspace) {
          state.workspace = mergeWorkspacePreservingNoteOrder(state.workspace, latestWorkspace);
          const latestNote = state.workspace?.notes?.find((item) => item.id === noteId) || null;
          if (!latestNote) {
            state.noteRevisionConflict = null;
        state.noteMessage = "Note changed in the background and is no longer available";
            render();
            return false;
          }
          const metadataOnlyConflict = latestNote.title === baseTitle
            && latestNote.body === baseBody;

          if (metadataOnlyConflict || conflictMode === "overwrite") {
            request = await patchNoteRequest(noteId, latestNote.revision, title, body);
          } else {
            state.noteRevisionConflict = { noteId };
            state.noteMessage = "";
            render();
            return false;
          }
        }
      }

      if (!request.ok) {
        state.noteMessage = request.error
          || request.payload?.error
          || `Request failed (${request.status || "network"})`;
        render();
        return false;
      }

      clearNoteDraftEdits(noteId);
      state.workspace = mergeWorkspacePreservingNoteOrder(state.workspace, request.payload.workspace);
      state.noteRevisionConflict = null;
      state.noteMessage = "";
      noteMessage.innerHTML = "";
      return true;
    }

    function collectPendingTaskSaveIds() {
      const ids = new Set([
        ...Object.keys(state.taskEdits),
        ...Object.keys(state.taskTimers),
      ]);
      return Array.from(ids).filter(Boolean);
    }

    function collectPendingNoteSaveIds() {
      const ids = new Set([
        ...Object.keys(state.noteTimers),
        ...Object.keys(state.noteTitleEdits),
        ...Object.keys(state.noteBodyEdits),
        ...Object.keys(state.noteHtmlEdits),
      ]);
      return Array.from(ids).filter(Boolean);
    }

    async function flushPendingEntitySaves() {
      if (state.lifecycleSavePromise) {
        return state.lifecycleSavePromise;
      }

      const pendingTaskIds = collectPendingTaskSaveIds();
      const pendingNoteIds = collectPendingNoteSaveIds();
      if (!pendingTaskIds.length && !pendingNoteIds.length) {
        return;
      }

      state.lifecycleSavePromise = (async () => {
        for (const taskId of pendingTaskIds) {
          clearTimeout(state.taskTimers[taskId]);
          delete state.taskTimers[taskId];
          await saveTask(taskId);
        }

        for (const noteId of pendingNoteIds) {
          clearTimeout(state.noteTimers[noteId]);
          delete state.noteTimers[noteId];
          await saveNote(noteId);
        }
      })();

      try {
        await state.lifecycleSavePromise;
      } finally {
        state.lifecycleSavePromise = null;
      }
    }

    async function resolveNoteRevisionConflict(noteId, source) {
      if (!noteId) return;

      if (source === "latest") {
        clearNoteDraftEdits(noteId);
        if (state.noteRevisionConflict?.noteId === noteId) {
          state.noteRevisionConflict = null;
        }
        state.noteMessage = "";
        render();
        return;
      }

      if (source !== "local") return;
      await saveNote(noteId, "overwrite");
      render();
    }

    function debounceTaskSave(taskId) {
      clearTimeout(state.taskTimers[taskId]);
      todoStatus.textContent = "Saving…";
      state.taskTimers[taskId] = setTimeout(() => {
        saveTask(taskId);
      }, 400);
    }

    function debounceNoteSave(noteId) {
      clearTimeout(state.noteTimers[noteId]);
      state.noteTimers[noteId] = setTimeout(() => {
        saveNote(noteId);
      }, 500);
    }

    function mergeWorkspacePreservingNoteOrder(currentWorkspace, nextWorkspace) {
      if (!nextWorkspace || !currentWorkspace) return nextWorkspace;

      const currentNotes = Array.isArray(currentWorkspace.notes) ? currentWorkspace.notes : [];
      const nextNotes = Array.isArray(nextWorkspace.notes) ? nextWorkspace.notes : [];
      if (!currentNotes.length || !nextNotes.length) {
        return nextWorkspace;
      }

      const nextNotesById = new Map(nextNotes.map((note) => [note.id, note]));
      const mergedNotes = [];

      currentNotes.forEach((note) => {
        const updated = nextNotesById.get(note.id);
        if (!updated) return;
        mergedNotes.push(updated);
        nextNotesById.delete(note.id);
      });

      nextNotes.forEach((note) => {
        if (!nextNotesById.has(note.id)) return;
        mergedNotes.push(note);
        nextNotesById.delete(note.id);
      });

      return {
        ...nextWorkspace,
        notes: mergedNotes
      };
    }

    function computeUiRefreshToken(payload) {
      if (!payload) return "";

      const projects = Array.isArray(payload.projects)
        ? payload.projects.map((project) => [
          project.id,
          project.revision,
          project.task_sync_status || "",
          project.last_synced_at_label || ""
        ].join(":")).join("|")
        : "";

      const workspace = payload.workspace || null;
      const active = Array.isArray(workspace?.active_tasks)
        ? workspace.active_tasks.map((task) => `${task.id}:${task.revision}`).join("|")
        : "";
      const done = Array.isArray(workspace?.done_tasks)
        ? workspace.done_tasks.map((task) => `${task.id}:${task.revision}`).join("|")
        : "";
      const notes = Array.isArray(workspace?.notes)
        ? workspace.notes.map((note) => `${note.id}:${note.revision}`).join("|")
        : "";

      return [
        projects,
        payload.selected_project_id || "",
        workspace?.project?.revision || "",
        active,
        done,
        notes,
        workspace?.suggested_open_note_id || ""
      ].join("::");
    }

    function isEditorInteractionActive() {
      const active = document.activeElement;
      if (!(active instanceof HTMLElement)) return false;
      return Boolean(active.closest([
        "[data-task-id]",
        "[data-task-draft-key]",
        "[data-note-title-id]",
        "[data-note-body-id]",
        "[data-note-clean-id]",
        "[data-project-input]",
        "[data-project-source]",
        "[data-project-settings-source]"
      ].join(",")));
    }

    function applyRemoteUiStateIfIdle(payload) {
      if (!payload) return;

      const nextPayload = {
        ...payload,
        workspace: payload.workspace && state.workspace
          ? mergeWorkspacePreservingNoteOrder(state.workspace, payload.workspace)
          : payload.workspace
      };
      const currentToken = computeUiRefreshToken({
        projects: state.projects,
        selected_project_id: state.selectedProjectId,
        workspace: state.workspace
      });
      const nextToken = computeUiRefreshToken(nextPayload);
      if (currentToken === nextToken) {
        state.pendingRemoteUiState = null;
        return;
      }

      if (isEditorInteractionActive()) {
        state.pendingRemoteUiState = nextPayload;
        return;
      }

      state.pendingRemoteUiState = null;
      applyUiState(nextPayload);
      render({ preserveShellScroll: true });
    }

    function flushPendingRemoteUiState() {
      if (!state.pendingRemoteUiState) return;
      if (isEditorInteractionActive()) return;
      const pending = state.pendingRemoteUiState;
      state.pendingRemoteUiState = null;
      applyUiState(pending);
      render({ preserveShellScroll: true });
    }

    function computeActiveTaskAnimation(previousWorkspace, nextWorkspace) {
      const previousProjectId = previousWorkspace?.project?.id || null;
      const nextProjectId = nextWorkspace?.project?.id || null;
      if (!previousProjectId || !nextProjectId || previousProjectId !== nextProjectId) {
        return null;
      }

      const previousActiveTasks = Array.isArray(previousWorkspace?.active_tasks)
        ? previousWorkspace.active_tasks
        : [];
      const nextActiveTasks = Array.isArray(nextWorkspace?.active_tasks)
        ? nextWorkspace.active_tasks
        : [];
      if (!previousActiveTasks.length && !nextActiveTasks.length) {
        return null;
      }

      const previousIds = new Set(previousActiveTasks.map((task) => task.id));
      const nextIds = new Set(nextActiveTasks.map((task) => task.id));
      const addedTaskIds = nextActiveTasks
        .map((task) => task.id)
        .filter((taskId) => !previousIds.has(taskId));
      const removedTaskIds = previousActiveTasks
        .map((task) => task.id)
        .filter((taskId) => !nextIds.has(taskId));

      if (!addedTaskIds.length && !removedTaskIds.length) {
        return null;
      }

      return {
        addedTaskIds,
        removedTaskIds
      };
    }

    function scheduleUiRefresh(delay = uiRefreshIntervalMs) {
      clearTimeout(state.uiRefreshTimer);
      state.uiRefreshTimer = window.setTimeout(() => {
        refreshUiStateInBackground();
      }, delay);
    }

    async function refreshUiStateInBackground() {
      state.uiRefreshTimer = null;
      flushPendingRemoteUiState();

      if (state.uiRefreshInFlight) {
        scheduleUiRefresh();
        return;
      }

      if (document.visibilityState === "hidden") {
        scheduleUiRefresh();
        return;
      }

      if (
        !state.selectedProjectId
        || (
          !state.workspace?.project?.task_sync_enabled
          && !workspaceHasBackgroundNoteSync(state.workspace)
        )
      ) {
        scheduleUiRefresh();
        return;
      }

      const projectId = state.selectedProjectId;
      state.uiRefreshInFlight = true;

      try {
        const query = new URLSearchParams({ project_id: projectId });
        const response = await fetch(`/api/ui-state?${query.toString()}`, {
          cache: "no-store"
        });
        if (!response.ok) return;

        const payload = await response.json();
        if (state.selectedProjectId !== projectId) return;
        applyRemoteUiStateIfIdle(payload);
      } catch (_error) {
        // Ignore background refresh failures; the next poll will retry.
      } finally {
        state.uiRefreshInFlight = false;
        scheduleUiRefresh();
      }
    }

    function captureNodeScrollState(node) {
      if (!(node instanceof HTMLElement)) return null;
      const maxScrollTop = Math.max(0, node.scrollHeight - node.clientHeight);
      return {
        node,
        top: node.scrollTop,
        ratio: maxScrollTop > 0 ? node.scrollTop / maxScrollTop : 0,
      };
    }

    function captureShellScrollState() {
      return Object.values(shellScrollPaneNodes)
        .map((node) => captureNodeScrollState(node))
        .filter(Boolean);
    }

    function captureActiveTaskSectionAnchor(taskId) {
      if (!taskId || !(activeTaskList instanceof HTMLElement)) return null;
      const row = activeTaskList.querySelector(`[data-draggable-task-id="${taskId}"]`);
      if (!(row instanceof HTMLElement)) return null;
      return {
        taskId,
        top: row.getBoundingClientRect().top,
      };
    }

    function restoreActiveTaskSectionAnchor(anchor) {
      if (!anchor?.taskId || !(activeTaskList instanceof HTMLElement)) return false;

      const row = activeTaskList.querySelector(`[data-draggable-task-id="${anchor.taskId}"]`);
      if (!(row instanceof HTMLElement)) return false;

      const deltaY = row.getBoundingClientRect().top - anchor.top;
      if (Math.abs(deltaY) < 0.5) return false;

      const maxScrollTop = Math.max(0, activeTaskList.scrollHeight - activeTaskList.clientHeight);
      const nextScrollTop = Math.min(maxScrollTop, Math.max(0, activeTaskList.scrollTop + deltaY));
      if (Math.abs(nextScrollTop - activeTaskList.scrollTop) < 0.5) return false;

      activeTaskList.scrollTop = nextScrollTop;
      return true;
    }

    function preserveActiveTaskSectionAnchor(anchor) {
      if (!anchor) return;

      restoreActiveTaskSectionAnchor(anchor);
      window.requestAnimationFrame(() => {
        restoreActiveTaskSectionAnchor(anchor);
        window.requestAnimationFrame(() => {
          restoreActiveTaskSectionAnchor(anchor);
        });
      });
    }

    function focusTaskSectionToggle(taskId) {
      if (!taskId || !(activeTaskList instanceof HTMLElement)) return;
      const button = activeTaskList.querySelector(`[data-task-section-toggle-id="${taskId}"]`);
      if (!(button instanceof HTMLButtonElement)) return;

      try {
        button.focus({ preventScroll: true });
      } catch (_error) {
        button.focus();
      }
    }

    function restoreShellScrollState(scrollState) {
      if (!Array.isArray(scrollState) || !scrollState.length) return;

      scrollState.forEach((entry) => {
        if (!entry?.node?.isConnected) return;
        const maxScrollTop = Math.max(0, entry.node.scrollHeight - entry.node.clientHeight);
        const desiredTop = maxScrollTop > 0
          ? Math.min(entry.top, Math.round(entry.ratio * maxScrollTop))
          : 0;
        entry.node.scrollTop = desiredTop;
      });

      window.requestAnimationFrame(() => {
        scrollState.forEach((entry) => {
          if (!entry?.node?.isConnected) return;
          const maxScrollTop = Math.max(0, entry.node.scrollHeight - entry.node.clientHeight);
          const desiredTop = maxScrollTop > 0
            ? Math.min(entry.top, Math.round(entry.ratio * maxScrollTop))
            : 0;
          entry.node.scrollTop = desiredTop;
        });
      });
    }

    function normalizeSessionId(value) {
      const normalized = typeof value === "string" ? value.trim() : "";
      return normalized || null;
    }

    function normalizeScrollTop(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric) || numeric < 0) return 0;
      return Math.round(numeric);
    }

    function normalizeScrollRatio(value) {
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return 0;
      return Math.max(0, Math.min(1, numeric));
    }

    function loadSessionSnapshot() {
      const rawValue = readStorageItem(sessionStateKey, legacySessionStateKey);
      if (!rawValue) return null;

      try {
        const parsed = JSON.parse(rawValue);
        if (!parsed || typeof parsed !== "object") return null;

        const selectedProjectId = normalizeSessionId(parsed.selectedProjectId);
        if (!selectedProjectId) return null;

        const openNoteId = normalizeSessionId(parsed.openNoteId);
        const selectedTaskId = normalizeSessionId(parsed.selectedTaskId);
        const openCodexSessionId = normalizeSessionId(parsed.openCodexSessionId);
        const rightPaneMode = parsed.rightPaneMode === "codex" ? "codex" : "notes";
        const shellScroll = Array.isArray(parsed.shellScroll)
          ? parsed.shellScroll.map((entry) => {
            const pane = normalizeSessionId(entry?.pane);
            if (!pane || !Object.prototype.hasOwnProperty.call(shellScrollPaneNodes, pane)) {
              return null;
            }

            return {
              pane,
              top: normalizeScrollTop(entry.top),
              ratio: normalizeScrollRatio(entry.ratio),
            };
          }).filter(Boolean)
          : [];

        return {
          version: Number(parsed.version) || sessionStateVersion,
          selectedProjectId,
          openNoteId,
          selectedTaskId,
          openCodexSessionId,
          rightPaneMode,
          shellScroll,
        };
      } catch (_error) {
        return null;
      }
    }

    function buildPersistedShellScrollSnapshot() {
      return Object.entries(shellScrollPaneNodes).map(([pane, node]) => {
        const entry = captureNodeScrollState(node);
        if (!entry) return null;

        return {
          pane,
          top: normalizeScrollTop(entry.top),
          ratio: normalizeScrollRatio(entry.ratio),
        };
      }).filter(Boolean);
    }

    function buildRuntimeShellScrollState(snapshot) {
      if (!Array.isArray(snapshot) || !snapshot.length) return null;

      const runtimeState = snapshot.map((entry) => {
        const pane = normalizeSessionId(entry?.pane);
        if (!pane || !Object.prototype.hasOwnProperty.call(shellScrollPaneNodes, pane)) {
          return null;
        }

        const node = shellScrollPaneNodes[pane];
        if (!(node instanceof HTMLElement)) return null;

        return {
          node,
          top: normalizeScrollTop(entry.top),
          ratio: normalizeScrollRatio(entry.ratio),
        };
      }).filter(Boolean);

      return runtimeState.length ? runtimeState : null;
    }

    function buildSessionSnapshot() {
      const selectedProjectId = normalizeSessionId(state.selectedProjectId);
      if (!selectedProjectId) return null;

      const openNoteId = state.workspace?.notes?.some((note) => note.id === state.openNoteId)
        ? state.openNoteId
        : null;
      const selectedTaskId = state.workspace?.active_tasks?.some((task) => task.id === state.selectedTaskId)
        ? state.selectedTaskId
        : null;

      return {
        version: sessionStateVersion,
        selectedProjectId,
        openNoteId: normalizeSessionId(openNoteId),
        selectedTaskId: normalizeSessionId(selectedTaskId),
        openCodexSessionId: normalizeSessionId(state.openCodexSessionId),
        rightPaneMode: state.rightPaneMode === "codex" ? "codex" : "notes",
        shellScroll: buildPersistedShellScrollSnapshot(),

    }

    function persistSessionStateNow() {
      if (state.sessionPersistTimer !== null) {
        window.clearTimeout(state.sessionPersistTimer);
        state.sessionPersistTimer = null;
      }

      const snapshot = buildSessionSnapshot();
      try {
        if (!snapshot) {
          localStorage.removeItem(sessionStateKey);

        state.sessionPersistTimer = null;
        persistSessionStateNow();
      }, delay);
    }

    function bindSessionScrollPersistence() {
      Object.values(shellScrollPaneNodes).forEach((node) => {
        if (!(node instanceof HTMLElement)) return;

    }

    function applySessionSnapshotToWorkspace(snapshot) {
      if (!snapshot || !state.workspace) return;
      if (snapshot.selectedProjectId !== state.selectedProjectId) return;

      if (
        snapshot.openNoteId
        && state.workspace.notes.some((note) => note.id === snapshot.openNoteId)
      ) {
        state.openNoteId = snapshot.openNoteId;
      }

      if (
        snapshot.selectedTaskId
        && state.workspace.active_tasks.some((task) => task.id === snapshot.selectedTaskId)
      ) {
        state.selectedTaskId = snapshot.selectedTaskId;
      } else {
        state.selectedTaskId = null;
      }

      if (
        snapshot.openCodexSessionId
        && state.workspace.codex_sessions?.some((session) => session.id === snapshot.openCodexSessionId)
      ) {
        state.openCodexSessionId = snapshot.openCodexSessionId;
      }
      state.rightPaneMode = snapshot.rightPaneMode === "codex" && projectSupportsCodex(state.workspace.project)
        ? "codex"
        : "notes";

      state.pendingSessionScrollState = buildRuntimeShellScrollState(snapshot.shellScroll);
    }

    function restorePendingSessionScrollState() {
      if (!state.pendingSessionScrollState) return;
      restoreShellScrollState(state.pendingSessionScrollState);
      state.pendingSessionScrollState = null;
    }

    async function fetchWorkspaceSilently(projectId) {
      const normalizedProjectId = normalizeSessionId(projectId);
      if (!normalizedProjectId) return null;

      try {
        const response = await fetch(
          `/api/projects/${encodeURIComponent(normalizedProjectId)}/workspace`,
          { cache: "no-store" }
        );
        if (!response.ok) return null;
        return response.json();
      } catch (_error) {
        return null;
      }
    }

    async function restoreSessionOnLaunch() {
      const snapshot = loadSessionSnapshot();
      if (!snapshot) return;

      const shouldSwitchProject = !initialUrlProjectId
        && snapshot.selectedProjectId !== state.selectedProjectId;

      if (shouldSwitchProject) {
        const workspace = await fetchWorkspaceSilently(snapshot.selectedProjectId);
        if (workspace) {
          state.selectedProjectId = snapshot.selectedProjectId;
          applyWorkspace(workspace, snapshot.openNoteId || workspace?.suggested_open_note_id || null);
        }
      }

      applySessionSnapshotToWorkspace(snapshot);
      if (state.rightPaneMode === "codex" && state.openCodexSessionId) {
        await openCodexSession(state.openCodexSessionId, { resumeIfNeeded: true });
      }
    }

    function workspaceHasBackgroundNoteSync(workspace) {
      const notes = Array.isArray(workspace?.notes) ? workspace.notes : [];
      return notes.some((note) => note.sync_kind && (
        note.sync_status === "live" || note.sync_status === "conflict"
      ));
    }

    function applyWorkspace(workspace, preferredOpenNoteId = null) {
      const previousOpenNoteId = state.openNoteId;
      const previousWorkspaceProjectId = state.workspace?.project?.id || null;
      const pendingAnimation = computeActiveTaskAnimation(state.workspace, workspace);
      if (pendingAnimation) {
        pendingAnimation.beforeTaskRowSnapshot = captureTaskRowSnapshot();
      }
      if (pendingAnimation?.removedTaskIds?.length && pendingAnimation.beforeTaskRowSnapshot) {
        pendingAnimation.removedTaskGhosts = buildRemovedTaskGhostEntriesFromSnapshot(
          pendingAnimation.beforeTaskRowSnapshot,
          pendingAnimation.removedTaskIds
        );
      }
      state.pendingActiveTaskAnimation = pendingAnimation;
      state.workspace = workspace;
      if (!workspace || workspace.project.id !== previousWorkspaceProjectId) {
        state.codexHeadNotice = "";
      }
      if (!workspace) {
        disconnectCodexSocket(true);
        clearNoteSearchAutoJumpTimer();
        setSelectedTaskId(null);
        state.openNoteId = null;
        state.openCodexSessionId = null;
        state.pendingNoteSearchJump = null;
        resetNoteSearchNavigationState();
        state.taskDrafts = [];
        state.noteRevisionConflict = null;
        state.pendingRemoteUiState = null;
        state.pendingActiveTaskAnimation = null;
        syncLocation();
        scheduleUiRefresh();
        return;
      }
      syncProjectSummary(workspace.project);
      const codexSessions = syncCodexSessionCache(
        workspace.project.id,
        Array.isArray(workspace.codex_sessions) ? workspace.codex_sessions : []
      );
      state.workspace.codex_sessions = codexSessions;
      if (!workspace.active_tasks.some((task) => task.id === state.selectedTaskId)) {
        setSelectedTaskId(null);
      }
      state.openNoteId = preferredOpenNoteId || state.openNoteId || workspace?.suggested_open_note_id || null;
      if (state.openCodexSessionId && !codexSessions.some((session) => session.id === state.openCodexSessionId)) {
        state.openCodexSessionId = codexSessions[0]?.id || null;
      }
      if (!state.openCodexSessionId && codexSessions.length) {
        state.openCodexSessionId = codexSessions[0].id;
      }
      if (state.workspace && state.openNoteId) {
        const exists = state.workspace.notes.some((note) => note.id === state.openNoteId);
        if (!exists) {
          state.openNoteId = state.workspace.suggested_open_note_id || null;
        }
      }
      if (!projectSupportsCodex(workspace.project) && state.rightPaneMode === "codex") {
        state.rightPaneMode = "notes";

      }
      if (
        state.noteRevisionConflict
        && !workspace.notes.some((note) => note.id === state.noteRevisionConflict.noteId)
      ) {
        state.noteRevisionConflict = null;
      }
      if (previousOpenNoteId !== state.openNoteId) {
        clearCleanSearchDecorations(previousOpenNoteId || null);
        clearMarkdownSearchOverlays(previousOpenNoteId || null);
      }
      ensureDraftRow();
      syncLocation();
      scheduleUiRefresh();
    }

    function applyUiState(payload) {
      const previousProjectId = state.selectedProjectId;
      state.projects = payload.projects || [];
      state.selectedProjectId = payload.selected_project_id || null;
      if (state.selectedProjectId !== previousProjectId) {
        clearNoteSearchAutoJumpTimer();
        state.noteRevisionConflict = null;
        state.noteLinkableFiles = [];
        state.noteLinkableFilesLoaded = false;
        state.noteFilePickerLoading = false;
        state.noteFilePickerOpen = false;
        state.notesSearchQuery = "";
        state.pendingNoteSearchJump = null;
        resetNoteSearchNavigationState();
      }
      applyWorkspace(payload.workspace || null, payload.workspace?.suggested_open_note_id || null);
    }

    function ensureDraftRow() {
      if (!state.workspace) return;
      if (state.workspace.active_tasks.length === 0 && state.taskDrafts.length === 0) {
        insertDraftAfter(null);
      }
    }

    function insertDraftAfter(afterTaskId) {
      const key = `draft-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.afterTaskId !== afterTaskId || draft.title);
      state.taskDrafts.push({ key, afterTaskId, title: "" });
      state.focusDraftKey = key;
    }

    function isTaskBackgroundInsertTarget(target) {
      if (!(target instanceof Element)) return false;
      return !target.closest([
        "[data-task-id]",
        "[data-task-check-id]",
        "[data-task-priority-id]",
        "[data-task-codex-send-id]",
        "[data-task-codex-open-id]",
        "[data-task-delete-id]",
        "[data-task-section-toggle-id]",
        "[data-task-section-copy-id]",
        "[data-task-group-complete-id]",
        "[data-task-draft-key]"
      ].join(", "));
    }

    function isTaskRowBackgroundInsertZone(row, clientY) {
      if (!(row instanceof HTMLElement)) return false;
      const textElement = row.querySelector(".task-input");
      if (!(textElement instanceof HTMLElement)) return false;

      const rowRect = row.getBoundingClientRect();
      const textRect = textElement.getBoundingClientRect();
      const insertZoneTop = Math.min(rowRect.bottom - 2, textRect.bottom + 3);
      return clientY >= insertZoneTop && clientY <= rowRect.bottom;
    }

    function findVisibleTaskRowBeforePoint(clientY) {
      const rows = Array.from(activeTaskList.querySelectorAll("[data-draggable-task-id]"));
      let anchorRow = null;
      rows.forEach((row) => {
        if (!(row instanceof HTMLElement)) return;
        if (clientY >= row.getBoundingClientRect().top - 2) {
          anchorRow = row;
        }
      });
      return anchorRow;
    }

    function maybeInsertDraftFromTaskListClick(event) {
      if (!(event instanceof MouseEvent) || event.button !== 0) return false;
      if (event.metaKey || event.ctrlKey || event.altKey || event.shiftKey) return false;
      if (!state.workspace || !state.selectedProjectId) return false;

      const target = event.target instanceof Element ? event.target : null;
      if (!target) return false;
      if (target.closest("#active-task-list") !== activeTaskList) return false;
      if (!isTaskBackgroundInsertTarget(target)) return false;
      if (target.closest(".task-draft")) return false;

      const clickedRow = target.closest("[data-draggable-task-id]");
      let afterTaskId = null;

      if (clickedRow instanceof HTMLElement) {
        if (target !== clickedRow) return false;
        if (!isTaskRowBackgroundInsertZone(clickedRow, event.clientY)) return false;
        afterTaskId = clickedRow.dataset.draggableTaskId || null;
      } else {
        const anchorRow = findVisibleTaskRowBeforePoint(event.clientY);
        if (!(anchorRow instanceof HTMLElement)) return false;
        if (event.clientY < anchorRow.getBoundingClientRect().bottom - 2) return false;
        afterTaskId = anchorRow.dataset.draggableTaskId || null;
      }

      if (!afterTaskId) return false;
      if (isTaskSectionCollapsed(afterTaskId)) {
        const insertionAnchor = getLastActiveTaskIdInSection(afterTaskId);
        setTaskSectionCollapsed(afterTaskId, false);
        afterTaskId = insertionAnchor || afterTaskId;
      }
      insertDraftAfter(afterTaskId);
      render({ preserveShellScroll: true });
      return true;
    }

    function removeDraft(key, options = {}) {
      const autoInsertWhenEmpty = options.autoInsertWhenEmpty !== false;
      state.taskDrafts = state.taskDrafts.filter((draft) => draft.key !== key);
      if (
        autoInsertWhenEmpty
        && !state.taskDrafts.length
        && state.workspace?.active_tasks.length === 0
      ) {
        insertDraftAfter(null);
      }
    }

    function loadCollapsedTaskSections() {
      try {
        const rawValue = readStorageItem(taskSectionCollapseKey, legacyTaskSectionCollapseKey);
        if (!rawValue) return {};
        const parsedValue = JSON.parse(rawValue);
        return parsedValue && typeof parsedValue === "object" ? parsedValue : {};
      } catch (_error) {
        return {};
      }
    }

    function loadCollapsedDoneTaskSections() {
      try {
        const rawValue = readStorageItem(doneTaskSectionCollapseKey, legacyDoneTaskSectionCollapseKey);
        if (!rawValue) return {};
        const parsedValue = JSON.parse(rawValue);
        return parsedValue && typeof parsedValue === "object" ? parsedValue : {};
      } catch (_error) {
        return {};
      }
    }

    function saveCollapsedTaskSections() {
      try {
        localStorage.setItem(taskSectionCollapseKey, JSON.stringify(state.collapsedTaskSections));
      } catch (_error) {
        // Ignore storage failures and keep the in-memory state active.
      }
    }

    function saveCollapsedDoneTaskSections() {
      try {
        localStorage.setItem(doneTaskSectionCollapseKey, JSON.stringify(state.collapsedDoneTaskSections));
      } catch (_error) {
        // Ignore storage failures and keep the in-memory state active.
      }
    }

    function getProjectCollapsedTaskSections(projectId = state.selectedProjectId) {
      if (!projectId) return {};
      const sections = state.collapsedTaskSections?.[projectId];
      return sections && typeof sections === "object" ? sections : {};
    }

    function getProjectCollapsedDoneTaskSections(projectId = state.selectedProjectId) {
      if (!projectId) return {};
      const sections = state.collapsedDoneTaskSections?.[projectId];
      return sections && typeof sections === "object" ? sections : {};
    }

    function isTaskSectionCollapsed(taskId, projectId = state.selectedProjectId) {
      if (!taskId || !projectId) return false;
      return getProjectCollapsedTaskSections(projectId)[taskId] === true;
    }

    function isDoneTaskSectionCollapsed(taskId, projectId = state.selectedProjectId) {
      if (!taskId || !projectId) return false;
      return getProjectCollapsedDoneTaskSections(projectId)[taskId] === true;
    }

    function setTaskSectionCollapsed(taskId, collapsed) {
      if (!taskId || !state.selectedProjectId) return;

      const projectId = state.selectedProjectId;
      const nextProjectSections = { ...getProjectCollapsedTaskSections(projectId) };
      if (collapsed) {
        nextProjectSections[taskId] = true;
      } else {
        delete nextProjectSections[taskId];
      }

      const nextSections = { ...state.collapsedTaskSections };
      if (Object.keys(nextProjectSections).length) {
        nextSections[projectId] = nextProjectSections;
      } else {
        delete nextSections[projectId];
      }

      state.collapsedTaskSections = nextSections;
      saveCollapsedTaskSections();
    }

    function setDoneTaskSectionCollapsed(taskId, collapsed) {
      if (!taskId || !state.selectedProjectId) return;

      const projectId = state.selectedProjectId;
      const nextProjectSections = { ...getProjectCollapsedDoneTaskSections(projectId) };
      if (collapsed) {
        nextProjectSections[taskId] = true;
      } else {
        delete nextProjectSections[taskId];
      }

      const nextSections = { ...state.collapsedDoneTaskSections };
      if (Object.keys(nextProjectSections).length) {
        nextSections[projectId] = nextProjectSections;
      } else {
        delete nextSections[projectId];
      }

      state.collapsedDoneTaskSections = nextSections;
      saveCollapsedDoneTaskSections();
    }

    function toggleTaskSection(taskId) {
      if (!taskId) return;
      const shouldCollapse = !isTaskSectionCollapsed(taskId);
      const sectionAnchor = captureActiveTaskSectionAnchor(taskId);
      const beforeSnapshot = captureTaskRowSnapshot();
      setTaskSectionCollapsed(taskId, shouldCollapse);
      render();
      flushTaskRowSync();
      preserveActiveTaskSectionAnchor(sectionAnchor);
      focusTaskSectionToggle(taskId);
      animateTaskListMutationFromSnapshot(beforeSnapshot, {
        context: "section-toggle",
        mode: shouldCollapse ? "collapse" : "expand"
      });
    }

    function toggleDoneTaskSection(taskId) {
      if (!taskId) return;
      setDoneTaskSectionCollapsed(taskId, !isDoneTaskSectionCollapsed(taskId));
      render();
    }

    function buildTaskDraftsByAfterMap() {
      const draftsByAfter = new Map();
      state.taskDrafts.forEach((draft) => {
        const key = draft.afterTaskId ?? "__top__";
        if (!draftsByAfter.has(key)) draftsByAfter.set(key, []);
        draftsByAfter.get(key).push(draft);
      });
      return draftsByAfter;
    }

    function getCollapsibleTaskSectionIds() {
      if (!state.workspace) return [];
      const draftsByAfter = buildTaskDraftsByAfterMap();
      const taskSectionState = buildActiveTaskSectionState(state.workspace, draftsByAfter);
      return Array.from(taskSectionState.sections.entries())
        .filter(([, section]) => section.itemCount > 0)
        .map(([taskId]) => taskId);
    }

    function areAllTaskSectionsCollapsed(sectionIds = getCollapsibleTaskSectionIds()) {
      if (!sectionIds.length) return false;
      return sectionIds.every((taskId) => isTaskSectionCollapsed(taskId));
    }

    function toggleAllTaskSections() {
      const sectionIds = getCollapsibleTaskSectionIds();
      if (!sectionIds.length) return;
      const shouldCollapse = !areAllTaskSectionsCollapsed(sectionIds);
      const beforeSnapshot = captureTaskRowSnapshot();
      sectionIds.forEach((taskId) => {
        setTaskSectionCollapsed(taskId, shouldCollapse);
      });
      render();
      flushTaskRowSync();
      animateTaskListMutationFromSnapshot(beforeSnapshot, {
        context: "section-toggle",
        mode: shouldCollapse ? "collapse" : "expand"
      });
    }

    function renderWithTodoListTransition(renderOptions = {}) {
      const supportsViewTransition = typeof document.startViewTransition === "function";
      const prefersReducedMotion = shouldReduceTodoTaskMotion();
      const shouldUseViewTransition = !isDesktopShell && supportsViewTransition && !prefersReducedMotion;

      if (!shouldUseViewTransition) {
        render(renderOptions);
        if (!prefersReducedMotion) {
          animateTodoListFallback();
        }
        return;
      }

      try {
        document.startViewTransition(() => {
          render(renderOptions);
        });
      } catch (_error) {
        render(renderOptions);
        if (!prefersReducedMotion) {
          animateTodoListFallback();
        }
      }
    }

    function animateTodoListFallback() {
      if (!(activeTaskList instanceof HTMLElement)) {
        return;
      }

      const rows = Array.from(activeTaskList.querySelectorAll(".task-row, .task-draft"));

      if (todoListFallbackTimer) {
        window.clearTimeout(todoListFallbackTimer);
        todoListFallbackTimer = null;
      }

      activeTaskList.classList.remove("bulk-toggle-animating");
      rows.forEach((row, index) => {
        row.style.setProperty("--bulk-row-index", String(Math.min(index, todoListAnimationMaxIndex)));
      });
      void activeTaskList.offsetHeight;
      activeTaskList.classList.add("bulk-toggle-animating");

      todoListFallbackTimer = window.setTimeout(() => {
        activeTaskList.classList.remove("bulk-toggle-animating");
        rows.forEach((row) => {
          row.style.removeProperty("--bulk-row-index");
        });
        todoListFallbackTimer = null;
      }, todoListAnimationCleanupMs);
    }

    function animateAddedTaskRows(taskIds = [], options = {}) {
      if (!(activeTaskList instanceof HTMLElement) || !Array.isArray(taskIds) || !taskIds.length) {
        return;
      }

      const taskIdSet = new Set(taskIds.filter(Boolean));
      if (!taskIdSet.size) return;

      const rows = Array.from(activeTaskList.querySelectorAll(".task-row"))
        .filter((row) => taskIdSet.has(row.dataset.draggableTaskId));
      if (!rows.length) return;

      if (syncedTaskAnimationTimer) {
        window.clearTimeout(syncedTaskAnimationTimer);
        syncedTaskAnimationTimer = null;
      }

      const shouldStagger = options.context !== "section-toggle";

      rows.forEach((row, index) => {
        row.classList.remove("sync-in-animating");
        row.classList.remove("section-expand-animating", "section-expand-fade-animating");
        if (shouldStagger) {

      rows.forEach((row) => {

      syncedTaskAnimationTimer = window.setTimeout(() => {
        rows.forEach((row) => {

      }, todoListAnimationCleanupMs);
    }

    function captureTaskRowSnapshot() {
      if (!(activeTaskList instanceof HTMLElement)) {
        return new Map();
      }

      const snapshot = new Map();
      activeTaskList.querySelectorAll(".task-row").forEach((row) => {
        const taskId = row.dataset.draggableTaskId;
        if (!taskId || !(row instanceof HTMLElement)) return;
        const rect = row.getBoundingClientRect();
        if (rect.width <= 0 || rect.height <= 0) return;
        snapshot.set(taskId, {
          rect,
          ghost: row.cloneNode(true)
        });
      });
      return snapshot;
    }

    function buildRemovedTaskGhostEntriesFromSnapshot(snapshot, taskIds = []) {
      if (!(snapshot instanceof Map) || !snapshot.size || !Array.isArray(taskIds) || !taskIds.length) {
        return [];
      }

      return taskIds.map((taskId) => snapshot.get(taskId) || null).filter(Boolean);
    }

    function animateTaskRowReflowFromSnapshot(snapshot, options = {}) {
      if (!(activeTaskList instanceof HTMLElement) || !(snapshot instanceof Map) || !snapshot.size) {
        return;
      }

      const movedRows = [];
      snapshot.forEach((entry, taskId) => {
        const row = activeTaskList.querySelector(`[data-draggable-task-id="${taskId}"]`);
        if (!(row instanceof HTMLElement) || !entry?.rect) return;

        const nextRect = row.getBoundingClientRect();
        const deltaX = entry.rect.left - nextRect.left;
        const deltaY = entry.rect.top - nextRect.top;
        if (Math.abs(deltaX) < 0.5 && Math.abs(deltaY) < 0.5) return;

        row.classList.remove("task-row-reflow-animating");
        row.style.transition = "none";
        row.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
        row.style.willChange = "transform";
        movedRows.push(row);
      });

      if (!movedRows.length) return;
      void activeTaskList.offsetHeight;
      movedRows.forEach((row) => {
        row.classList.add("task-row-reflow-animating");
        row.style.transition = "";
        row.style.transform = "";
      });

      window.setTimeout(() => {
        movedRows.forEach((row) => {
          row.classList.remove("task-row-reflow-animating");
          row.style.willChange = "";
        });
      }, todoListAnimationCleanupMs);
    }

    function animateTaskListMutationFromSnapshot(beforeSnapshot, options = {}) {
      if (!(beforeSnapshot instanceof Map) || !beforeSnapshot.size || !(activeTaskList instanceof HTMLElement)) {
        return;
      }

      const prefersReducedMotion = shouldReduceTodoTaskMotion();
      if (prefersReducedMotion) return;

      const nextTaskIds = new Set(
        Array.from(activeTaskList.querySelectorAll(".task-row"))
          .map((row) => row.dataset.draggableTaskId)
          .filter(Boolean)
      );
      const previousTaskIds = Array.from(beforeSnapshot.keys());
      const removedTaskIds = previousTaskIds.filter((taskId) => !nextTaskIds.has(taskId));
      const addedTaskIds = Array.from(nextTaskIds).filter((taskId) => !beforeSnapshot.has(taskId));
      const isSectionToggle = options.context === "section-toggle";

      animateTaskRowReflowFromSnapshot(beforeSnapshot, options);
      if (!isSectionToggle && removedTaskIds.length) {
        const removedGhosts = buildRemovedTaskGhostEntriesFromSnapshot(beforeSnapshot, removedTaskIds);
        animateRemovedTaskGhosts(removedGhosts, options.mode === "collapse" ? "collapse" : "default", options);
      }
      if (!isSectionToggle && addedTaskIds.length) {
        animateAddedTaskRows(addedTaskIds, options);
      }
    }

    function animateRemovedTaskGhosts(ghostEntries = [], mode = "default", options = {}) {
      if (!Array.isArray(ghostEntries) || !ghostEntries.length) return;

      ghostEntries.forEach((entry) => {
        const ghost = entry?.ghost;
        const rect = entry?.rect;
        if (!(ghost instanceof HTMLElement) || !rect) return;

        ghost.classList.add("task-row-ghost-exit");
        if (mode === "collapse") {
          ghost.classList.add("is-collapse-exit");
        }
        ghost.removeAttribute("draggable");
        ghost.style.left = `${Math.round(rect.left)}px`;
        ghost.style.top = `${Math.round(rect.top)}px`;
        ghost.style.width = `${Math.round(rect.width)}px`;
        ghost.style.height = `${Math.round(rect.height)}px`;
        document.body.appendChild(ghost);

        window.setTimeout(() => {
          ghost.remove();
        }, todoListAnimationCleanupMs);
      });
    }

    function applyPendingActiveTaskAnimation() {
      const pendingAnimation = state.pendingActiveTaskAnimation;
      state.pendingActiveTaskAnimation = null;
      if (!pendingAnimation) return;

      const prefersReducedMotion = shouldReduceTodoTaskMotion();
      if (prefersReducedMotion) return;

      const hasStructuralRowChange = pendingAnimation.addedTaskIds.length > 0 || pendingAnimation.removedTaskGhosts?.length > 0;

      if (pendingAnimation.beforeTaskRowSnapshot && !hasStructuralRowChange) {

      if (pendingAnimation.removedTaskGhosts?.length) {

    function getDraft(key) {

    function normalizeTaskPriority(priorityValue) {
      const value = String(priorityValue || "").toUpperCase();
      if (value === "P0" || value === "P1" || value === "P2" || value === "P3") {
        return value;
      }
      return "P0";
    }

    function nextTaskPriority(priorityValue) {
      const normalized = normalizeTaskPriority(priorityValue);
      if (normalized === "P0") return "P3";
      if (normalized === "P3") return "P2";
      if (normalized === "P2") return "P1";
      return "P0";
    }

    function taskPriorityToneFromValue(priorityValue) {
      const normalized = normalizeTaskPriority(priorityValue);
      if (normalized === "P1") return "p1";
      if (normalized === "P2") return "p2";
      if (normalized === "P3") return "p3";

      if (priority === "P2") return 1;
      if (priority === "P3") return 2;
      if (priority === "P0") return 3;
      return 4;
    }

    function compareTasksByPriority(left, right) {
      const leftRank = taskPriorityRank(left);
      const rightRank = taskPriorityRank(right);
      if (leftRank !== rightRank) {

      }
      return left.sort_order - right.sort_order || left.id.localeCompare(right.id);
    }

    function sortActiveTasksByPriority(activeTasks) {
      if (!Array.isArray(activeTasks) || !activeTasks.length) return [];

      const rows = [];
      let segment = [];
      activeTasks.forEach((task) => {
        const title = state.taskEdits[task.id] ?? task.title;
        if (isMarkdownTaskHeading(title)) {
          if (segment.length) {
            rows.push(...segment.sort(compareTasksByPriority));
            segment = [];
          }
          rows.push(task);
          return;
        }
        segment.push(task);
      });

      if (segment.length) {
        rows.push(...segment.sort(compareTasksByPriority));
      }

      return rows;
    }

    function activePriorityCounts(tasks = []) {

      tasks.forEach((task) => {
        const title = state.taskEdits[task.id] ?? task.title;
        if (isMarkdownTaskHeading(title)) return;
        const priority = normalizeTaskPriority(task.priority);
        if (priority === "P1" || priority === "P2" || priority === "P3" || priority === "P0") {
          counts[priority] += 1;
        }
      });
      return counts;
    }

    function todoStatusSummaryMarkup(activeCount, counts) {

    function toggleHeadingTitle(title = "") {

    function toggleTaskHeading(taskId) {

    function clearTaskDropIndicator() {

    function resolveTaskDropLocation(clientY) {
      const rows = Array.from(activeTaskList.querySelectorAll("[data-draggable-task-id]"));
      if (!rows.length) return null;

      for (const row of rows) {
        const rect = row.getBoundingClientRect();
        const midpoint = rect.top + (rect.height / 2);
        if (clientY < midpoint) {
          return {
            taskId: row.dataset.draggableTaskId,
            position: "before"

      const lastRow = rows[rows.length - 1];
      return {
        taskId: lastRow.dataset.draggableTaskId,
        position: "after"

    function getTaskHeadingLabel(title = "") {

    }

    function isMarkdownTaskHeading(title = "") {

    function normalizeTaskEditorValue(value = "") {

    function readCssPixels(style, propertyName) {

    function measureTextElementHeight(element, textValue = "") {
      if (!(element instanceof HTMLElement) || !(taskInputMeasure instanceof HTMLElement)) return null;

      const elementRect = element.getBoundingClientRect();
      const width = Math.ceil(elementRect.width);
      if (width <= 0) return null;

      const styles = window.getComputedStyle(element);
      taskInputMeasure.style.width = `${width}px`;
      taskInputMeasure.style.fontFamily = styles.fontFamily;
      taskInputMeasure.style.fontSize = styles.fontSize;
      taskInputMeasure.style.fontWeight = styles.fontWeight;
      taskInputMeasure.style.fontStyle = styles.fontStyle;
      taskInputMeasure.style.fontStretch = styles.fontStretch;
      taskInputMeasure.style.fontVariant = styles.fontVariant;
      taskInputMeasure.style.fontKerning = styles.fontKerning;
      taskInputMeasure.style.letterSpacing = styles.letterSpacing;
      taskInputMeasure.style.lineHeight = styles.lineHeight;
      taskInputMeasure.style.textTransform = styles.textTransform;
      taskInputMeasure.style.textIndent = styles.textIndent;
      taskInputMeasure.style.wordSpacing = styles.wordSpacing;
      taskInputMeasure.style.whiteSpace = styles.whiteSpace;
      taskInputMeasure.style.overflowWrap = styles.overflowWrap;
      taskInputMeasure.style.wordBreak = styles.wordBreak;
      taskInputMeasure.textContent = `${textValue}\u200b`;

      const measuredHeight = Math.ceil(taskInputMeasure.getBoundingClientRect().height);

    function measureTaskInputHeight(input) {

    function syncTaskRowHeight(row) {

      const textElement = row.querySelector(".task-input, .done-title, .done-section-title");
      if (!(textElement instanceof HTMLElement)) return;

      const textHeight = textElement instanceof HTMLTextAreaElement
        ? measureTaskInputHeight(textElement)
        : measureTextElementHeight(textElement, textElement.textContent || "");
      if (!textHeight) return;

      const rowStyles = window.getComputedStyle(row);
      const floor = readCssPixels(rowStyles, "--task-row-floor");
      const verticalChrome = readCssPixels(rowStyles, "--task-row-vertical-chrome");
      const nextRowMinHeight = `${Math.max(floor, textHeight + verticalChrome)}px`;

      if (textElement instanceof HTMLTextAreaElement) {
        const nextInputHeight = `${textHeight}px`;
        if (textElement.style.height !== nextInputHeight) {
          textElement.style.height = nextInputHeight;
        }
      } else {
        const nextTextMinHeight = `${textHeight}px`;
        if (textElement.style.minHeight !== nextTextMinHeight) {
          textElement.style.minHeight = nextTextMinHeight;
        }
      }
      if (row.style.minHeight !== nextRowMinHeight) {
        row.style.minHeight = nextRowMinHeight;
      }
    }
